    <style>
        body {

</head>
<body>
    <div id="loading" class="loading" style="display:none;"></div>
    <div class="controls-bar" id="controls-bar" style="display:none;">
        <div class="frame-selector" id="frame-selector">
            <label for="frame-select">Dataset:</label>
            <select id="frame-select"></select>
        </div>
        <!-- Time controls panel - shown when checkbox checked -->
        <div class="time-controls-panel" id="time-controls-panel">
            <div class="time-control-group" id="period-input-group">
                <label for="period-value">Period:</label>
                <input type="number" id="period-value" value="2" min="0.1" step="0.1">
                <span class="unit">years</span>
            </div>
            <div class="time-control-group">
                <button class="nav-btn" id="btn-backward" title="Previous period" disabled>◀</button>
                <span class="period-indicator" id="period-indicator">-/-</span>
                <button class="nav-btn" id="btn-forward" title="Next period" disabled>▶</button>
            </div>
            <div class="time-control-group">
                <span id="period-date-range" style="font-size: 15px; color: #333; min-width: 220px; font-weight: 500;"></span>
            </div>
            <div class="time-control-group">
                <button class="play-btn" id="btn-play">▶ Play</button>
            </div>
            <div class="time-control-group">
                <label for="frame-delay">Delay:</label>
                <input type="number" id="frame-delay" value="2" min="0.5" step="0.5">
                <span class="unit">secs</span>
            </div>
            <div class="time-control-group add-period-group" id="add-period-group">
                <span class="add-period-boxes">
                    <label for="add-start-date">Start:</label>
                    <input type="text" id="add-start-date" class="date-input" placeholder="YYYYMMDD" maxlength="8">
                    <label for="add-end-date">End:</label>
                    <input type="text" id="add-end-date" class="date-input" placeholder="YYYYMMDD" maxlength="8">
                </span>
                <button type="button" class="add-period-btn" id="add-period-btn" title="Click to select periods">+</button>
            </div>
        </div>
        <div class="time-controls-column">
            <div class="time-controls-toggle">
                <input type="checkbox" id="time-controls-checkbox">
                <label for="time-controls-checkbox">Time Controls</label>
            </div>
            <span class="memory-display" id="memory-display" title="Estimated memory usage">Mem: 0 MB</span>
            <span class="loading-indicator" id="loading-indicator" title="Background frames loading">Loading...</span>
            <span class="ref-status-indicator" id="ref-status-indicator" role="status" aria-live="polite"></span>
        </div>
    </div>
    <div class="container" id="container"></div>

    <script>
        // ===== CONFIGURATION (EDIT THIS LINE TO SWITCH BETWEEN FORMATS) =====
        // To switch: comment out one line and uncomment the other
        //const USE_FULL_DATASET_IN_URL = false;  // Use short codes: view=desc/asc/vert/horz
        const USE_FULL_DATASET_IN_URL = true;   // Use full dataset names: startDataset=S1_desc_142_mintpy_...
        
        // ===== URL STATE MANAGEMENT =====
        // Map view labels to short codes for URL
        const viewCodes = {
            'Descending': 'desc',
            'Ascending': 'asc',
            'Vertical': 'vert',
            'Horizontal': 'horz'
        };
        const codeToLabel = { 'desc': 'Descending', 'asc': 'Ascending', 'vert': 'Vertical', 'horz': 'Horizontal' };

        // Helper: Parse YYYYMMDD to Date
        function parseDate(yyyymmdd) {
            if (!yyyymmdd) return null;
            const str = String(yyyymmdd);
            if (str.length !== 8) return null;
            const year = parseInt(str.substring(0, 4));
            const month = parseInt(str.substring(4, 6)) - 1;
            const day = parseInt(str.substring(6, 8));
            return new Date(year, month, day);
        }
        
        // Helper: Format Date to YYYYMMDD
        function formatDate(date) {
            if (!date) return null;
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }
        
        // Helper: Format Date for display (29 Oct 2024)
        function formatDateDisplay(yyyymmdd) {
            const d = parseDate(yyyymmdd);
            if (!d) return yyyymmdd;
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        // Get URL parameters from overlay.html's URL (supports hash-based routing)
        function getOverlayUrlParams() {
            let pathPart = '';
            let queryPart = '';
            
            // Check for hash-based URL first (e.g., overlay.html#/start/lat/lon/zoom?params)
            if (window.location.hash) {
                const hash = window.location.hash.substring(1); // Remove leading #
                const queryIdx = hash.indexOf('?');
                if (queryIdx !== -1) {
                    pathPart = hash.substring(0, queryIdx);
                    queryPart = hash.substring(queryIdx + 1);
                } else {
                    pathPart = hash;
                }
            } else {
                // Fallback to regular URL
                pathPart = window.location.pathname;
                queryPart = window.location.search.substring(1);
            }
            
            // Parse path: /start/{lat}/{lon}/{zoom}
            const pathMatch = pathPart.match(/\/start\/([^\/]+)\/([^\/]+)\/([^\/?\#]+)/);
            const params = new URLSearchParams(queryPart);
            
            return {
                view: params.get('view'),
                startDataset: params.get('startDataset'),
                lat: pathMatch ? pathMatch[1] : null,
                lon: pathMatch ? pathMatch[2] : null,
                zoom: pathMatch ? pathMatch[3] : null,
                minScale: params.get('minScale'),
                maxScale: params.get('maxScale'),
                startDate: params.get('startDate'),
                endDate: params.get('endDate'),
                pixelSize: params.get('pixelSize'),
                background: params.get('background'),
                opacity: params.get('opacity'),
                contour: params.get('contour'),
                colorscale: params.get('colorscale'),
                refPointLat: params.get('refPointLat'),
                refPointLon: params.get('refPointLon'),
                pointLat: params.get('pointLat'),
                pointLon: params.get('pointLon'),
                autoColorScale: params.get('autoColorScale'),
                timeControls: params.get('timeControls'),
                periods: params.get('periods')
            };
        }

        // Periods URL format: periods=20140902:20151003,20151003:20163110,20163110:20251231
        // (start:end,start:end,...) - comma separates periods, : separates start from end within each
        // Also accepts @ as separator for backwards compatibility
        function serializePeriods(periodsArray) {
            if (!periodsArray || periodsArray.length === 0) return null;
            return periodsArray.map(p => `${p.startDate}:${p.endDate}`).join(',');
        }
        function parsePeriodsFromUrl(periodsStr) {
            if (!periodsStr || typeof periodsStr !== 'string') return null;
            const parts = periodsStr.trim().split(/[,@]/).filter(Boolean);
            const result = [];
            for (const part of parts) {
                const [start, end] = part.split(':').map(s => (s || '').trim());
                if (start && end && start.length === 8 && end.length === 8) {
                    result.push({ startDate: start, endDate: end });
                }
            }
            return result.length > 0 ? result : null;
        }

        // Resolve autoColorScale vs explicit minScale/maxScale for URL and iframe sync.
        function normalizeAutoColorScaleParam(param) {
            if (param === 'false') return 'false';
            if (param === 'true' || param === 'coarse' || param === 'fine') return 'true';
            return 'true';
        }

        function resolveAutoColorScaleState(minScale, maxScale, autoColorScaleParam) {
            if (autoColorScaleParam == null || autoColorScaleParam === '') {
                if (minScale && maxScale) {
                    return { autoColorScale: 'false', minScale: minScale, maxScale: maxScale };
                }
                return { autoColorScale: 'true', minScale: null, maxScale: null };
            }
            const mode = normalizeAutoColorScaleParam(autoColorScaleParam);
            if (mode === 'true') {
                return { autoColorScale: 'true', minScale: null, maxScale: null };
            }
            return { autoColorScale: 'false', minScale: minScale || null, maxScale: maxScale || null };
        }

        // Resolved scale for overlay state (manual min/max win unless auto is explicitly on).
        function scaleStateFromMapParams(mapParams) {
            if (!mapParams) {
                return resolveAutoColorScaleState(null, null, INSARMAP_URL_DEFAULTS.autoColorScale);
            }
            const autoParam = mapParams.autoColorScale;
            if (autoParam === 'true' || autoParam === 'coarse' || autoParam === 'fine') {
                return resolveAutoColorScaleState(mapParams.minScale, mapParams.maxScale, autoParam);
            }
            if (mapParams.minScale != null && mapParams.maxScale != null &&
                String(mapParams.minScale) !== '' && String(mapParams.maxScale) !== '') {
                return resolveAutoColorScaleState(mapParams.minScale, mapParams.maxScale, 'false');
            }
            return resolveAutoColorScaleState(
                mapParams.minScale, mapParams.maxScale,
                autoParam ?? INSARMAP_URL_DEFAULTS.autoColorScale
            );
        }

        function effectiveColorscale(mapParams) {
            return mapParams?.colorscale || INSARMAP_URL_DEFAULTS.colorscale;
        }

        function effectiveContour(mapParams) {
            return normalizeContourValue(mapParams?.contour) || INSARMAP_URL_DEFAULTS.contours;
        }

        function preserveOverlayDisplayParamsDuringSwitch(merged, authoritative) {
            if (Date.now() >= datasetSwitchSuppressUntil && !switchOpInFlight) {
                return merged;
            }
            const preserved = {
                ...merged,
                contour: effectiveContour(authoritative),
                pixelSize: (authoritative.pixelSize != null && authoritative.pixelSize !== '')
                    ? authoritative.pixelSize : merged.pixelSize,
                autoColorScale: scaleStateFromMapParams(authoritative).autoColorScale,
                minScale: scaleStateFromMapParams(authoritative).minScale,
                maxScale: scaleStateFromMapParams(authoritative).maxScale,
                colorscale: effectiveColorscale(authoritative)
            };
            // #region agent log
            if (effectiveContour(merged) !== effectiveContour(preserved) ||
                merged.pixelSize !== preserved.pixelSize ||
                scaleStateFromMapParams(merged).minScale !== scaleStateFromMapParams(preserved).minScale ||
                scaleStateFromMapParams(merged).maxScale !== scaleStateFromMapParams(preserved).maxScale ||
                effectiveColorscale(merged) !== effectiveColorscale(preserved)) {
                __odt_hook('dbgDisplayLog', 'overlay.html:preserveDisplay', 'preserved display params during switch', {
                    suppressUntil: datasetSwitchSuppressUntil,
                    switchOpInFlight,
                    rawContour: effectiveContour(merged),
                    rawPixelSize: merged.pixelSize,
                    rawScale: scaleStateFromMapParams(merged),
                    preservedContour: effectiveContour(preserved),
                    preservedPixelSize: preserved.pixelSize,
                    preservedScale: scaleStateFromMapParams(preserved),
                    preservedColorscale: effectiveColorscale(preserved),
                    authoritativeScale: scaleStateFromMapParams(authoritative)
                }, 'B');
            }
            // #endregion
            return preserved;
        }

        function contourFromInsarmapsMessage(params, eventData, baseParams) {
            const raw = params.get('contours') ?? params.get('contour') ??
                (eventData && eventData.contours != null ? eventData.contours : null) ??
                baseParams?.contour;
            return normalizeContourValue(raw) || INSARMAP_URL_DEFAULTS.contours;
        }

        // Insarmaps manual mode omits autoColorScale from URL (minScale/maxScale only). Do not
        // fall back to overlay state when the param is absent — infer from min/max instead.
        function autoColorScaleParamFromInsarmapsUrl(urlParams) {
            if (!urlParams || !urlParams.has('autoColorScale')) return null;
            const v = urlParams.get('autoColorScale');
            return (v == null || v === '') ? null : v;
        }

        function isAutoColorScaleMode(mode) {
            return normalizeAutoColorScaleParam(mode) === 'true';
        }

        const INSARMAP_URL_DEFAULTS = {
            flyToDatasetCenter: 'true',
            colorscale: 'velocity',
            pixelSize: '3',
            opacity: '100',
            background: 'hillshade',
            contours: 'false',
            autoColorScale: 'true',
            minScale: '-2',
            maxScale: '2'
        };

        function numUrlValueDiffers(value, defaultValue) {
            if (value == null || value === '') return false;
            const v = parseFloat(value);
            const d = parseFloat(defaultValue);
            if (!isNaN(v) && !isNaN(d)) return Math.abs(v - d) > 1e-9;
            return String(value) !== String(defaultValue);
        }

        function formatUrlNumber(value) {
            const f = parseFloat(value);
            if (isNaN(f)) return String(value);
            return String(f);
        }

        function appendScaleParamsToUrlSearchParams(params, mapParams) {
            const scaleState = scaleStateFromMapParams(mapParams);
            if (scaleState.autoColorScale === 'true') {
                if (scaleState.autoColorScale !== INSARMAP_URL_DEFAULTS.autoColorScale) {
                    params.set('autoColorScale', scaleState.autoColorScale);
                }
            } else {
                if (scaleState.minScale != null && scaleState.minScale !== '') {
                    params.set('minScale', formatUrlNumber(scaleState.minScale));
                }
                if (scaleState.maxScale != null && scaleState.maxScale !== '') {
                    params.set('maxScale', formatUrlNumber(scaleState.maxScale));
                }
            }
        }

        function appendCanonicalInsarmapsQueryParams(params, mapParams, options = {}) {
            if (options.startDataset) params.set('startDataset', options.startDataset);
            else if (options.view) params.set('view', options.view);
            const ftc = options.flyToDatasetCenter ?? mapParams.flyToDatasetCenter ?? INSARMAP_URL_DEFAULTS.flyToDatasetCenter;
            if (ftc !== INSARMAP_URL_DEFAULTS.flyToDatasetCenter) {
                params.set('flyToDatasetCenter', ftc);
            }

            if (mapParams.pointLat && mapParams.pointLon && !options.omitPointSelection) {
                params.set('pointLat', mapParams.pointLat);
                params.set('pointLon', mapParams.pointLon);
            }
            if (mapParams.refPointLat && mapParams.refPointLon) {
                params.set('refPointLat', mapParams.refPointLat);
                params.set('refPointLon', mapParams.refPointLon);
            }

            const hasCustomRef = hasCustomRefPoint(mapParams);
            const colorscale = effectiveColorscale(mapParams);
            if (!hasCustomRef && colorscale &&
                (options.includeColorscale || colorscale !== INSARMAP_URL_DEFAULTS.colorscale)) {
                params.set('colorscale', colorscale);
            }
            if (mapParams.pixelSize &&
                (options.includePixelSize || numUrlValueDiffers(mapParams.pixelSize, INSARMAP_URL_DEFAULTS.pixelSize))) {
                params.set('pixelSize', formatUrlNumber(mapParams.pixelSize));
            }
            if (mapParams.opacity && numUrlValueDiffers(mapParams.opacity, INSARMAP_URL_DEFAULTS.opacity)) {
                params.set('opacity', String(mapParams.opacity));
            }
            if (mapParams.background && mapParams.background !== INSARMAP_URL_DEFAULTS.background) {
                params.set('background', mapParams.background);
            }
            const normalizedContour = effectiveContour(mapParams);
            if (!hasCustomRef && normalizedContour &&
                (options.includeContours || normalizedContour !== INSARMAP_URL_DEFAULTS.contours)) {
                params.set('contours', normalizedContour);
            }

        }

        function effectiveRefCoords() {
            if (canonicalUserRefCoords) return { ...canonicalUserRefCoords };
            if (hasCustomRefPoint(currentMapParams)) {

                    refPointLon: currentMapParams.refPointLon

            return null;

        function applyEffectiveRefToMapParams() {
            const ref = effectiveRefCoords();
            if (!ref) return false;

        function snapshotPointRefOnIframe(index) {
            const url = iframeEffectiveUrl(index);
            if (!url) return null;

            if (!p) return null;

                pointLat: params.pointLat, pointLon: params.pointLon,

        }

        function fillMissingReportedDates(index, startDate, endDate) {
            let start = startDate;
            let end = endDate;
            const stored = index >= 0 ? datasetDateRanges.get(index) : null;
            if (!start && stored && stored.firstDate) {
                start = formatDate(stored.firstDate);
            }
            if (!end && stored && stored.lastDate) {
                end = formatDate(stored.lastDate);
            }
            if (!start && baselineMissionDateRange) {
                start = formatDate(baselineMissionDateRange.firstDate);

            if (!end && baselineMissionDateRange) {

            startDate = filled.startDate;
            endDate = filled.endDate;

                endDate: endDate,

        function capturePeriodBeforeSwitch(fromIdx, dates) {

                endDate: dates.endDate,
                datesNarrowed: !!dates.datesNarrowed

            // reconciler does not immediately re-send set-dates to it after the switch.

        }

        function finishSwitchOp() {
            if (switchOpFinishTimer) {

            }

                wasInFlight: switchOpInFlight,
                pendingSelectIndex,
                activeDatasetIdx,
                ageMs: switchOpStartedAt ? Date.now() - switchOpStartedAt : 0
            }, 'A');
            // #endregion

            switchOpStartedAt = 0;

                iframe.contentWindow.postMessage({ type: 'insarmaps-keep-charts-open' }, '*');
            } catch (e) {}
        }

        function syncRefFromSwitchState(fromState, fromIdx) {
            if (canonicalUserRefCoords) {

                return true;
            }
            if (!fromState) {
                return false;
            }

            let lon = fromState.refPointLon;
            const hasInternal = !!(fromState.hasCustomRef || fromState.refAppliedInternal);
            if ((!lat || !lon) && hasInternal && fromIdx >= 0) {

                    lon = cached.refPointLon;

            }

        function syncPointFromSwitchState(fromState, fromIdx) {
            let lat = fromState && fromState.pointLat;
            let lon = fromState && fromState.pointLon;

                const cached = lastKnownPointByIndex.get(fromIdx);
                if (cached) {
                    lat = cached.pointLat;
                    lon = cached.pointLon;
                }
            }

                // can sit tens of meters away. Adopting it would shift the point on every switch
                // and make already-synced backgrounds look stale. Only fill when missing.
                if (!(currentMapParams.pointLat && currentMapParams.pointLon)) {
                    console.log('[overlay] point selection FILLED from switch state', {
                        to: { lat: String(lat), lon: String(lon) },
                        source: (fromState && fromState.source) || 'unknown'
                    });

                    currentMapParams.pointLon = String(lon);

            }

        function queryActiveIframeSwitchState(index, callback) {

                    startDate: dates && dates.startDate,
                    endDate: dates && dates.endDate,
                    datesNarrowed: dates && dates.datesNarrowed,

                    pointLon: (fromUrl && fromUrl.pointLon) || (cachedPoint && cachedPoint.pointLon) || null,
                    refPointLat: fromUrl && fromUrl.refPointLat,
                    refPointLon: fromUrl && fromUrl.refPointLon,

                    endDate: event.data.endDate,

                    pointLat: event.data.pointLat,
                    pointLon: event.data.pointLon,
                    refPointLat: event.data.refPointLat,
                    refPointLon: event.data.refPointLon,
                    hasCustomRef: !!event.data.hasCustomRef,
                    refAppliedInternal: !!event.data.refAppliedInternal,
                    chartsVisible: event.data.chartsVisible,
                    pixelSize: event.data.pixelSize,
                    contours: event.data.contours,
                    colorscale: event.data.colorscale,
                    autoColorScale: event.data.autoColorScale,
                    minScale: event.data.minScale,
                    maxScale: event.data.maxScale,

        function queryActiveIframeDates(index, callback) {

                    endDate: state.endDate,
                    datesNarrowed: state.datesNarrowed

            });
        }

        function effectivePeriodAtSwitch(fromIdx) {
            if (userNarrowedDateRange) return { ...userNarrowedDateRange };
            const reported = lastReportedDatesByIndex.get(fromIdx);
            if (reported && reported.startDate && reported.endDate) {
                return { startDate: reported.startDate, endDate: reported.endDate };
            }
            if (currentMapParams.startDate && currentMapParams.endDate) {
                return {
                    startDate: currentMapParams.startDate,
                    endDate: currentMapParams.endDate
                };
            }
            return null;
        }

        function periodRangesMatch(a, b) {
            if (!a || !b) return !a && !b;
            return a.startDate === b.startDate && a.endDate === b.endDate;

        const DATE_SNAP_TOLERANCE_DAYS = 24;
        function periodRangesClose(a, b) {
            if (!a || !b || !a.startDate || !b.startDate || !a.endDate || !b.endDate) {
                return periodRangesMatch(a, b);
            }
            return Math.abs(dateSpanDaysYyyymmdd(a.startDate, b.startDate)) <= DATE_SNAP_TOLERANCE_DAYS &&
                Math.abs(dateSpanDaysYyyymmdd(a.endDate, b.endDate)) <= DATE_SNAP_TOLERANCE_DAYS;
        }

            const url = iframeEffectiveUrl(index);
            if (!url) return null;
            return datesFromIframeSrc(url);
        }

        function maybeResolveSwitchDatesOnIframeLoad(index) {
            if (!activeSwitchTracking || activeSwitchTracking.to !== index) return;
            if (activeSwitchTracking.datesOk !== null) return;
            if (pendingDateSyncByIndex.has(index)) return;
            if (hasCustomRefPoint(currentMapParams)) return;

        }

        function iframeIndexForMessageSource(source) {
            if (!source) return -1;
            for (let i = 0; i < urlsList.length; i++) {
                const iframe = document.getElementById(`iframe${i}`);
                if (iframe && iframe.contentWindow === source) return i;
            }

        }

        function refCoordsMatch(mapRefLat, mapRefLon, lat, lon) {
            if (mapRefLat == null || mapRefLon == null || lat == null || lon == null) return false;
            const dLat = Math.abs(parseFloat(mapRefLat) - parseFloat(lat));
            const dLon = Math.abs(parseFloat(mapRefLon) - parseFloat(lon));
            return dLat < 0.002 && dLon < 0.002;
        }

        function refCoordsMatchExpected(lat, lon) {
            const expected = effectiveRefCoords();
            if (expected && refCoordsMatch(expected.refPointLat, expected.refPointLon, lat, lon)) {
                return true;
            }

        }

        function isLogTemplateDateRange(startDate, endDate) {
            if (!logTemplateDateRange || !startDate || !endDate) return false;

        }

        function dateSpanDaysYyyymmdd(startDate, endDate) {
            const sy = parseInt(startDate.slice(0, 4), 10);
            const sm = parseInt(startDate.slice(4, 6), 10) - 1;

            const ey = parseInt(endDate.slice(0, 4), 10);

            const widerEnd = parseInt(endDate, 10) >= parseInt(than.endDate, 10);

            const endOk = parseInt(endDate, 10) <= parseInt(than.endDate, 10);

        function isNearDatasetOrMissionFullSpan(senderIndex, startDate, endDate) {

            const missionEnd = formatDate(baselineMissionDateRange.lastDate);
            if (startDate !== missionStart) return false;
            const stored = senderIndex >= 0 ? datasetDateRanges.get(senderIndex) : null;

                const dsEnd = formatDate(stored.lastDate);

        function setIframeSrc(iframe, newUrl, meta) {

            if (!hasCustomRefPoint(currentMapParams) || index < 0) return;
            cancelRefRecoveryTimers(index);
            refStatusAdviseByIndex.set(index, setTimeout(() => {
                refStatusAdviseByIndex.delete(index);
                if (!isRefStillPendingForIndex(index)) return;
                const label = iframeLabelForLog(index);
                updateRefStatusIndicator(
                    `Reference point is still loading on ${label}. ` +
                    'Switch to another view and back, or wait — we will retry automatically.',
                    true
                );
            }, REF_STATUS_ADVISE_MS));
            refStuckWatchdogByIndex.set(index, setTimeout(() => {
                refStuckWatchdogByIndex.delete(index);
                tryRefStuckRecovery(index, 'watchdog-timeout', reason);
            }, REF_STUCK_WATCHDOG_MS));
        }

        function tryRefStuckRecovery(index, trigger, detail) {
            if (!isRefStillPendingForIndex(index)) return;
            if (bgLoadInFlightEntry(index)) return;
            const retries = refAutoRetryCountByIndex.get(index) || 0;
            const label = iframeLabelForLog(index);
            if (retries >= MAX_REF_AUTO_RETRIES) {
                updateRefStatusIndicator(
                    `Reference point did not load on ${label}. ` +
                    'Switch to another dataset and back to retry.',
                    true
                );
                return;
            }
            refAutoRetryCountByIndex.set(index, retries + 1);
            updateRefStatusIndicator(`Retrying reference point load on ${label}…`, true);
            clearRefAppliedForDateSync(index);
            cancelRefRecoveryTimers(index);
            revealDatasetPanel(index);
            reloadDatasetIframe(index, `ref-retry-${trigger}`, refSwitchLoadKindForIndex(index));
            scheduleRefRecoveryWatchdogs(index, `after-${trigger}`);
        }

        function handleInsarmapsRefFailed(failIndex, data) {
            if (failIndex < 0 || failIndex !== activeDatasetIdx) return;
            if (!hasCustomRefPoint(currentMapParams)) return;
            if (refAppliedForDateSyncByIndex.has(failIndex)) return;
            const label = iframeLabelForLog(failIndex);
            updateRefStatusIndicator(
                `Reference point could not be applied on ${label}. Retrying…`,
                true
            );
            tryRefStuckRecovery(failIndex, 'insarmaps-failed', data && data.reason);
        }
        
        const INSARMAPS_LOG_ERROR_REDIRECT_MS = 3000;
        const INSARMAPS_LOG_FETCH_TIMEOUT_MS = 10000;
        const INSARMAPS_LOG_USER_ERROR = 'Volcano not found. Please contact the webmaster of this website.';
        let insarmapsLogErrorShown = false;
        let insarmapsLogResolved = false;

        function isValidInsarmapsLogUrl(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.pathname.includes('/start/') || urlObj.searchParams.has('startDataset');
            } catch (e) {
                return false;
            }
        }

        function isFullInsarmapsLogUrl(line) {
            return line.startsWith('http://') || line.startsWith('https://');
        }

        // Lines without startDataset= and not http(s):// are dataset names only (expanded from first URL line).
        function isDatasetNameOnlyLine(line) {
            if (!line) return false;
            if (isFullInsarmapsLogUrl(line)) return false;
            if (line.includes('startDataset=')) return false;
            return true;
        }

        // mintpy-style insarmaps.log: full URL for S1_desc_* plus name-only S1_asc_* line.
        // expandDatasetNameLine must not copy descending-only state onto ascending/other iframes.
        const TEMPLATE_PARAMS_STRIP_ON_EXPAND = [
            'pointLat', 'pointLon', 'refPointLat', 'refPointLon', 'colorscale', 'startDate', 'endDate'
        ];

        function hasCustomRefPoint(mapParams) {
            return !!(mapParams && mapParams.refPointLat && mapParams.refPointLon);
        }

        function hasPartialCustomRef(mapParams) {
            if (!mapParams) return false;
            const hasLat = !!mapParams.refPointLat;
            const hasLon = !!mapParams.refPointLon;
            return (hasLat && !hasLon) || (!hasLat && hasLon);
        }

        function hasTimeSeriesPoint(mapParams) {
            return !!(mapParams && mapParams.pointLat && mapParams.pointLon);
        }

        function isMintpyDataset(datasetName) {
            return !!(datasetName && String(datasetName).toLowerCase().includes('mintpy'));
        }

        // True when current startDate/endDate span one dataset's attribute first_date/last_date.
        function isFullDatasetDateRange(datasetIndex) {
            const startDate = currentMapParams.startDate;
            const endDate = currentMapParams.endDate;
            if (!startDate || !endDate) return false;
            const stored = datasetDateRanges.get(datasetIndex);
            if (stored && stored.firstDate && stored.lastDate) {
                return formatDate(stored.firstDate) === startDate && formatDate(stored.lastDate) === endDate;
            }
            if (typeof dataFirstDate !== 'undefined' && dataFirstDate &&
                typeof dataLastDate !== 'undefined' && dataLastDate &&
                datasetIndex === activeDatasetIdx) {
                return formatDate(dataFirstDate) === startDate && formatDate(dataLastDate) === endDate;
            }
            return false;
        }

        // Seed baseline from insarmaps.log template URLs (available before any iframe postMessage).
        function seedBaselineFromInsarmapsUrls(urlList) {
            if (!urlList || !urlList.length) return;
            for (const url of urlList) {
                const p = parseInsarmapsUrlParams(url);
                if (p && p.startDate && p.endDate) {
                    updateBaselineMissionDateRange(p.startDate, p.endDate);
                    if (!logTemplateDateRange) {
                        logTemplateDateRange = { startDate: p.startDate, endDate: p.endDate };
                    }
                }
            }
        }

        // Expand mission baseline from dataset attribute first_date/last_date (never shrink).
        function updateBaselineMissionDateRange(firstDate, lastDate) {
            const first = firstDate instanceof Date ? firstDate : parseDate(firstDate);
            const last = lastDate instanceof Date ? lastDate : parseDate(lastDate);
            if (!first || !last) return;
            if (!baselineMissionDateRange) {
                baselineMissionDateRange = { firstDate: new Date(first), lastDate: new Date(last) };
                return;
            }
            if (first < baselineMissionDateRange.firstDate) {
                baselineMissionDateRange.firstDate = new Date(first);
            }
            if (last > baselineMissionDateRange.lastDate) {
                baselineMissionDateRange.lastDate = new Date(last);
            }
        }

        // True only when user selected the mission-wide full period (baseline from all datasets).
        function isFullMissionDateRange() {
            const startDate = currentMapParams.startDate;
            const endDate = currentMapParams.endDate;
            if (!startDate || !endDate || !baselineMissionDateRange) return false;
            return formatDate(baselineMissionDateRange.firstDate) === startDate &&
                formatDate(baselineMissionDateRange.lastDate) === endDate;
        }

        function isNarrowedDateRange(startDate, endDate) {
            if (!startDate || !endDate) return false;
            if (!baselineMissionDateRange) return true;
            return !(formatDate(baselineMissionDateRange.firstDate) === startDate &&
                formatDate(baselineMissionDateRange.lastDate) === endDate);
        }

        function isDatasetFullDateRangeForIndex(index, startDate, endDate) {
            if (!startDate || !endDate || index < 0) return false;
            const stored = datasetDateRanges.get(index);
            if (stored && stored.firstDate && stored.lastDate) {
                return formatDate(stored.firstDate) === startDate &&
                    formatDate(stored.lastDate) === endDate;
            }
            return false;
        }

        function captureUserNarrowedDateRange(startDate, endDate, senderIndex, source) {
            const idx = senderIndex ?? activeDatasetIdx;
            if (Date.now() < datasetSwitchSuppressUntil && userNarrowedDateRange) {
                return false;
            }
            if (!shouldCaptureAsUserNarrow(idx, startDate, endDate, source)) {
                // #region agent log
                __odt_hook('dbgDisplayLog', 'overlay.html:captureUserNarrowedDateRange', 'period capture rejected', {
                    senderIndex: idx,
                    source: source || null,
                    startDate,
                    endDate,
                    existing: userNarrowedDateRange ? { ...userNarrowedDateRange } : null
                }, 'P');
                // #endregion
                if (userNarrowedDateRange && isWiderOrEqualDateRange(startDate, endDate, userNarrowedDateRange)) {
                }
                return false;
            }
            if (source) periodSelectionSource = source;
            if (source === 'slider') lastSliderCaptureAt = Date.now();
            userNarrowedDateRange = { startDate: startDate, endDate: endDate };
            return true;
        }

        function resolveDatesFromIframeUpdate(senderIndex, rawStartDate, rawEndDate, path) {
            const resolved = {
                startDate: rawStartDate ?? currentMapParams.startDate,
                endDate: rawEndDate ?? currentMapParams.endDate,
                action: 'unchanged'
            };
            if (!rawStartDate || !rawEndDate) return resolved;

            const keptDates = () => ({
                startDate: userNarrowedDateRange?.startDate ?? currentMapParams.startDate,
                endDate: userNarrowedDateRange?.endDate ?? currentMapParams.endDate
            });

            if (senderIndex >= 0 && senderIndex !== activeDatasetIdx) {
                if (shouldCaptureAsUserNarrow(senderIndex, rawStartDate, rawEndDate, 'background-narrow')) {
                    captureUserNarrowedDateRange(rawStartDate, rawEndDate, senderIndex, 'background-narrow');
                    resolved.startDate = userNarrowedDateRange.startDate;
                    resolved.endDate = userNarrowedDateRange.endDate;
                    resolved.action = 'accepted-background-narrow';
                    return resolved;
                }
                const kept = keptDates();
                resolved.startDate = kept.startDate;
                resolved.endDate = kept.endDate;
                resolved.action = (rawStartDate !== kept.startDate || rawEndDate !== kept.endDate)
                    ? 'ignored-background' : 'background-no-date-change';
                return resolved;
            }

            if (senderIndex === activeDatasetIdx) {
                const userDrivenPath = (path === 'url-update-debounced' || path === 'active-postMessage');
                if (Date.now() < datasetSwitchSuppressUntil && userNarrowedDateRange) {
                    resolved.startDate = userNarrowedDateRange.startDate;
                    resolved.endDate = userNarrowedDateRange.endDate;
                    resolved.action = 'rejected-switch-suppress-kept-user';
                    return resolved;
                }
                if (isDatasetFullDateRangeForIndex(senderIndex, rawStartDate, rawEndDate) ||
                    isLogTemplateDateRange(rawStartDate, rawEndDate)) {
                    const kept = keptDates();
                    resolved.startDate = kept.startDate;
                    resolved.endDate = kept.endDate;
                    resolved.action = isLogTemplateDateRange(rawStartDate, rawEndDate)
                        ? 'rejected-log-template-kept-user' : 'rejected-dataset-full-kept-user';
                    return resolved;
                }
                // Keep calendar intent: ignore per-dataset acquisition snap (allow user narrowing further).
                if (!userDrivenPath &&
                    !hasCustomRefPoint(currentMapParams) && userNarrowedDateRange &&
                    (rawStartDate !== userNarrowedDateRange.startDate ||
                        rawEndDate !== userNarrowedDateRange.endDate) &&
                    !isStrictCalendarNarrowing(rawStartDate, rawEndDate, userNarrowedDateRange) &&
                    !isWiderOrEqualDateRange(rawStartDate, rawEndDate, userNarrowedDateRange)) {
                    resolved.startDate = userNarrowedDateRange.startDate;
                    resolved.endDate = userNarrowedDateRange.endDate;
                    resolved.action = 'rejected-acquisition-snap-kept-user';
                    return resolved;
                }
                if (userDrivenPath) {
                    __odt_hook('dbgDisplayLog', 'overlay.html:resolveDatesFromIframeUpdate', 'user-driven path bypassed acquisition-snap reject', {
                        path,
                        rawStartDate,
                        rawEndDate,
                        existingUserPeriod: userNarrowedDateRange ? { ...userNarrowedDateRange } : null
                    }, 'T');
                }
                // Same pattern as colorscale fix: treat active iframe date updates as user-intent,
                // so newer user-selected periods can replace earlier ones (including widened ranges).
                const periodSource = userDrivenPath
                    ? 'slider'
                    : 'iframe-sync';
                // #region agent log
                __odt_hook('dbgDisplayLog', 'overlay.html:resolveDatesFromIframeUpdate', 'period source selected', {
                    path,
                    periodSource,
                    rawStartDate,
                    rawEndDate,
                    existingUserPeriod: userNarrowedDateRange ? { ...userNarrowedDateRange } : null
                }, 'R');
                // #endregion
                if (captureUserNarrowedDateRange(rawStartDate, rawEndDate, senderIndex, periodSource)) {
                    resolved.startDate = rawStartDate;
                    resolved.endDate = rawEndDate;
                    resolved.action = 'captured-user-narrow';
                    return resolved;
                }
                if (userNarrowedDateRange && isWiderOrEqualDateRange(rawStartDate, rawEndDate, userNarrowedDateRange)) {
                    const kept = keptDates();
                    resolved.startDate = kept.startDate;
                    resolved.endDate = kept.endDate;
                    resolved.action = 'rejected-widen-kept-user';
                    // #region agent log
                    __odt_hook('dbgDisplayLog', 'overlay.html:resolveDatesFromIframeUpdate', 'rejected widened period, kept prior period', {
                        senderIndex,
                        path,
                        rawStartDate,
                        rawEndDate,
                        keptStartDate: kept.startDate,
                        keptEndDate: kept.endDate,
                        userNarrowedDateRange: userNarrowedDateRange ? { ...userNarrowedDateRange } : null
                    }, 'Q');
                    // #endregion
                    return resolved;
                }
                if (isNearDatasetOrMissionFullSpan(senderIndex, rawStartDate, rawEndDate)) {
                    const kept = keptDates();
                    resolved.startDate = kept.startDate;
                    resolved.endDate = kept.endDate;
                    resolved.action = 'rejected-near-full-kept-user';
                    return resolved;
                }
                resolved.startDate = rawStartDate;
                resolved.endDate = rawEndDate;
                resolved.action = 'accepted-active';
                return resolved;
            }
            return resolved;
        }

        const lastDateReassertByIndex = new Map();

        function clearRefAppliedForDateSync(index) {
            if (index !== undefined && index >= 0) {
                refAppliedForDateSyncByIndex.delete(index);
            } else {
                refAppliedForDateSyncByIndex.clear();
            }
        }

        function markRefAppliedForDateSync(index) {
            if (index >= 0) refAppliedForDateSyncByIndex.add(index);
        }

        function shouldDeferDateSyncFailure(index, reason) {
            return reason === 'no-ack' &&
                hasCustomRefPoint(currentMapParams) &&
                index === activeDatasetIdx &&
                !refAppliedForDateSyncByIndex.has(index);
        }

        function reassertNarrowedDatesToIframe(index, reason) {
            const dates = effectiveNarrowedDatesForSync();
            if (!dates || index !== activeDatasetIdx || !hasCustomRefPoint(currentMapParams)) return;
            const now = Date.now();
            if (now - (lastDateReassertByIndex.get(index) || 0) < 400) return;
            lastDateReassertByIndex.set(index, now);
            const awaitRef = !refAppliedForDateSyncByIndex.has(index);
            pendingDateSyncByIndex.set(index, {
                startDate: dates.startDate,
                endDate: dates.endDate,
                awaitRef: awaitRef
            });
            if (awaitRef) return;
            tryApplyNarrowedDatesToIframe(index, REASSERT_DATE_SYNC_RETRIES);
        }

        function shouldReassertAfterDateReject(path, resolved) {
            if (path === 'url-update-debounced') return false;
            if (periodSelectionSource === 'slider' && lastSliderCaptureAt &&
                Date.now() - lastSliderCaptureAt < SLIDER_REASSERT_GUARD_MS) {
                return false;
            }
            // Widen rejects are expected while refSwitch iframes load without dates in URL.
            // ref-applied date sync handles the real apply; reassert here fights slider drags.
            if (resolved.action === 'rejected-widen-kept-user') return false;
            if (resolved.action !== 'rejected-dataset-full-kept-user') return false;
            if (!hasCustomRefPoint(currentMapParams)) return false;
            if (!refAppliedForDateSyncByIndex.has(activeDatasetIdx)) return false;
            if (pendingDateSyncByIndex.has(activeDatasetIdx)) return false;
            return true;
        }

        function logDateResolve(senderIndex, rawStartDate, rawEndDate, resolved, path) {
            if (resolved.action === 'unchanged' || resolved.action === 'background-no-date-change') return;
            const willReassert = senderIndex === activeDatasetIdx && shouldReassertAfterDateReject(path, resolved);
            if (willReassert) {
                reassertNarrowedDatesToIframe(senderIndex, resolved.action);
            }
        }

        function narrowedDatesForUrl(mapParams) {
            const out = { startDate: null, endDate: null };
            if (!mapParams) return out;
            const fullStart = baselineMissionDateRange ? formatDate(baselineMissionDateRange.firstDate) : null;
            const fullEnd = baselineMissionDateRange ? formatDate(baselineMissionDateRange.lastDate) : null;
            const hasStart = !!mapParams.startDate;
            const hasEnd = !!mapParams.endDate;
            if (!hasStart || !hasEnd) return out;

            // Keep date params as a pair: insarmaps applies period reliably when both are present.
            const noBaselineYet = !fullStart || !fullEnd;
            const isExactMissionFullRange =
                !noBaselineYet &&
                mapParams.startDate === fullStart &&
                mapParams.endDate === fullEnd;

            if (noBaselineYet || !isExactMissionFullRange) {
                out.startDate = mapParams.startDate;
                out.endDate = mapParams.endDate;
            }
            return out;
        }

        function effectiveNarrowedDatesForSync() {
            if (userNarrowedDateRange) return userNarrowedDateRange;
            if (!currentMapParams.startDate || !currentMapParams.endDate) return null;
            if (isFullMissionDateRange()) return null;
            return {
                startDate: currentMapParams.startDate,
                endDate: currentMapParams.endDate
            };
        }

        // Dates for set-dates after ref ack (includes full mission span — needed to finish deferred recolor).
        function datesForRefRecolorSync() {
            const narrowed = effectiveNarrowedDatesForSync();
            if (narrowed) return narrowed;
            if (currentMapParams.startDate && currentMapParams.endDate) {
                return {
                    startDate: currentMapParams.startDate,
                    endDate: currentMapParams.endDate
                };
            }
            if (baselineMissionDateRange) {
                return {
                    startDate: formatDate(baselineMissionDateRange.firstDate),
                    endDate: formatDate(baselineMissionDateRange.lastDate)
                };
            }
            return null;
        }

        function completeRefRecolorOnIframe(index) {
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.contentWindow) return false;
            try {
                iframe.contentWindow.postMessage({ type: 'insarmaps-complete-ref-recolor' }, '*');
                return true;
            } catch (e) {
                return false;
            }
        }

        // Stable narrowed dates for period warm + dataset switch (prefer userNarrowedDateRange).
        function mapParamsForPeriodSync(mapParams) {
            const narrowed = effectiveNarrowedDatesForSync();
            if (!narrowed || hasCustomRefPoint(mapParams)) return { ...mapParams };
            return { ...mapParams, startDate: narrowed.startDate, endDate: narrowed.endDate };
        }

        function clearPendingDateSync(index) {
            if (index !== undefined && index >= 0) {
                pendingDateSyncByIndex.delete(index);
            } else {
                pendingDateSyncByIndex.clear();
            }
        }

        function logDateSyncFailure(index, retriesLeft, reason, extra) {
            if (retriesLeft > 0) return;
            const pending = pendingDateSyncByIndex.get(index);
            if (shouldDeferDateSyncFailure(index, reason)) {
                if (pending) pending.awaitRef = true;
                if (index === activeDatasetIdx) {
                    const label = iframeLabelForLog(index);
                    updateRefStatusIndicator(
                        `Applying reference point on ${label}… ` +
                        'Map and time series may be incomplete until it finishes.',
                        true
                    );
                    scheduleRefRecoveryWatchdogs(index, 'date-sync-deferred');
                }
                return;
            }
            logSwitchOutcomePart(index, 'dates', false, { reason, startDate: pending && pending.startDate, endDate: pending && pending.endDate });
            clearPendingDateSync(index);
        }

        function onDateSyncApplied(index, startDate, endDate, retriesLeft) {
            clearPendingDateSync(index);
            if (userNarrowedDateRange) {
                currentMapParams.startDate = userNarrowedDateRange.startDate;
                currentMapParams.endDate = userNarrowedDateRange.endDate;
            }
            if (index === activeDatasetIdx && refAppliedForDateSyncByIndex.has(index)) {
                clearRefRecoveryState(index);
            }
            const track = activeSwitchTracking;
            const switchPath = track && track.to === index ? track.switchPath : null;
            const needPointPhase = shouldApplyPointAfterRefSwitch(index, switchPath);
            logSwitchOutcomePart(index, 'dates', true, { startDate, endDate });
            if (needPointPhase) {
                applyPointAfterRefSwitch(index);
                return;
            }
            ensureChartsOpenOnIframe(index);
            if (index === activeDatasetIdx && switchOpInFlight) {
                finishSwitchOp();
            }
        }

        function maybeStartDateSyncAfterRef(index) {
            if (!shouldAcceptRefAppliedForDateSync(index)) {
                return;
            }
            markRefAppliedForDateSync(index);
            cancelRefRecoveryTimers(index);
            refAutoRetryCountByIndex.delete(index);
            updateRefStatusIndicator('', false);
            const dates = datesForRefRecolorSync();
            // set-dates with _deferRefRecolorUntilSetDates pending completes the recolor by
            // itself; sending insarmaps-complete-ref-recolor TOO caused two overlapping
            // recolors whose stale-response race wedged the iframe's recolor machinery.
            if (!dates) {
                completeRefRecolorOnIframe(index);
                return;
            }
            if (!pendingDateSyncByIndex.has(index)) {
                pendingDateSyncByIndex.set(index, {
                    startDate: dates.startDate,
                    endDate: dates.endDate,
                    awaitRef: false,
                    forRefComplete: true
                });
            } else {
                const pending = pendingDateSyncByIndex.get(index);
                pending.startDate = dates.startDate;
                pending.endDate = dates.endDate;
                pending.awaitRef = false;
                pending.forRefComplete = true;
            }
            tryApplyNarrowedDatesToIframe(index);
        }

        // After refSwitch: ask insarmaps iframe to apply dates via postMessage (works cross-origin).
        function tryApplyNarrowedDatesToIframe(index, retriesLeft) {
            if (retriesLeft === undefined) retriesLeft = 30;
            const pending = pendingDateSyncByIndex.get(index);
            if (!pending) return false;
            if (pending.awaitRef) return false;
            const liveDates = effectiveNarrowedDatesForSync();
            if (liveDates) {
                pending.startDate = liveDates.startDate;
                pending.endDate = liveDates.endDate;
            }
            const startDate = pending.startDate;
            const endDate = pending.endDate;
            if (!startDate || !endDate) {
                clearPendingDateSync(index);
                return false;
            }
            if (!pending.forRefComplete && baselineMissionDateRange &&
                formatDate(baselineMissionDateRange.firstDate) === startDate &&
                formatDate(baselineMissionDateRange.lastDate) === endDate) {
                clearPendingDateSync(index);
                return false;
            }
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.contentWindow) {
                logDateSyncFailure(index, retriesLeft, 'no-iframe', {});
                if (retriesLeft > 0) {
                    setTimeout(() => {
                        if (pendingDateSyncByIndex.has(index)) tryApplyNarrowedDatesToIframe(index, retriesLeft - 1);
                    }, 300);
                }
                return false;
            }
            try {
                iframe.contentWindow.postMessage({
                    type: 'insarmaps-set-dates',
                    startDate: startDate,
                    endDate: endDate
                }, '*');
                if (retriesLeft > 0) {
                    setTimeout(() => {
                        if (pendingDateSyncByIndex.has(index)) tryApplyNarrowedDatesToIframe(index, retriesLeft - 1);
                    }, 300);
                } else {
                    logDateSyncFailure(index, 0, 'no-ack', {});
                }
                return true;
            } catch (e) {
                logDateSyncFailure(index, retriesLeft, 'exception', { error: String(e) });
                if (retriesLeft > 0) {
                    setTimeout(() => {
                        if (pendingDateSyncByIndex.has(index)) tryApplyNarrowedDatesToIframe(index, retriesLeft - 1);
                    }, 300);
                }
                return false;
            }
        }

        function scheduleNarrowedDateSync(index, reason) {
            const dates = effectiveNarrowedDatesForSync();
            const awaitRef = hasCustomRefPoint(currentMapParams);
            if (!dates) return;
            pendingDateSyncByIndex.set(index, {
                startDate: dates.startDate,
                endDate: dates.endDate,
                awaitRef: awaitRef
            });
            if (!awaitRef) {
                tryApplyNarrowedDatesToIframe(index);
            } else {
                if (index === activeDatasetIdx) {
                    scheduleRefRecoveryWatchdogs(index, reason);
                }
                setTimeout(() => {
                    const pending = pendingDateSyncByIndex.get(index);
                    if (!pending || !pending.awaitRef || index !== activeDatasetIdx) return;
                    if (hasCustomRefPoint(currentMapParams) && !refAppliedForDateSyncByIndex.has(index)) {
                        scheduleRefRecoveryWatchdogs(index, 'ref-await-watchdog');
                        return;
                    }
                    pending.awaitRef = false;
                    tryApplyNarrowedDatesToIframe(index);
                }, REF_AWAIT_WATCHDOG_MS);
            }
        }

        // Phase 2 after refSwitch: second URL load with dates+ref (sarvey, mission full period only).
        // Per-dataset attribute span or narrowed period + dates+ref in URL breaks custom ref on load.
        // Mintpy always skips phase 2.
        function shouldRunDateAfterRef(datasetIndex) {
            const dataset = iframeDatasets.get(datasetIndex);
            if (!hasCustomRefPoint(currentMapParams)) return false;
            if (!currentMapParams.startDate || !currentMapParams.endDate) return false;
            if (isMintpyDataset(dataset)) return false;
            if (!isFullMissionDateRange()) return false;
            return true;
        }

        // Custom-ref iframe loads: sarvey-style minimal URL for refSwitch (ref+point+scales only).
        // Mintpy insarmaps.log adds colorscale, dates, contours, pixelSize on cross-dataset URLs;
        // those race with ref recolor. dateAfterRef phase adds dates back without template extras.
        function mapParamsForIframeLoad(mapParams, loadKind) {
            const p = { ...mapParams };
            if (!hasCustomRefPoint(mapParams)) {
                return p;
            }
            if (loadKind === 'crossDataset' || loadKind === 'refSwitch' || loadKind === 'refSwitchNoPoint' ||
                loadKind === 'dateAfterRef' || loadKind === 'pointAfterRef') {
                p.colorscale = null;
            }
            if (loadKind === 'refSwitch' || loadKind === 'refSwitchNoPoint') {
                p.startDate = null;
                p.endDate = null;
            }
            // Horz/Vert: point-before-ref on cold tiles blocks ref; omit point on first load.
            if (loadKind === 'refSwitchNoPoint') {
                p.pointLat = null;
                p.pointLon = null;
            }
            // Dates in pointAfterRef URL race ref recolor (same as refSwitch); parent sends set-dates after ref ack.
            if (loadKind === 'pointAfterRef') {
                p.startDate = null;
                p.endDate = null;
            }
            if (loadKind === 'dateAfterRef') {
                p.contour = null;
                p.pixelSize = null;
            }
            return p;
        }

        function paramsForDatasetSwitch(index) {
            return mapParamsForIframeLoad(
                mapParamsForPeriodSync(mapParamsWithOverlayUserDisplay(currentMapParams)),
                'crossDataset'
            );
        }

        // Whether target iframe already matches overlay state (no reload / postMessage needed on switch).
        // iframe.src is authoritative for what a background iframe shows (the reconciler is the only
        // writer), so a canonical URL compare replaces per-param staleness checks.
        function getDatasetIframeSyncStatus(index) {
            const iframe = document.getElementById(`iframe${index}`);
            const dataset = iframeDatasets.get(index);
            const iframeParams = paramsForDatasetSwitch(index);
            const src = iframe?.src ? iframeEffectiveUrl(index) : null;
            let desiredUrl = null;
            if (dataset && currentMapParams.lat && currentMapParams.lon && currentMapParams.zoom) {
                desiredUrl = buildInsarmapsUrl(
                    baseUrl, dataset,
                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                    iframeParams, `ds${index}`, false, false
                );
            }
            const urlMatch = !!(desiredUrl && src && insarmapsUrlsEquivalent(src, desiredUrl));
            const wantRef = hasCustomRefPoint(currentMapParams);
            // Point/ref reach backgrounds via set-point/set-ref postMessages and get snapped
            // per dataset, so URL strings never match exactly — compare the view ignoring
            // selections (like the reconciler) and judge point/ref via channel state instead.
            const viewMatch = !!(desiredUrl && src &&
                insarmapsUrlsEquivalentIgnoringSelections(src, desiredUrl, wantRef));
            const inFlightEntry = bgLoadInFlightEntry(index);
            const inFlight = !!inFlightEntry;
            const inFlightMatchesDesired = !!(inFlight && desiredUrl &&
                inFlightEntry.url === canonicalInsarmapsUrl(desiredUrl));
            const pointMatch = pointAppliedOnIframe(index, iframeParams);
            const sel = snapshotPointRefOnIframe(index) || {};
            let refMatch;
            if (wantRef) {
                const appliedRef = bgRefAppliedByIndex.get(index);
                const wantRefCoords = effectiveRefCoords() || currentMapParams;
                refMatch = !!(appliedRef && refCoordsMatch(
                    appliedRef.refPointLat, appliedRef.refPointLon,
                    wantRefCoords.refPointLat, wantRefCoords.refPointLon));
            } else {
                // No custom ref wanted: the iframe must not still be custom-referenced.
                refMatch = !(sel.refPointLat && sel.refPointLon) && !bgRefAppliedByIndex.has(index);
            }
            // Dates the iframe effectively shows: last set-dates postMessage wins over URL dates.
            const haveDates = bgAppliedDates.get(index) || datesFromIframeSrc(src) || null;
            const wantDates = narrowedDatesForUrl(iframeParams);
            const narrowed = effectiveNarrowedDatesForSync();
            const datesSettled =
                (!wantDates.startDate && (!haveDates || !haveDates.startDate)) ||
                !!(wantDates.startDate && haveDates &&
                    periodRangesClose(haveDates, wantDates)) ||
                !!(narrowed && haveDates && periodRangesClose(haveDates, narrowed));
            const fullySynced = !inFlight && viewMatch && refMatch && pointMatch && datesSettled;
            return {
                iframeParams, desiredUrl, urlMatch, viewMatch, refMatch, pointMatch,
                haveDates, datesSettled, fullySynced, inFlight, inFlightMatchesDesired
            };
        }

        function cachedSwitchStateForIndex(index) {
            const reported = lastReportedDatesByIndex.get(index);
            const fromUrl = snapshotPointRefOnIframe(index);
            const cachedPoint = index >= 0 ? lastKnownPointByIndex.get(index) : null;
            if (!reported?.startDate && !fromUrl && !cachedPoint) return null;
            return {
                startDate: reported?.startDate ?? null,
                endDate: reported?.endDate ?? null,
                datesNarrowed: !!(reported && reported.datesNarrowed),
                pointLat: fromUrl?.pointLat ?? cachedPoint?.pointLat ?? null,
                pointLon: fromUrl?.pointLon ?? cachedPoint?.pointLon ?? null,
                refPointLat: fromUrl?.refPointLat ?? null,
                refPointLon: fromUrl?.refPointLon ?? null,
                hasCustomRef: !!(fromUrl?.refPointLat && fromUrl?.refPointLon) ||
                    (index >= 0 && lastKnownRefByIndex.has(index)),
                chartsVisible: null,
                refAppliedInternal: !!(fromUrl?.refPointLat && fromUrl?.refPointLon),
                source: 'cached'
            };
        }

        // On dataset switch (default ref): decide skip / set-dates postMessage / await preload / reload.
        function syncDatasetIframeOnSwitch(index, fromState) {
            const dataset = iframeDatasets.get(index);
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !dataset) return { reloaded: false, path: 'no-iframe' };
            if (!currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                ensureDatasetIframeLoaded(index, 'switch-load');
                return { reloaded: false, path: 'switch-load' };
            }
            const status = getDatasetIframeSyncStatus(index);
            const narrowed = effectiveNarrowedDatesForSync();
            const fromStateDates = (fromState && fromState.startDate && fromState.endDate)
                ? { startDate: fromState.startDate, endDate: fromState.endDate }
                : null;
            const switchDates = fromStateDates || narrowed;
            // A background preload with the current params is still loading: reveal when it finishes
            // instead of restarting the load (returning reloaded=true defers reveal to onload).
            if (status.inFlight && status.inFlightMatchesDesired) {
                console.log(`[overlay] dataset switch AWAIT-PRELOAD ${iframeLabelForLog(index)}`);
                if (switchDates) {
                    iframe.addEventListener('load', () => {
                        applyDatesToIframeOnSwitch(index, switchDates.startDate, switchDates.endDate);
                    }, { once: true });
                }
                return { reloaded: true, path: 'await-preload' };
            }
            // Point staleness does not force a reload here: syncPointToIframeIfStale runs right
            // after this and applies the point via set-point postMessage when supported.
            if (!status.inFlight && status.viewMatch && status.refMatch) {
                const datesSettled = !switchDates ||
                    (status.haveDates && periodRangesClose(status.haveDates, switchDates)) ||
                    status.datesSettled;
                if (datesSettled) {
                    console.log(`[overlay] dataset switch SKIP reload ${iframeLabelForLog(index)}  (iframe already synced)`);
                    if (!pendingDateSyncByIndex.has(index)) {
                        const iframeDates = status.haveDates || snapshotPeriodOnIframe(index);
                        const ok = !switchDates || !!(iframeDates && (periodRangesClose(switchDates, iframeDates) ||
                            (narrowed && periodRangesClose(narrowed, iframeDates))));
                        logSwitchOutcomePart(index, 'dates', ok, iframeDates || {});
                    }
                    return { reloaded: false, path: 'skip-synced' };
                }
                // Same view, different period: postMessage set-dates — insarmaps snaps per dataset
                // without an iframe reload flash.
                applyDatesToIframeOnSwitch(index, switchDates.startDate, switchDates.endDate);
                bgAppliedDates.set(index, { startDate: switchDates.startDate, endDate: switchDates.endDate });
                console.log(`[overlay] dataset switch SET-DATES ${iframeLabelForLog(index)}  (no-reload)`);
                return { reloaded: false, path: 'set-dates' };
            }
            const reloaded = reloadDatasetIframe(index, 'switch-dataset', 'crossDataset');
            return { reloaded: reloaded, path: 'crossDataset-reload' };
        }

        function expandDatasetNameLine(datasetName, templateUrl) {
            const u = new URL(templateUrl);
            u.searchParams.set('startDataset', datasetName.trim());
            TEMPLATE_PARAMS_STRIP_ON_EXPAND.forEach((key) => u.searchParams.delete(key));
            return u.toString();
        }

        function parseInsarmapsLogUrls(data) {
            const lines = data.split('\n').map((line) => line.trim()).filter(Boolean);
            let templateUrl = null;
            const urls = [];
            for (const line of lines) {
                if (isFullInsarmapsLogUrl(line)) {
                    if (!isValidInsarmapsLogUrl(line)) continue;
                    if (!templateUrl) templateUrl = line;
                    urls.push(line);
                    continue;
                }
                if (isDatasetNameOnlyLine(line)) {
                    if (!templateUrl) {
                        console.warn('[overlay] insarmaps.log: dataset name before template URL, skipped:', line);
                        continue;
                    }
                    const expanded = expandDatasetNameLine(line, templateUrl);
                    if (expanded && isValidInsarmapsLogUrl(expanded)) {
                        urls.push(expanded);
                    } else {
                        console.warn('[overlay] insarmaps.log: could not expand dataset name:', line);
                    }
                    continue;
                }
                if (line.includes('startDataset=') && templateUrl) {
                    try {
                        const origin = new URL(templateUrl).origin;
                        const path = line.startsWith('/start/') ? line : `/start/${line.replace(/^\//, '')}`;
                        const expanded = new URL(path, origin).toString();
                        if (isValidInsarmapsLogUrl(expanded)) urls.push(expanded);
                    } catch (e) {
                        console.warn('[overlay] insarmaps.log: could not parse partial URL line:', line);
                    }
                }
            }
            return urls;
        }

        function navigateToPreviousPage() {
            const ref = document.referrer || '';
            const cameFromOverlay = ref.includes('overlay.html') || ref.includes('index.html');
            if (ref && !cameFromOverlay) {
                window.location.replace(ref);
                return;
            }
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        }

        function showInsarmapsLogError(detail) {
            if (insarmapsLogErrorShown) return;
            insarmapsLogErrorShown = true;
            insarmapsLogResolved = true;
            const loading = document.getElementById('loading');
            if (loading) {
                loading.textContent = INSARMAPS_LOG_USER_ERROR + ' Returning to previous page...';
                loading.style.color = '#c62828';
                loading.style.display = '';
            }
            console.error('insarmaps.log error:', detail);
            setTimeout(navigateToPreviousPage, INSARMAPS_LOG_ERROR_REDIRECT_MS);
        }
        
        // Generate a sync key from current params
        function getSyncKey(params) {
            const scaleState = scaleStateFromMapParams(params);
            const autoColorScale = scaleState.autoColorScale;
            const autoActive = isAutoColorScaleMode(autoColorScale);
            return JSON.stringify({
                lat: params.lat,
                lon: params.lon,
                zoom: params.zoom,
                autoColorScale: autoColorScale,
                minScale: autoActive ? null : scaleState.minScale,
                maxScale: autoActive ? null : scaleState.maxScale,
                startDate: params.startDate,
                endDate: params.endDate,
                pixelSize: params.pixelSize,
                background: params.background,
                opacity: params.opacity,
                contour: effectiveContour(params),
                colorscale: effectiveColorscale(params),
                refPointLat: params.refPointLat,
                refPointLon: params.refPointLon,
                pointLat: params.pointLat,
                pointLon: params.pointLon
            });
        }

        function applyDatesToIframeOnSwitch(index, startDate, endDate, options) {
            if (!startDate || !endDate) return false;
            pendingDateSyncByIndex.set(index, {
                startDate: startDate,
                endDate: endDate,
                awaitRef: false,
                // forRefComplete also disables the full-mission-span bail in
                // tryApplyNarrowedDatesToIframe — needed when widening back to full period.
                forRefComplete: !!(options && options.allowFullSpan)
            });
            return tryApplyNarrowedDatesToIframe(index);
        }

        function getPointKey(params) {
            return JSON.stringify({
                pointLat: params.pointLat ?? null,
                pointLon: params.pointLon ?? null,
                refPointLat: params.refPointLat ?? null,
                refPointLon: params.refPointLon ?? null
            });
        }

        function hasPointSelection(params) {
            return getPointKey(params) !== getPointKey({});
        }

        function datesFromIframeSrc(src) {
            if (!src) return null;
            try {
                const u = new URL(src, window.location.href);
                return {
                    startDate: u.searchParams.get('startDate'),
                    endDate: u.searchParams.get('endDate')
                };
            } catch (e) {
                return null;
            }
        }

        // ===== BACKGROUND IFRAME SYNC (reconciler) =====
        // One mechanism replaces all pre-warm scheduling: whenever currentMapParams changes,
        // scheduleBackgroundSync() runs reconcileBackgroundIframes(), which brings every
        // non-active dataset iframe to the current desired state. Staleness is decided by
        // comparing iframe.src to the desired URL (canonical compare); loads in flight are
        // tracked in iframeLoadInFlight and each onload re-runs the reconciler, so a state
        // change during a load is never dropped — the iframe simply chases the latest state.

        function bgLoadInFlightEntry(index) {
            const entry = iframeLoadInFlight.get(index);
            if (!entry) return null;
            if (Date.now() - entry.at > BG_LOAD_STUCK_MS) {
                iframeLoadInFlight.delete(index);
                updateLoadingIndicator();
                return null;
            }
            return entry;
        }

        // ~13m tolerance: point/ref coords go through toFixed(5) and feature snapping in
        // insarmaps; string equality would treat the same selection as stale.
        function coordsClose(aLat, aLon, bLat, bLon) {
            if (aLat == null || aLon == null || bLat == null || bLon == null) return false;
            return Math.abs(parseFloat(aLat) - parseFloat(bLat)) < 1.2e-4 &&
                Math.abs(parseFloat(aLon) - parseFloat(bLon)) < 1.2e-4;
        }

        // Any iframe reload invalidates everything applied to it via postMessage,
        // and its last live URL (the fresh document will post a new one).
        function noteIframeReloadStarted(index) {
            iframeLiveUrl.delete(index);
            bgAppliedDates.delete(index);
            bgAppliedPoint.delete(index);
            setPointAttemptsByIndex.delete(index);
            bgRefAppliedByIndex.delete(index);
            bgRefPendingByIndex.delete(index);
            bgRefFailedAt.delete(index);
            const t = setPointAckTimerByIndex.get(index);
            if (t) {
                clearTimeout(t);
                setPointAckTimerByIndex.delete(index);
            }
        }

        // What the iframe actually shows: its own last posted URL beats the load-time src.
        function iframeEffectiveUrl(index) {
            return iframeLiveUrl.get(index) ||
                document.getElementById(`iframe${index}`)?.src || null;
        }

        function recordIframeLiveUrl(index, urlPath) {
            if (index < 0 || !urlPath) return;
            // Messages from a document we are already navigating away from are stale.
            if (iframeLoadInFlight.has(index)) return;
            // Early in an iframe's life insarmaps can post a bare /start/... URL without query
            // params (dataset not loaded yet); recording it would make the iframe look stale.
            if (!/[?&]startDataset=/.test(urlPath)) return;
            try {
                iframeLiveUrl.set(index, new URL(urlPath, baseUrl || window.location.href).toString());
            } catch (e) {}
        }

        function sendSetPointToIframe(index, pointLat, pointLon) {
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.contentWindow) return false;
            const attemptKey = `${pointLat},${pointLon}`;
            const prevAttempt = setPointAttemptsByIndex.get(index);
            const attemptCount = (prevAttempt && prevAttempt.key === attemptKey) ? prevAttempt.count + 1 : 1;
            setPointAttemptsByIndex.set(index, { key: attemptKey, count: attemptCount });
            bgAppliedPoint.set(index, { pointLat: String(pointLat), pointLon: String(pointLon) });
            try {
                iframe.contentWindow.postMessage({
                    type: 'insarmaps-set-point',
                    pointLat: String(pointLat),
                    pointLon: String(pointLon)
                }, '*');
            } catch (e) {
                bgAppliedPoint.delete(index);
                return false;
            }
            console.log(`[overlay] iframe SET-POINT ${iframeLabelForLog(index)}  attempt=${attemptCount}`, { pointLat, pointLon });
            if (setPointSupport === 'unknown') {
                const old = setPointAckTimerByIndex.get(index);
                if (old) clearTimeout(old);
                setPointAckTimerByIndex.set(index, setTimeout(() => {
                    setPointAckTimerByIndex.delete(index);
                    if (setPointSupport !== 'unknown') return;
                    // No ack: insarmaps server without set-point support — reload-based sync.
                    setPointSupport = 'no';
                    bgAppliedPoint.delete(index);
                    console.log('[overlay] insarmaps-set-point unsupported (no ack); using reloads');
                    scheduleBackgroundSync('set-point-unsupported');
                }, SET_POINT_ACK_TIMEOUT_MS));
            }
            return true;
        }

        function sendSetRefToIframe(index, refLat, refLon) {
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.contentWindow) return false;
            try {
                iframe.contentWindow.postMessage({
                    type: 'insarmaps-set-ref',
                    refPointLat: String(refLat),
                    refPointLon: String(refLon)
                }, '*');
            } catch (e) {
                return false;
            }
            console.log(`[overlay] iframe SET-REF ${iframeLabelForLog(index)}`, { refLat, refLon });
            bgRefPendingByIndex.set(index, { at: Date.now(), received: false });
            return true;
        }

        // Point effectively on the iframe: last set-point postMessage wins over the load URL.
        function pointAppliedOnIframe(index, params) {
            if (!(params && params.pointLat && params.pointLon)) return true;
            const sel = snapshotPointRefOnIframe(index) || {};
            const have = bgAppliedPoint.get(index) ||
                ((sel.pointLat && sel.pointLon) ? { pointLat: sel.pointLat, pointLon: sel.pointLon } : null);
            return !!(have && coordsClose(have.pointLat, have.pointLon, params.pointLat, params.pointLon));
        }

        // After ref-applied from a background warm/set-ref, finish what the two-phase switch
        // would do: complete the deferred map recolor and apply the current period. This is what
        // makes a later switch to that dataset instant (no refSwitch reload needed).
        function completeBackgroundRefWarm(index) {
            const dates = datesForRefRecolorSync();
            // One recolor trigger only: set-dates completes the deferred ref recolor itself
            // (see maybeStartDateSyncAfterRef); complete-ref-recolor is the no-dates fallback.
            if (dates) {
                applyDatesToIframeOnSwitch(index, dates.startDate, dates.endDate, { allowFullSpan: true });
