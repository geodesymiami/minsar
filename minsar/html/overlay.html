                bgAppliedDates.set(index, { startDate: dates.startDate, endDate: dates.endDate });
            } else {
                completeRefRecolorOnIframe(index);
            }
            // The ref channel blocks point/date sync while a ref is pending; now that this
            // iframe's ref landed, re-run the reconciler to deliver whatever queued up behind
            // it (e.g. a point clicked while the set-ref was still applying).
            scheduleBackgroundSync('after-ref-warm');
        }

        // A custom-ref dataset switch may skip the refSwitch force reload when the target
        // background already confirmed this exact ref via insarmaps-ref-applied.
        function backgroundRefWarmQualified(index) {
            const notQualified = (reason) => {
                console.log(`[overlay] ref-warm NOT qualified ${iframeLabelForLog(index)}: ${reason}`);
                return false;
            };
            const ref = effectiveRefCoords();
            if (!ref) return notQualified('no-effective-ref');
            const applied = bgRefAppliedByIndex.get(index);
            // refCoordsMatch, not coordsClose: the ack carries per-dataset snapped coords.
            if (!applied) return notQualified('no-ref-ack');
            if (!refCoordsMatch(applied.refPointLat, applied.refPointLon, ref.refPointLat, ref.refPointLon)) {
                return notQualified(`ref-ack-coords-mismatch (${applied.refPointLat},${applied.refPointLon} vs ${ref.refPointLat},${ref.refPointLon})`);
            }
            if (bgLoadInFlightEntry(index)) return notQualified('load-in-flight');
            const iframe = document.getElementById(`iframe${index}`);
            const dataset = iframeDatasets.get(index);
            if (!iframe || !iframe.src || !dataset ||
                !currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                return notQualified('not-loaded');
            }
            const desiredUrl = buildInsarmapsUrl(
                baseUrl, dataset,
                currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                desiredBackgroundParams(), `ds${index}`, false, false
            );
            if (!insarmapsUrlsEquivalentIgnoringSelections(iframeEffectiveUrl(index), desiredUrl, true)) {
                return notQualified(`view-mismatch (have ${canonicalInsarmapsUrl(iframeEffectiveUrl(index), { ignoreSelections: true, ignoreColorscaleContours: true })} want ${canonicalInsarmapsUrl(desiredUrl, { ignoreSelections: true, ignoreColorscaleContours: true })})`);
            }
            if (hasTimeSeriesPoint(currentMapParams) &&
                !pointAppliedOnIframe(index, currentMapParams)) {
                // Per-dataset snapping can echo the SAME selection back with coords ~a grid
                // cell away, shifting currentMapParams after the target was already synced.
                // If this iframe's last set-point was acked ok (applied entry present, no
                // failed attempts), a corrective set-point beats reloading a healthy iframe.
                const ackedOk = bgAppliedPoint.has(index) && !setPointAttemptsByIndex.has(index);
                if (!(ackedOk && setPointSupport === 'yes' &&
                    currentMapParams.pointLat && currentMapParams.pointLon)) {
                    return notQualified('point-not-applied');
                }
                console.log(`[overlay] ref-warm point drift on ${iframeLabelForLog(index)}: correcting via set-point (no reload)`);
                sendSetPointToIframe(index, currentMapParams.pointLat, currentMapParams.pointLon);
            }
            return true;
        }

        // Params every background iframe should converge to. Custom ref uses the minimal
        // refSwitch URL (no dates/colorscale — they race the ref recolor in insarmaps).
        function desiredBackgroundParams() {
            const p = mapParamsForPeriodSync(mapParamsWithOverlayUserDisplay(currentMapParams));
            const effRef = effectiveRefCoords();
            if (effRef) {
                p.refPointLat = effRef.refPointLat;
                p.refPointLon = effRef.refPointLon;
            }
            return mapParamsForIframeLoad(p, hasCustomRefPoint(p) ? 'refSwitch' : 'crossDataset');
        }

        function cancelScheduledBackgroundSync() {
            if (bgSyncTimer) {
                clearTimeout(bgSyncTimer);
                bgSyncTimer = null;
            }
        }

        function scheduleBackgroundSync(reason, options) {
            options = options || {};
            cancelScheduledBackgroundSync();
            if (options.immediate) {
                reconcileBackgroundIframes(reason);
                return;
            }
            bgSyncTimer = setTimeout(() => {
                bgSyncTimer = null;
                reconcileBackgroundIframes(reason);
            }, options.delayMs || BG_SYNC_DEBOUNCE_MS);
        }

        // Start (or restart) a background iframe load towards the desired state.
        function loadBackgroundIframe(index, desiredUrl, reason) {
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe) return false;
            const label = iframeLabelForLog(index);
            console.log(`[overlay] iframe RELOAD ${label}  reason=${reason}`, {
                to: canonicalInsarmapsUrl(desiredUrl)
            });
            noteIframeReloadStarted(index);
            iframe.onload = () => {
                iframeLoadInFlight.delete(index);
                updateLoadingIndicator();
                console.log(`[overlay] iframe LOADED ${label}  reason=${reason}`);
                broadcastAutoColorScaleToIframes(index);
                broadcastColorscaleToIframes(index);
                maybeResolveSwitchDatesOnIframeLoad(index);
                if (hasCustomRefPoint(currentMapParams) && shouldRunDateAfterRef(index)) {
                    reloadDatasetIframe(index, `${reason}-dates-after-ref`, 'dateAfterRef', { skipDatePhase: true });
                    return;
                }
                // State may have moved on while this load ran; chase it.
                scheduleBackgroundSync('after-background-load', { immediate: true });
            };
            iframe.src = desiredUrl;
            iframeLoadInFlight.set(index, { url: canonicalInsarmapsUrl(desiredUrl), at: Date.now() });
            updateLoadingIndicator();
            return true;
        }

        function reconcileBackgroundIframes(reason) {
            if (!currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) return;
            if (hasPartialCustomRef(currentMapParams)) return;
            if (typeof timeControlsActive !== 'undefined' && timeControlsActive) return;
            // Mid-switch the target iframe is loading and needs the bandwidth; retry shortly after.
            if (switchOpInFlight) {
                scheduleBackgroundSync(reason, { delayMs: BG_SYNC_RETRY_AFTER_SWITCH_MS });
                return;
            }
            const desired = desiredBackgroundParams();
            const customRef = hasCustomRefPoint(desired);
            iframeDatasets.forEach((dataset, index) => {
                if (index === activeDatasetIdx) return;
                if (activeSwitchTracking && activeSwitchTracking.to === index) return;
                if (pointAfterRefInFlightByIndex.has(index)) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !dataset) return;
                const desiredUrl = buildInsarmapsUrl(
                    baseUrl, dataset,
                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                    desired, `ds${index}`, false, false
                );
                const desiredCanon = canonicalInsarmapsUrl(desiredUrl);
                const inFlight = bgLoadInFlightEntry(index);
                if (inFlight && inFlight.url === desiredCanon) return; // already loading exactly this
                if (!iframe.src) {
                    loadBackgroundIframe(index, desiredUrl, `${reason}:initial`);
                    return;
                }
                if (inFlight) {
                    // In flight towards a stale state: restart with the latest params.
                    loadBackgroundIframe(index, desiredUrl, reason);
                    return;
                }
                const effUrl = iframeEffectiveUrl(index);
                // View or display params differ: only a reload can fix those.
                if (!insarmapsUrlsEquivalentIgnoringSelections(effUrl, desiredUrl, customRef)) {
                    loadBackgroundIframe(index, desiredUrl, reason);
                    return;
                }
                const sel = snapshotPointRefOnIframe(index) || {};
                // ── Ref channel (first: dates/point must never be synced ahead of a pending ref).
                if (customRef) {
                    // Ref identity uses refCoordsMatch (~0.002°): insarmaps snaps the ref to each
                    // dataset's nearest measurement point, so acked coords sit tens of meters from
                    // the sent ones — the tight point tolerance would loop set-ref forever.
                    const applied = bgRefAppliedByIndex.get(index);
                    const refReady = !!(applied && refCoordsMatch(
                        applied.refPointLat, applied.refPointLon,
                        desired.refPointLat, desired.refPointLon));
                    if (!refReady) {
                        const failed = bgRefFailedAt.get(index);
                        if (failed && Date.now() - failed.at < SET_REF_FAILED_BACKOFF_MS &&
                            (!failed.refPointLat || refCoordsMatch(
                                failed.refPointLat, failed.refPointLon,
                                desired.refPointLat, desired.refPointLon))) {
                            // This ref just failed on this iframe; retrying here would loop.
                            // The dataset switch falls back to the force-reload refSwitch path.
                            return;
                        }
                        if (refCoordsMatch(sel.refPointLat, sel.refPointLon,
                            desired.refPointLat, desired.refPointLon)) {
                            // Loaded with this ref in the URL; insarmaps is still applying it
                            // (ref-applied / ref-failed will follow). Leave it alone.
                            return;
                        }
                        const pending = bgRefPendingByIndex.get(index);
                        if (pending) {
                            if (!pending.received &&
                                Date.now() - pending.at > SET_REF_PENDING_TIMEOUT_MS) {
                                // No receipt: server without set-ref support — URL reload fallback.
                                bgRefPendingByIndex.delete(index);
                                loadBackgroundIframe(index, desiredUrl, `${reason}:set-ref-fallback`);
                            }
                            return; // still waiting for insarmaps-ref-applied
                        }
                        sendSetRefToIframe(index, desired.refPointLat, desired.refPointLon);
                        return;
                    }
                } else if (sel.refPointLat && sel.refPointLon) {
                    // Ref removed by the user but iframe still referenced: clean reload.
                    loadBackgroundIframe(index, desiredUrl, `${reason}:ref-cleared`);
                    return;
                }
                // ── Point channel.
                const wantPoint = (desired.pointLat && desired.pointLon)
                    ? { pointLat: desired.pointLat, pointLon: desired.pointLon } : null;
                const havePoint = bgAppliedPoint.get(index) ||
                    ((sel.pointLat && sel.pointLon) ? { pointLat: sel.pointLat, pointLon: sel.pointLon } : null);
                if (wantPoint) {
                    const pointOk = !!(havePoint && coordsClose(
                        havePoint.pointLat, havePoint.pointLon, wantPoint.pointLat, wantPoint.pointLon));
                    if (!pointOk) {
                        const wantKey = `${wantPoint.pointLat},${wantPoint.pointLon}`;
                        const attempt = setPointAttemptsByIndex.get(index);
                        const exhausted = !!(attempt && attempt.key === wantKey &&
                            attempt.count >= SET_POINT_MAX_ATTEMPTS);
                        if (setPointSupport === 'no' || exhausted) {
                            // set-point unavailable or repeatedly failing on this iframe:
                            // one URL reload delivers the point reliably (applies pre-recolor).
                            loadBackgroundIframe(index, desiredUrl, `${reason}:point${exhausted ? '-fallback' : ''}`);
                            return;
                        }
                        sendSetPointToIframe(index, wantPoint.pointLat, wantPoint.pointLon);
                        // fall through: dates can sync alongside the point
                    }
                } else if (havePoint) {
                    // Point deselected: insarmaps has no unselect API — reload for cleanliness.
                    loadBackgroundIframe(index, desiredUrl, `${reason}:point-cleared`);
                    return;
                }
                // ── Dates channel. Under custom ref the URL carries no dates (refSwitch kind);
                // the target period is what phase-2 of a switch would apply.
                const wantDates = customRef ? datesForRefRecolorSync() : narrowedDatesForUrl(desired);
                const haveDates = bgAppliedDates.get(index) || datesFromIframeSrc(effUrl);
                let target = null;
                if (wantDates && wantDates.startDate) {
                    if (!haveDates || !periodRangesClose(haveDates, wantDates)) target = wantDates;
                } else if (haveDates && haveDates.startDate && baselineMissionDateRange) {
                    const full = {
                        startDate: formatDate(baselineMissionDateRange.firstDate),
                        endDate: formatDate(baselineMissionDateRange.lastDate)
                    };
                    if (!periodRangesClose(haveDates, full)) target = full;
                }
                if (target) {
                    console.log(`[overlay] iframe SET-DATES ${iframeLabelForLog(index)}  reason=${reason}`, target);
                    applyDatesToIframeOnSwitch(index, target.startDate, target.endDate,
                        { allowFullSpan: !(wantDates && wantDates.startDate) });
                    bgAppliedDates.set(index, { startDate: target.startDate, endDate: target.endDate });
                }
            });
        }
        // ===== END BACKGROUND IFRAME SYNC =====

        // Load a dataset iframe on demand (deferred backgrounds or early dataset switch).
        function ensureDatasetIframeLoaded(index, reason) {
            const iframe = document.getElementById(`iframe${index}`);
            const dataset = iframeDatasets.get(index);
            if (!iframe || !dataset) return;
            if (iframe.src) return;
            const hasCoords = currentMapParams.lat && currentMapParams.lon && currentMapParams.zoom;
            let newUrl;
            if (hasCoords) {
                newUrl = buildInsarmapsUrl(
                    baseUrl, dataset,
                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                    mapParamsForIframeLoad(currentMapParams, index !== activeDatasetIdx ? 'crossDataset' : 'default'),
                    `ds${index}`, false, false
                );
            } else {
                const url = urlsList[index];
                if (!url) return;
                newUrl = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
            }
            if (setIframeSrc(iframe, newUrl, { label: iframeLabelForLog(index), reason })) {
                noteIframeReloadStarted(index);
                iframeLoadInFlight.set(index, { url: canonicalInsarmapsUrl(newUrl), at: Date.now() });
                updateLoadingIndicator();
                iframe.onload = () => {
                    iframeLoadInFlight.delete(index);
                    updateLoadingIndicator();
                    console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                    scheduleBackgroundSync('after-ensure-load');
                };
            }
        }

        // Force iframe reload with ref-focused params (mintpy asc needs minimal URL like sarvey).
        function reloadDatasetIframe(index, reason, loadKind, reloadOptions) {
            reloadOptions = reloadOptions || {};
            const dataset = iframeDatasets.get(index);
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !dataset || !currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                return false;
            }
            const syncParams = mapParamsForPeriodSync(mapParamsWithOverlayUserDisplay(currentMapParams));
            const effRef = effectiveRefCoords();
            if (effRef) {
                syncParams.refPointLat = effRef.refPointLat;
                syncParams.refPointLon = effRef.refPointLon;
            }
            const iframeParams = mapParamsForIframeLoad(syncParams, loadKind);
            const newUrl = buildInsarmapsUrl(
                baseUrl, dataset,
                currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                iframeParams, `ds${index}`, false, false
            );
            console.log(`[overlay] iframe RELOAD ${iframeLabelForLog(index)}  reason=${reason}`, {
                to: canonicalInsarmapsUrl(newUrl)
            });
            iframe.src = newUrl;
            __odt_hook('recordSwitchDebugReloadUrl', newUrl);
            noteIframeReloadStarted(index);
            iframeLoadInFlight.set(index, { url: canonicalInsarmapsUrl(newUrl), at: Date.now() });
            updateLoadingIndicator();
            iframe.onload = () => {
                iframeLoadInFlight.delete(index);
                updateLoadingIndicator();
                console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                const needsDatePhase = !reloadOptions.skipDatePhase &&
                    loadKind === 'refSwitch' &&
                    shouldRunDateAfterRef(index);
                if (needsDatePhase) {
                    const iframeHasDates = (() => {
                        try {
                            const u = new URL(iframe.src);
                            return u.searchParams.get('startDate') === currentMapParams.startDate &&
                                u.searchParams.get('endDate') === currentMapParams.endDate;
                        } catch (e) {
                            return false;
                        }
                    })();
                    if (!iframeHasDates) {
                        reloadDatasetIframe(index, 'apply-dates-after-ref', 'dateAfterRef', { skipDatePhase: true });
                        return;
                    }
                } else if (loadKind === 'pointAfterRef') {
                    setTimeout(() => {
                        if (pointAfterRefInFlightByIndex.has(index)) {
                            completePointAfterRefPhase(index);
                        }
                    }, 12000);
                    return;
                } else if ((loadKind === 'refSwitch' || loadKind === 'refSwitchNoPoint') &&
                    hasCustomRefPoint(currentMapParams)) {
                    // Dates sync only after insarmaps-ref-applied (maybeStartDateSyncAfterRef).
                }
                maybeResolveSwitchDatesOnIframeLoad(index);
                broadcastAutoColorScaleToIframes(index);
                broadcastColorscaleToIframes(index);
                scheduleBackgroundSync('after-reload');
            };
            return true;
        }

        // Apply current point to one iframe if it is stale (used on dataset switch).
        function syncPointToIframeIfStale(index, reason) {
            if (!hasPointSelection(currentMapParams)) return false;
            if (bgLoadInFlightEntry(index)) {
                console.log(`[overlay] switch-point-sync SKIP ${iframeLabelForLog(index)}  reason=preload-in-flight`);
                return false;
            }
            const forceReloadOnSwitch = reason === 'switch-point-sync' &&
                hasCustomRefPoint(currentMapParams);
            if (!forceReloadOnSwitch && pointAppliedOnIframe(index, currentMapParams)) {
                return false;
            }
            const dataset = iframeDatasets.get(index);
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !dataset || !currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                return false;
            }
            // Stale point on a loaded iframe: apply it via postMessage (no reload flash) unless
            // the server lacks set-point support or set-point keeps failing on this iframe
            // (SET_POINT_MAX_ATTEMPTS) — then fall through to the reliable URL reload.
            const spAttempt = setPointAttemptsByIndex.get(index);
            const spExhausted = !!(spAttempt &&
                spAttempt.key === `${currentMapParams.pointLat},${currentMapParams.pointLon}` &&
                spAttempt.count >= SET_POINT_MAX_ATTEMPTS);
            if (!forceReloadOnSwitch && setPointSupport !== 'no' && !spExhausted && iframe.src &&
                currentMapParams.pointLat && currentMapParams.pointLon) {
                sendSetPointToIframe(index, currentMapParams.pointLat, currentMapParams.pointLon);
                return false;
            }
            const iframeParams = (forceReloadOnSwitch && hasCustomRefPoint(currentMapParams))
                ? mapParamsForIframeLoad(currentMapParams, 'refSwitch')
                : currentMapParams;
            const newUrl = buildInsarmapsUrl(
                baseUrl, dataset,
                currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                iframeParams, `ds${index}`, false, false
            );
            let reloaded = false;
            if (forceReloadOnSwitch && iframe.src && insarmapsUrlsEquivalent(iframe.src, newUrl)) {
                console.log(`[overlay] iframe RELOAD ${iframeLabelForLog(index)}  reason=${reason}:force-ref-resync`);
                iframe.src = newUrl;
                reloaded = true;
            } else if (!insarmapsUrlsEquivalent(iframeEffectiveUrl(index), newUrl)) {
                // Compare against the live URL (what the iframe actually shows), not the stale src.
                console.log(`[overlay] iframe RELOAD ${iframeLabelForLog(index)}  reason=${reason}`, {
                    to: canonicalInsarmapsUrl(newUrl)
                });
                iframe.src = newUrl;
                reloaded = true;
            }
            if (reloaded) {
                noteIframeReloadStarted(index);
                iframeLoadInFlight.set(index, { url: canonicalInsarmapsUrl(newUrl), at: Date.now() });
                updateLoadingIndicator();
                iframe.onload = () => {
                    iframeLoadInFlight.delete(index);
                    updateLoadingIndicator();
                    console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                    scheduleBackgroundSync('after-point-sync');
                };
            }
            return reloaded;
        }

        function broadcastAutoColorScaleToIframes(onlyIndex) {
            const scaleState = scaleStateFromMapParams(currentMapParams);
            const mode = scaleState.autoColorScale;
            iframeDatasets.forEach((_, index) => {
                if (onlyIndex !== undefined && onlyIndex >= 0 && index !== onlyIndex) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !iframe.contentWindow) return;
                const msg = { type: 'insarmaps-set-auto-color-scale', mode: mode };
                if (mode === 'false') {
                    msg.minScale = scaleState.minScale;
                    msg.maxScale = scaleState.maxScale;
                }
                try {
                    iframe.contentWindow.postMessage(msg, '*');
                } catch (e) {}
            });
        }

        function broadcastColorscaleToIframes(onlyIndex) {
            const colorscale = effectiveColorscale(currentMapParams);
            iframeDatasets.forEach((_, index) => {
                if (onlyIndex !== undefined && onlyIndex >= 0 && index !== onlyIndex) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !iframe.contentWindow) return;
                try {
                    iframe.contentWindow.postMessage({
                        type: 'insarmaps-set-colorscale',
                        colorscale: colorscale
                    }, '*');
                } catch (e) {}
            });
        }

        function broadcastContourAndPixelSizeToIframe(onlyIndex) {
            const params = mapParamsWithOverlayUserDisplay(currentMapParams);
            const contourOn = effectiveContour(params) === 'true';
            const pixelSizeRaw = params.pixelSize;
            const pixelSize = pixelSizeRaw != null && pixelSizeRaw !== ''
                ? parseFloat(pixelSizeRaw) : null;
            iframeDatasets.forEach((_, index) => {
                if (onlyIndex !== undefined && onlyIndex >= 0 && index !== onlyIndex) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !iframe.contentWindow) return;
                try {
                    iframe.contentWindow.postMessage({
                        type: 'insarmaps-set-contour', value: contourOn
                    }, '*');
                    if (pixelSize != null && !isNaN(pixelSize)) {
                        iframe.contentWindow.postMessage({
                            type: 'insarmaps-set-pixelSize', value: pixelSize
                        }, '*');
                    }
                } catch (e) {}
            });
            // #region agent log
            __odt_hook('dbgDisplayLog', 'overlay.html:broadcastDisplay', 'postMessage contour/pixelSize to iframe', {
                onlyIndex, contourOn, pixelSize, overlayUserDisplay: { ...overlayUserDisplay }
            }, 'G');
            // #endregion
            __odt_hook('recordSwitchDebugSentPost', contourOn, pixelSize, onlyIndex);
        }

        function broadcastMapDisplayStateAfterSwitch(activeIndex, switchReloaded, options) {
            options = options || {};
            if (options.skipBroadcast) return;
            const pushDisplayToActive = () => broadcastContourAndPixelSizeToIframe(activeIndex);
            if (switchReloaded) {
                iframeDatasets.forEach((_, index) => {
                    if (index !== activeIndex) {
                        broadcastAutoColorScaleToIframes(index);
                        broadcastColorscaleToIframes(index);
                    }
                });
                const iframe = document.getElementById(`iframe${activeIndex}`);
                if (iframe) {
                    iframe.addEventListener('load', () => {
                        broadcastAutoColorScaleToIframes(activeIndex);
                        broadcastColorscaleToIframes(activeIndex);
                        pushDisplayToActive();
                    }, { once: true });
                }
            } else {
                broadcastAutoColorScaleToIframes();
                broadcastColorscaleToIframes();
                pushDisplayToActive();
            }
        }

        function mergeParamsFromInsarmapsMessage(urlPath, eventData, baseParams) {
            const pathMatch = urlPath.match(/^\/start\/([^\/]+)\/([^\/]+)\/([^?]+)/);
            if (!pathMatch) return null;
            const [, lat, lon, zoom] = pathMatch;
            const queryStart = urlPath.indexOf('?');
            const params = queryStart >= 0 ? new URLSearchParams(urlPath.substring(queryStart)) : new URLSearchParams();
            const getContourValue = () => contourFromInsarmapsMessage(params, eventData, baseParams);
            const contourValue = getContourValue();
            const rawMinScale = params.get('minScale') ?? baseParams.minScale;
            const rawMaxScale = params.get('maxScale') ?? baseParams.maxScale;
            const scaleState = resolveAutoColorScaleState(
                rawMinScale, rawMaxScale, autoColorScaleParamFromInsarmapsUrl(params)
            );
            return {
                lat, lon, zoom,
                autoColorScale: scaleState.autoColorScale,
                minScale: scaleState.minScale,
                maxScale: scaleState.maxScale,
                startDate: (eventData && eventData.startDate) ?? params.get('startDate') ?? baseParams.startDate,
                endDate: (eventData && eventData.endDate) ?? params.get('endDate') ?? baseParams.endDate,
                pixelSize: params.get('pixelSize') ?? baseParams.pixelSize,
                background: params.get('background') ?? baseParams.background,
                opacity: params.get('opacity') ?? baseParams.opacity,
                contour: contourValue,
                colorscale: params.get('colorscale') || baseParams.colorscale || INSARMAP_URL_DEFAULTS.colorscale,
                refPointLat: params.get('refPointLat') ?? (eventData && eventData.refPointLat) ?? baseParams.refPointLat ?? null,
                refPointLon: params.get('refPointLon') ?? (eventData && eventData.refPointLon) ?? baseParams.refPointLon ?? null,
                pointLat: params.get('pointLat') ?? (eventData && eventData.pointLat) ?? baseParams.pointLat ?? null,
                pointLon: params.get('pointLon') ?? (eventData && eventData.pointLon) ?? baseParams.pointLon ?? null
            };
        }

        // Append "Individual URLs:" footer — one link per insarmaps.log line; label from URL path/name (desc, asc, vert, horz)
        // Display order: Descending, Ascending, East-West, Vertical (match iframe sort: desc, asc, horz, vert)
        function appendIndividualUrlsFooter(urls) {
            const labelForUrl = (url) => {
                const u = url.toLowerCase();
                // Order matters: check desc before asc (same convention as iframe sort elsewhere in this file)
                if (u.includes('desc')) return 'Descending';
                if (u.includes('asc')) return 'Ascending';
                if (u.includes('horz')) return 'East-West';
                if (u.includes('vert')) return 'Vertical';
                return null;
            };
            const sortKeyForFooter = (url) => {
                const u = url.toLowerCase();
                if (u.includes('desc')) return 0;
                if (u.includes('asc')) return 1;
                if (u.includes('horz')) return 2;
                if (u.includes('vert')) return 3;
                return 4;
            };
            const ordered = urls.slice().sort((a, b) => sortKeyForFooter(a) - sortKeyForFooter(b));

            const wrap = document.createElement('div');
            wrap.id = 'individual-urls-footer';
            wrap.className = 'page-footer';
            wrap.style.marginTop = '2px';

            const makeLink = (url, label) => {
                const a = document.createElement('a');
                a.dataset.logUrl = url;
                a.href = buildIndividualDatasetLinkUrl(url);
                a.textContent = label;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                return a;
            };

            const labels = ordered.map((url, i) => labelForUrl(url) || `Dataset ${i + 1}`);

            // Single centered line: "Individual URLs:" then all links separated by |
            const line = document.createElement('p');
            line.style.cssText = 'margin: 0; line-height: 1.6;';
            const title = document.createElement('strong');
            title.textContent = 'Individual URLs: ';
            line.appendChild(title);
            ordered.forEach((url, i) => {
                if (i > 0) {
                    line.appendChild(document.createTextNode(' | '));
                }
                line.appendChild(makeLink(url, labels[i]));
            });
            wrap.appendChild(line);

            document.body.appendChild(wrap);
        }

        // Parse insarmaps.log and create iframes dynamically
        const insarmapsLogFetchTimer = setTimeout(() => {
            if (!insarmapsLogResolved) {
                showInsarmapsLogError('Timed out loading insarmaps.log');
            }
        }, INSARMAPS_LOG_FETCH_TIMEOUT_MS);

        function finishInsarmapsLogFetch() {
            insarmapsLogResolved = true;
            clearTimeout(insarmapsLogFetchTimer);
        }

        fetch('insarmaps.log')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`insarmaps.log not found (HTTP ${response.status})`);
                }
                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                if (contentType.includes('text/html')) {
                    throw new Error('insarmaps.log not found (server returned an HTML page)');
                }
                return response.text();
            })
            .then(data => {
                finishInsarmapsLogFetch();
                const urls = parseInsarmapsLogUrls(data);

                if (urls.length === 0) {
                    showInsarmapsLogError('No valid URLs found in insarmaps.log');
                    return;
                }

                // Keep file line order for the "Individual URLs" footer (iframe list still uses sorted order below)
                const urlsFileOrder = urls.slice();
                
                // Sort URLs by dataset type: desc (0), asc (1), horz (2), vert (3), others (4)
                urls.sort((a, b) => {
                    const getSortKey = (url) => {
                        try {
                            const urlObj = new URL(url);
                            const startDataset = urlObj.searchParams.get('startDataset') || '';
                            const lower = startDataset.toLowerCase();
                            if (lower.includes('desc')) return 0;
                            if (lower.includes('asc')) return 1;
                            if (lower.includes('horz')) return 2;
                            if (lower.includes('vert')) return 3;
                            return 4;
                        } catch (e) {
                            return 5;
                        }
                    };
                    return getSortKey(a) - getSortKey(b);
                });
                
                urlsList = urls;
                
                // Extract labels from URLs
                const getLabel = (url) => {
                    try {
                        const urlObj = new URL(url);
                        const startDataset = urlObj.searchParams.get('startDataset') || '';
                        const lower = startDataset.toLowerCase();
                        if (lower.includes('desc')) return 'Descending';
                        if (lower.includes('asc')) return 'Ascending';
                        if (lower.includes('vert')) return 'Vertical';
                        if (lower.includes('horz')) return 'Horizontal';
                        return startDataset || 'Dataset';
                    } catch (e) {
                        return 'Dataset';
                    }
                };
                
                // Get initial params from overlay.html URL
                const initialParams = getOverlayUrlParams();
                
                // When URL has timeControls=true and periods, startDate/endDate come from first period
                const firstLogDefaults = parseInsarmapsUrlParams(urlsFileOrder[0]);
                let initialStartDate = initialParams.startDate ?? firstLogDefaults?.startDate ?? null;
                let initialEndDate = initialParams.endDate ?? firstLogDefaults?.endDate ?? null;
                if (initialParams.timeControls === 'true') {
                    const urlPeriods = parsePeriodsFromUrl(initialParams.periods);
                    if (urlPeriods && urlPeriods.length > 0) {
                        initialStartDate = urlPeriods[0].startDate;
                        initialEndDate = urlPeriods[0].endDate;
                    }
                }
                
                // Initialize current map params from overlay URL or first insarmaps.log line (file order)
                const initialScaleState = resolveAutoColorScaleState(
                    initialParams.minScale ?? firstLogDefaults?.minScale ?? null,
                    initialParams.maxScale ?? firstLogDefaults?.maxScale ?? null,
                    initialParams.autoColorScale ?? firstLogDefaults?.autoColorScale ?? 'true'
                );
                currentMapParams = {
                    lat: initialParams.lat || firstLogDefaults?.lat || null,
                    lon: initialParams.lon || firstLogDefaults?.lon || null,
                    zoom: initialParams.zoom || firstLogDefaults?.zoom || null,
                    autoColorScale: initialScaleState.autoColorScale,
                    minScale: initialScaleState.minScale,
                    maxScale: initialScaleState.maxScale,
                    startDate: initialStartDate,
                    endDate: initialEndDate,
                    pixelSize: initialParams.pixelSize ?? firstLogDefaults?.pixelSize ?? null,
                    background: initialParams.background ?? firstLogDefaults?.background ?? null,
                    opacity: initialParams.opacity ?? firstLogDefaults?.opacity ?? null,
                    contour: initialParams.contour ?? firstLogDefaults?.contour ?? null,
                    colorscale: initialParams.colorscale ?? firstLogDefaults?.colorscale ?? INSARMAP_URL_DEFAULTS.colorscale,
                    refPointLat: initialParams.refPointLat ?? firstLogDefaults?.refPointLat ?? null,
                    refPointLon: initialParams.refPointLon ?? firstLogDefaults?.refPointLon ?? null,
                    pointLat: initialParams.pointLat ?? firstLogDefaults?.pointLat ?? null,
                    pointLon: initialParams.pointLon ?? firstLogDefaults?.pointLon ?? null
                };
                initOverlayUserDisplayFrom(currentMapParams);
                seedBaselineFromInsarmapsUrls(urlsFileOrder);
                if (currentMapParams.startDate && currentMapParams.endDate) {
                    captureUserNarrowedDateRange(
                        currentMapParams.startDate, currentMapParams.endDate, activeDatasetIdx
                    );
                }
                
                // Create panels for each URL
                const container = document.getElementById('container');
                
                // Determine initial active panel based on URL view param
                let initialActiveIndex = 0;
                
                urls.forEach((url, index) => {
                    let dataset = null;  // Declare outside try block so it's accessible below
                    try {
                        const urlObj = new URL(url);
                        dataset = urlObj.searchParams.get('startDataset');
                        iframeDatasets.set(index, dataset);
                        
                        // Extract base URL from first URL
                        if (!baseUrl) {
                            baseUrl = urlObj.origin;
                        }
                    } catch (e) {
                        console.warn('Could not parse URL:', url);
                    }
                    
                    const label = getLabel(url);
                    iframeLabels.set(index, label);
                    const labelCode = viewCodes[label] || label.toLowerCase();
                    
                    // Check if this should be the active panel based on URL param
                    // Support both view=desc and startDataset=<full_name>
                    if (initialParams.startDataset && dataset === initialParams.startDataset) {
                        initialActiveIndex = index;
                        currentViewCode = labelCode;
