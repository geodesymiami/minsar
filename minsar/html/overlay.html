<html>
<head>

    <title>Insarmaps - Frame Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .controls-bar {
            margin-bottom: 15px;

        .panel {
            background-color: white;
            border: 2px solid #ddd;

<body>
    <div id="loading" class="loading" style="display:none;"></div>
    <div class="controls-bar" id="controls-bar" style="display:none;">
        <div class="frame-selector" id="frame-selector">
            <label for="frame-select">Dataset:</label>
            <select id="frame-select"></select>
        </div>
        <!-- Time controls panel - shown when checkbox checked -->
        <div class="time-controls-panel" id="time-controls-panel">
            <div class="time-control-group" id="period-input-group">
                <label for="period-value">Period:</label>
                <input type="number" id="period-value" value="2" min="0.1" step="0.1">
                <span class="unit">years</span>
            </div>
            <div class="time-control-group">
                <button class="nav-btn" id="btn-backward" title="Previous period" disabled>◀</button>
                <span class="period-indicator" id="period-indicator">-/-</span>
                <button class="nav-btn" id="btn-forward" title="Next period" disabled>▶</button>
            </div>
            <div class="time-control-group">
                <span id="period-date-range" style="font-size: 15px; color: #333; min-width: 220px; font-weight: 500;"></span>
            </div>
            <div class="time-control-group">
                <button class="play-btn" id="btn-play">▶ Play</button>
            </div>
            <div class="time-control-group">
                <label for="frame-delay">Delay:</label>
                <input type="number" id="frame-delay" value="2" min="0.5" step="0.5">
                <span class="unit">secs</span>
            </div>
            <div class="time-control-group add-period-group" id="add-period-group">
                <span class="add-period-boxes">
                    <label for="add-start-date">Start:</label>
                    <input type="text" id="add-start-date" class="date-input" placeholder="YYYYMMDD" maxlength="8">
                    <label for="add-end-date">End:</label>
                    <input type="text" id="add-end-date" class="date-input" placeholder="YYYYMMDD" maxlength="8">
                </span>
                <button type="button" class="add-period-btn" id="add-period-btn" title="Click to select periods">+</button>
            </div>
        </div>
        <div class="time-controls-column">
            <div class="time-controls-toggle">
                <input type="checkbox" id="time-controls-checkbox">
                <label for="time-controls-checkbox">Time Controls</label>
            </div>
            <span class="memory-display" id="memory-display" title="Estimated memory usage">Mem: 0 MB</span>
            <span class="loading-indicator" id="loading-indicator" title="Background frames loading">Loading...</span>
            <span class="ref-status-indicator" id="ref-status-indicator" role="status" aria-live="polite"></span>
        </div>
    </div>
    <div class="container" id="container"></div>
    <div id="switch-debug-panel" class="switch-debug-panel" aria-live="polite">
        <h3>Switch parameter debug</h3>
        <div class="switch-debug-meta" id="switch-debug-meta">No dataset switch yet.</div>
        <div id="switch-debug-latest"></div>
        <div id="switch-debug-history-wrap"></div>
        <div class="legend">Expected = parent intent · Sent = postMessage/reload URL · Received = raw child postMessage · UI 0.4s/1.5s = actual insarmaps slider/toggle (not parent state)</div>
    </div>

    <script>
        // ===== CONFIGURATION (EDIT THIS LINE TO SWITCH BETWEEN FORMATS) =====
        // To switch: comment out one line and uncomment the other
        //const USE_FULL_DATASET_IN_URL = false;  // Use short codes: view=desc/asc/vert/horz
        const USE_FULL_DATASET_IN_URL = true;   // Use full dataset names: startDataset=S1_desc_142_mintpy_...
        
        // ===== URL STATE MANAGEMENT =====
        // Map view labels to short codes for URL
        const viewCodes = {
            'Descending': 'desc',
            'Ascending': 'asc',
            'Vertical': 'vert',
            'Horizontal': 'horz'
        };
        const codeToLabel = { 'desc': 'Descending', 'asc': 'Ascending', 'vert': 'Vertical', 'horz': 'Horizontal' };

        // Helper: Parse YYYYMMDD to Date
        function parseDate(yyyymmdd) {
            if (!yyyymmdd) return null;
            const str = String(yyyymmdd);
            if (str.length !== 8) return null;
            const year = parseInt(str.substring(0, 4));
            const month = parseInt(str.substring(4, 6)) - 1;
            const day = parseInt(str.substring(6, 8));
            return new Date(year, month, day);
        }
        
        // Helper: Format Date to YYYYMMDD
        function formatDate(date) {
            if (!date) return null;
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }
        
        // Helper: Format Date for display (29 Oct 2024)
        function formatDateDisplay(yyyymmdd) {
            const d = parseDate(yyyymmdd);
            if (!d) return yyyymmdd;
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        // Get URL parameters from overlay.html's URL (supports hash-based routing)
        function getOverlayUrlParams() {
            let pathPart = '';
            let queryPart = '';
            
            // Check for hash-based URL first (e.g., overlay.html#/start/lat/lon/zoom?params)
            if (window.location.hash) {
                const hash = window.location.hash.substring(1); // Remove leading #
                const queryIdx = hash.indexOf('?');
                if (queryIdx !== -1) {
                    pathPart = hash.substring(0, queryIdx);
                    queryPart = hash.substring(queryIdx + 1);
                } else {
                    pathPart = hash;
                }
            } else {
                // Fallback to regular URL
                pathPart = window.location.pathname;
                queryPart = window.location.search.substring(1);
            }
            
            // Parse path: /start/{lat}/{lon}/{zoom}
            const pathMatch = pathPart.match(/\/start\/([^\/]+)\/([^\/]+)\/([^\/?\#]+)/);
            const params = new URLSearchParams(queryPart);
            
            return {
                view: params.get('view'),
                startDataset: params.get('startDataset'),
                lat: pathMatch ? pathMatch[1] : null,
                lon: pathMatch ? pathMatch[2] : null,
                zoom: pathMatch ? pathMatch[3] : null,
                minScale: params.get('minScale'),
                maxScale: params.get('maxScale'),
                startDate: params.get('startDate'),
                endDate: params.get('endDate'),
                pixelSize: params.get('pixelSize'),
                background: params.get('background'),
                opacity: params.get('opacity'),
                contour: params.get('contour'),
                colorscale: params.get('colorscale'),
                refPointLat: params.get('refPointLat'),
                refPointLon: params.get('refPointLon'),
                pointLat: params.get('pointLat'),
                pointLon: params.get('pointLon'),
                autoColorScale: params.get('autoColorScale'),
                timeControls: params.get('timeControls'),
                periods: params.get('periods')
            };
        }

        // Periods URL format: periods=20140902:20151003,20151003:20163110,20163110:20251231
        // (start:end,start:end,...) - comma separates periods, : separates start from end within each
        // Also accepts @ as separator for backwards compatibility
        function serializePeriods(periodsArray) {
            if (!periodsArray || periodsArray.length === 0) return null;
            return periodsArray.map(p => `${p.startDate}:${p.endDate}`).join(',');
        }
        function parsePeriodsFromUrl(periodsStr) {
            if (!periodsStr || typeof periodsStr !== 'string') return null;
            const parts = periodsStr.trim().split(/[,@]/).filter(Boolean);
            const result = [];
            for (const part of parts) {
                const [start, end] = part.split(':').map(s => (s || '').trim());
                if (start && end && start.length === 8 && end.length === 8) {
                    result.push({ startDate: start, endDate: end });
                }
            }
            return result.length > 0 ? result : null;
        }

        // Resolve autoColorScale vs explicit minScale/maxScale for URL and iframe sync.
        function normalizeAutoColorScaleParam(param) {
            if (param === 'false') return 'false';
            if (param === 'true' || param === 'coarse' || param === 'fine') return 'true';
            return 'true';
        }

        function resolveAutoColorScaleState(minScale, maxScale, autoColorScaleParam) {
            if (autoColorScaleParam == null || autoColorScaleParam === '') {
                if (minScale && maxScale) {
                    return { autoColorScale: 'false', minScale: minScale, maxScale: maxScale };
                }
                return { autoColorScale: 'true', minScale: null, maxScale: null };
            }
            const mode = normalizeAutoColorScaleParam(autoColorScaleParam);
            if (mode === 'true') {
                return { autoColorScale: 'true', minScale: null, maxScale: null };
            }
            return { autoColorScale: 'false', minScale: minScale || null, maxScale: maxScale || null };
        }

        // Resolved scale for overlay state (manual min/max win unless auto is explicitly on).
        function scaleStateFromMapParams(mapParams) {
            if (!mapParams) {
                return resolveAutoColorScaleState(null, null, INSARMAP_URL_DEFAULTS.autoColorScale);
            }
            const autoParam = mapParams.autoColorScale;
            if (autoParam === 'true' || autoParam === 'coarse' || autoParam === 'fine') {
                return resolveAutoColorScaleState(mapParams.minScale, mapParams.maxScale, autoParam);
            }
            if (mapParams.minScale != null && mapParams.maxScale != null &&
                String(mapParams.minScale) !== '' && String(mapParams.maxScale) !== '') {
                return resolveAutoColorScaleState(mapParams.minScale, mapParams.maxScale, 'false');
            }
            return resolveAutoColorScaleState(
                mapParams.minScale, mapParams.maxScale,
                autoParam ?? INSARMAP_URL_DEFAULTS.autoColorScale
            );
        }

        function iframeScaleParamsMatchExpected(iframeSrc, mapParams) {
            if (!iframeSrc) return false;
            try {
                const u = new URL(iframeSrc, window.location.href);
                const scaleState = scaleStateFromMapParams(mapParams);
                if (scaleState.autoColorScale === 'true') {
                    return !u.searchParams.has('minScale') && !u.searchParams.has('maxScale');
                }
                const urlMin = u.searchParams.get('minScale');
                const urlMax = u.searchParams.get('maxScale');
                if (urlMin == null || urlMax == null) return false;
                return formatUrlNumber(urlMin) === formatUrlNumber(scaleState.minScale) &&
                    formatUrlNumber(urlMax) === formatUrlNumber(scaleState.maxScale);
            } catch (e) {
                return false;
            }
        }

        function effectiveColorscale(mapParams) {
            return mapParams?.colorscale || INSARMAP_URL_DEFAULTS.colorscale;
        }

        function iframeColorscaleMatchExpected(iframeSrc, mapParams) {
            if (!iframeSrc) return false;
            try {
                const u = new URL(iframeSrc, window.location.href);
                const expected = effectiveColorscale(mapParams);
                const urlCs = u.searchParams.get('colorscale');
                // Overlay iframe URLs include colorscale explicitly; absent param means stale load.
                if (urlCs == null) return false;
                return urlCs === expected;
            } catch (e) {
                return false;
            }
        }

        function effectiveContour(mapParams) {
            return normalizeContourValue(mapParams?.contour) || INSARMAP_URL_DEFAULTS.contours;
        }

        function effectivePixelSize(mapParams) {
            if (mapParams?.pixelSize == null || mapParams.pixelSize === '') return null;
            return formatUrlNumber(mapParams.pixelSize);
        }

        function iframePixelSizeMatchExpected(iframeSrc, mapParams) {
            if (!iframeSrc) return false;
            const expected = effectivePixelSize(mapParams);
            try {
                const u = new URL(iframeSrc, window.location.href);
                const urlPs = u.searchParams.get('pixelSize');
                if (expected == null) return urlPs == null;
                if (urlPs == null) return false;
                return formatUrlNumber(urlPs) === expected;
            } catch (e) {
                return false;
            }
        }

        function preserveOverlayDisplayParamsDuringSwitch(merged, authoritative) {
            if (Date.now() >= datasetSwitchSuppressUntil && !switchOpInFlight) {
                return merged;
            }
            const preserved = {
                ...merged,
                contour: effectiveContour(authoritative),
                pixelSize: (authoritative.pixelSize != null && authoritative.pixelSize !== '')
                    ? authoritative.pixelSize : merged.pixelSize
            };
            // #region agent log
            if (effectiveContour(merged) !== effectiveContour(preserved) ||
                merged.pixelSize !== preserved.pixelSize) {
                dbgDisplayLog('overlay.html:preserveDisplay', 'preserved contour/pixelSize during switch', {
                    suppressUntil: datasetSwitchSuppressUntil,
                    switchOpInFlight,
                    rawContour: effectiveContour(merged),
                    rawPixelSize: merged.pixelSize,
                    preservedContour: effectiveContour(preserved),
                    preservedPixelSize: preserved.pixelSize,
                    authoritativeContour: effectiveContour(authoritative),
                    authoritativePixelSize: authoritative.pixelSize
                }, 'B');
            }
            // #endregion
            return preserved;
        }

        function contourFromInsarmapsMessage(params, eventData, baseParams) {
            const raw = params.get('contours') ?? params.get('contour') ??
                (eventData && eventData.contours != null ? eventData.contours : null) ??
                baseParams?.contour;
            return normalizeContourValue(raw) || INSARMAP_URL_DEFAULTS.contours;
        }

        function iframeContourMatchExpected(iframeSrc, mapParams) {
            if (!iframeSrc) return false;
            try {
                const u = new URL(iframeSrc, window.location.href);
                const expected = effectiveContour(mapParams);
                const urlRaw = u.searchParams.get('contours') || u.searchParams.get('contour');
                // Overlay iframe URLs always carry contours explicitly (like background when changed).
                if (urlRaw == null) return false;
                const urlNorm = normalizeContourValue(urlRaw) || INSARMAP_URL_DEFAULTS.contours;
                return urlNorm === expected;
            } catch (e) {
                return false;
            }
        }

        // Insarmaps manual mode omits autoColorScale from URL (minScale/maxScale only). Do not
        // fall back to overlay state when the param is absent — infer from min/max instead.
        function autoColorScaleParamFromInsarmapsUrl(urlParams) {
            if (!urlParams || !urlParams.has('autoColorScale')) return null;
            const v = urlParams.get('autoColorScale');
            return (v == null || v === '') ? null : v;
        }

        function isAutoColorScaleMode(mode) {
            return normalizeAutoColorScaleParam(mode) === 'true';
        }

        const INSARMAP_URL_DEFAULTS = {
            flyToDatasetCenter: 'true',
            colorscale: 'velocity',
            pixelSize: '3',
            opacity: '100',
            background: 'hillshade',
            contours: 'false',
            autoColorScale: 'true',
            minScale: '-2',
            maxScale: '2'
        };

        function numUrlValueDiffers(value, defaultValue) {
            if (value == null || value === '') return false;
            const v = parseFloat(value);
            const d = parseFloat(defaultValue);
            if (!isNaN(v) && !isNaN(d)) return Math.abs(v - d) > 1e-9;
            return String(value) !== String(defaultValue);
        }

        function formatUrlNumber(value) {
            const f = parseFloat(value);
            if (isNaN(f)) return String(value);
            return String(f);
        }

        function appendScaleParamsToUrlSearchParams(params, mapParams) {
            const scaleState = scaleStateFromMapParams(mapParams);
            if (scaleState.autoColorScale === 'true') {
                if (scaleState.autoColorScale !== INSARMAP_URL_DEFAULTS.autoColorScale) {
                    params.set('autoColorScale', scaleState.autoColorScale);
                }
            } else {
                if (scaleState.minScale && numUrlValueDiffers(scaleState.minScale, INSARMAP_URL_DEFAULTS.minScale)) {
                    params.set('minScale', formatUrlNumber(scaleState.minScale));
                }
                if (scaleState.maxScale && numUrlValueDiffers(scaleState.maxScale, INSARMAP_URL_DEFAULTS.maxScale)) {
                    params.set('maxScale', formatUrlNumber(scaleState.maxScale));
                }
            }
        }

        function appendCanonicalInsarmapsQueryParams(params, mapParams, options = {}) {
            if (options.startDataset) params.set('startDataset', options.startDataset);
            else if (options.view) params.set('view', options.view);
            const ftc = options.flyToDatasetCenter ?? mapParams.flyToDatasetCenter ?? INSARMAP_URL_DEFAULTS.flyToDatasetCenter;
            if (ftc !== INSARMAP_URL_DEFAULTS.flyToDatasetCenter) {
                params.set('flyToDatasetCenter', ftc);
            }

            if (mapParams.pointLat && mapParams.pointLon && !options.omitPointSelection) {
                params.set('pointLat', mapParams.pointLat);
                params.set('pointLon', mapParams.pointLon);
            }
            if (mapParams.refPointLat && mapParams.refPointLon) {
                params.set('refPointLat', mapParams.refPointLat);
                params.set('refPointLon', mapParams.refPointLon);
            }

            const hasCustomRef = hasCustomRefPoint(mapParams);
            const colorscale = effectiveColorscale(mapParams);
            if (!hasCustomRef && colorscale &&
                (options.includeColorscale || colorscale !== INSARMAP_URL_DEFAULTS.colorscale)) {
                params.set('colorscale', colorscale);
            }
            if (mapParams.pixelSize &&
                (options.includePixelSize || numUrlValueDiffers(mapParams.pixelSize, INSARMAP_URL_DEFAULTS.pixelSize))) {
                params.set('pixelSize', formatUrlNumber(mapParams.pixelSize));
            }
            if (mapParams.opacity && numUrlValueDiffers(mapParams.opacity, INSARMAP_URL_DEFAULTS.opacity)) {
                params.set('opacity', String(mapParams.opacity));
            }
            if (mapParams.background && mapParams.background !== INSARMAP_URL_DEFAULTS.background) {
                params.set('background', mapParams.background);
            }
            const normalizedContour = effectiveContour(mapParams);
            if (!hasCustomRef && normalizedContour &&
                (options.includeContours || normalizedContour !== INSARMAP_URL_DEFAULTS.contours)) {
                params.set('contours', normalizedContour);
            }

            appendScaleParamsToUrlSearchParams(params, mapParams);

            const narrowedDates = options.narrowedDates;
            if (narrowedDates) {
                if (narrowedDates.startDate) params.set('startDate', narrowedDates.startDate);
                if (narrowedDates.endDate) params.set('endDate', narrowedDates.endDate);
            }
        }

        // Normalize contour to "true"/"false" for URL (insarmaps accepts true/false/on/1 for enabled)
        function normalizeContourValue(value) {
            if (!value) return null;
            const v = String(value).toLowerCase();
            if (v === 'on' || v === 'true' || v === '1') return 'true';
            if (v === 'off' || v === 'false' || v === '0') return 'false';
            return value;
        }

        // Update overlay.html's browser URL with current state
        // Uses hash-based URL format for shareability: overlay.html#/start/lat/lon/zoom?params
        // Optional: timeControlsActive (bool), periodsArray (array of {startDate,endDate})
        // When periodsArray is not provided but current URL has timeControls and periods, preserve them (e.g. before TC open)
        let overlayUrlPending = null;
        let overlayUrlTimer = null;
        const OVERLAY_URL_DEBOUNCE_MS = 400;

        function applyOverlayUrlNow(viewCodeOrDataset, mapParams, currentDataset, timeControlsActive, periodsArray) {
            const params = new URLSearchParams();
            appendCanonicalInsarmapsQueryParams(params, mapParams, {
                startDataset: USE_FULL_DATASET_IN_URL && currentDataset ? currentDataset : null,
                view: (!USE_FULL_DATASET_IN_URL && viewCodeOrDataset) ? viewCodeOrDataset : null,
                narrowedDates: narrowedDatesForUrl(mapParams)
            });
            if (params.has('contours')) {
                params.set('contour', params.get('contours'));
                params.delete('contours');
            }
            if (timeControlsActive && periodsArray && periodsArray.length > 0) {
                params.set('timeControls', 'true');
                params.set('periods', serializePeriods(periodsArray));
            } else {
                const cur = getOverlayUrlParams();
                if (cur.timeControls === 'true' && cur.periods) {
                    params.set('timeControls', 'true');
                    params.set('periods', cur.periods);
                }
            }
            let hashUrl;
            if (mapParams.lat && mapParams.lon && mapParams.zoom) {
                hashUrl = `/start/${mapParams.lat}/${mapParams.lon}/${mapParams.zoom}?${params.toString()}`;
            } else {
                hashUrl = `?${params.toString()}`;
            }
            const newHash = `#${hashUrl}`;
            if (window.location.hash !== newHash) {
                try {
                    window.history.replaceState({}, '', newHash);
                } catch (e) {
                    console.warn('[overlay] replaceState skipped (browser rate limit):', e.message);
                }
            }
            refreshIndividualUrlsFooter();
        }

        function updateOverlayUrl(viewCodeOrDataset, mapParams, currentDataset, timeControlsActive, periodsArray, options) {
            options = options || {};
            overlayUrlPending = {
                viewCodeOrDataset, mapParams, currentDataset, timeControlsActive, periodsArray
            };
            if (options.immediate) {
                if (overlayUrlTimer) {
                    clearTimeout(overlayUrlTimer);
                    overlayUrlTimer = null;
                }
                const p = overlayUrlPending;
                overlayUrlPending = null;
                applyOverlayUrlNow(p.viewCodeOrDataset, p.mapParams, p.currentDataset,
                    p.timeControlsActive, p.periodsArray);
                return;
            }
            if (overlayUrlTimer) clearTimeout(overlayUrlTimer);
            overlayUrlTimer = setTimeout(() => {
                overlayUrlTimer = null;
                if (!overlayUrlPending) return;
                const p = overlayUrlPending;
                overlayUrlPending = null;
                applyOverlayUrlNow(p.viewCodeOrDataset, p.mapParams, p.currentDataset,
                    p.timeControlsActive, p.periodsArray);
            }, OVERLAY_URL_DEBOUNCE_MS);
        }

        function flushOverlayUrlUpdate() {
            if (!overlayUrlPending) return;
            updateOverlayUrl(
                overlayUrlPending.viewCodeOrDataset,
                overlayUrlPending.mapParams,
                overlayUrlPending.currentDataset,
                overlayUrlPending.timeControlsActive,
                overlayUrlPending.periodsArray,
                { immediate: true }
            );
        }

        // Build insarmaps URL with given parameters
        // uniqueId is optional - used to ensure unique cache-busting for multiple iframes
        let urlCounter = 0;
        function buildInsarmapsUrl(baseUrl, dataset, lat, lon, zoom, mapParams, uniqueId, stableCache, shareable, urlOptions) {
            urlOptions = urlOptions || {};
            const params = new URLSearchParams();
            appendCanonicalInsarmapsQueryParams(params, mapParams, {
                startDataset: dataset,
                flyToDatasetCenter: 'false',
                omitPointSelection: urlOptions.omitPointSelection,
                narrowedDates: narrowedDatesForUrl(mapParams),
                includeColorscale: !shareable,
                includeContours: !shareable,
                includePixelSize: !shareable
            });
            // shareable links (footer) omit _t; iframes use cache-busting unless stableCache is set.
            if (!shareable) {
                if (stableCache && uniqueId !== undefined) {
                    params.set('_t', `stable_${uniqueId}`);
                } else {
                    const cacheBuster = uniqueId !== undefined ? `${Date.now()}_${urlCounter++}_${uniqueId}` : `${Date.now()}_${urlCounter++}`;
                    params.set('_t', cacheBuster);
                }
            }
            
            return `${baseUrl}/start/${lat}/${lon}/${zoom}?${params.toString()}`;
        }

        function buildIndividualDatasetLinkUrl(logUrl) {
            try {
                const urlObj = new URL(logUrl);
                const dataset = urlObj.searchParams.get('startDataset');
                const origin = urlObj.origin;
                if (!dataset || !currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                    return logUrl;
                }
                return buildInsarmapsUrl(
                    origin, dataset,
                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                    currentMapParams, undefined, false, true
                );
            } catch (e) {
                return logUrl;
            }
        }

        function refreshIndividualUrlsFooter() {
            const wrap = document.getElementById('individual-urls-footer');
            if (!wrap) return;
            wrap.querySelectorAll('a[data-log-url]').forEach((a) => {
                a.href = buildIndividualDatasetLinkUrl(a.dataset.logUrl);
            });
        }

        function stripUrlCacheBuster(url) {
            try {
                const u = new URL(url, baseUrl || window.location.href);
                u.searchParams.delete('_t');
                return u.toString();
            } catch (e) {
                return url.replace(/([&?])_t=[^&]*&?/, '$1').replace(/[&?]$/, '');
            }
        }

        // Canonical compare: sorted params, contour/contours normalized (avoids false reloads).
        function canonicalInsarmapsUrl(url) {
            if (!url) return '';
            try {
                const u = new URL(url, baseUrl || window.location.href);
                u.searchParams.delete('_t');
                const contourRaw = u.searchParams.get('contour') || u.searchParams.get('contours');
                u.searchParams.delete('contour');
                u.searchParams.delete('contours');
                const contourNorm = normalizeContourValue(contourRaw);
                if (contourNorm) u.searchParams.set('contours', contourNorm);
                const entries = [...u.searchParams.entries()].sort((a, b) => a[0].localeCompare(b[0]));
                const qs = new URLSearchParams(entries).toString();
                return `${u.pathname}${qs ? '?' + qs : ''}`;
            } catch (e) {
                return stripUrlCacheBuster(url);
            }
        }

        function insarmapsUrlsEquivalent(urlA, urlB) {
            if (!urlA || !urlB) return false;
            return canonicalInsarmapsUrl(urlA) === canonicalInsarmapsUrl(urlB);
        }

        // Extract lat/lon/zoom from an insarmaps URL
        function parseInsarmapsUrl(url) {
            const params = parseInsarmapsUrlParams(url);
            if (!params || !params.lat || !params.lon || !params.zoom) return null;
            return { lat: params.lat, lon: params.lon, zoom: params.zoom };
        }

        // Display params from an insarmaps URL (first insarmaps.log line is the template when overlay URL is bare).
        function parseInsarmapsUrlParams(url) {
            try {
                const urlObj = new URL(url);
                const pathMatch = urlObj.pathname.match(/\/start\/([^\/]+)\/([^\/]+)\/([^\/]+)/);
                const q = urlObj.searchParams;
                const contourRaw = q.has('contour') ? q.get('contour') : (q.has('contours') ? q.get('contours') : null);
                return {
                    lat: pathMatch ? pathMatch[1] : null,
                    lon: pathMatch ? pathMatch[2] : null,
                    zoom: pathMatch ? pathMatch[3] : null,
                    minScale: q.get('minScale'),
                    maxScale: q.get('maxScale'),
                    startDate: q.get('startDate'),
                    endDate: q.get('endDate'),
                    pixelSize: q.get('pixelSize'),
                    background: q.get('background'),
                    opacity: q.get('opacity'),
                    contour: normalizeContourValue(contourRaw),
                    colorscale: q.get('colorscale'),
                    refPointLat: q.get('refPointLat'),
                    refPointLon: q.get('refPointLon'),
                    pointLat: q.get('pointLat'),
                    pointLon: q.get('pointLon'),
                    autoColorScale: q.get('autoColorScale')
                };
            } catch (e) {}
            return null;
        }
        // ===== END URL STATE MANAGEMENT =====

        // Global state
        let iframeDatasets = new Map();  // index -> dataset name
        let iframeLabels = new Map();    // index -> label (Descending, etc.)
        let iframeSynced = new Map();    // index -> sync key (tracks if iframe has current params)
        let iframePointSynced = new Map(); // index -> point key (tracks if iframe has current point selection)
        let baseUrl = '';
        let currentViewCode = 'desc';
        let currentDataset = null;  // Current active dataset name
        let currentMapParams = {};
        // User-set display params for cross-dataset sync (survives pixelSize drag messages that carry contours=false).
        let overlayUserDisplay = {
            contour: null,
            pixelSize: null,
            background: null,
            opacity: null
        };
        let urlsList = [];
        
        // Sync control - defined early so it's available everywhere
        let lastSyncTime = 0;
        const SYNC_COOLDOWN_MS = 3000;
        let syncTimeout = null;
        let lastSyncedKey = '';
        let datasetSwitchSuppressUntil = 0; // block cross-iframe reloads briefly after dataset switch
        let backgroundsWarmed = false; // true after first parallel preload of all dataset iframes
        let iframeWarmInFlight = new Map(); // index -> syncKey currently loading
        let lastWarmSyncKey = '';
        let warmTimeout = null;
        let pendingWarm = null;
        const WARM_DEBOUNCE_MS = 200; // batch pan/zoom; point changes still immediate
        const PERIOD_WARM_DEBOUNCE_MS = 150; // default-ref period slider: warm backgrounds soon after drag stops
        let activeDatasetIdx = 0;
        let dataFirstDate = null;
        let dataLastDate = null;
        const datasetDateRanges = new Map();  // datasetIdx -> { firstDate: Date, lastDate: Date }
        let baselineMissionDateRange = null;  // immutable-expanding mission span from dataset attributes
        // Per-iframe pending date sync (avoids background warm stealing ack from active switch target).
        const pendingDateSyncByIndex = new Map();  // index -> { startDate, endDate, awaitRef }
        const REASSERT_DATE_SYNC_RETRIES = 17;  // 17 * 300ms ~= 5s per reassert cycle
        const REF_AWAIT_WATCHDOG_MS = 6000;
        const REF_STATUS_ADVISE_MS = 8000;   // show user advisory before auto-retry
        const REF_STUCK_WATCHDOG_MS = 15000; // auto refSwitch retry if ref never applies
        const MAX_REF_AUTO_RETRIES = 2;
        // Target iframe ref ack for current switch; no-ack before this stays pending for watchdog/ref-applied.
        const refAppliedForDateSyncByIndex = new Set();
        // Horz/Vert only: after refSwitch ref+dates, reload with point for time-series chart.
        const pointAfterRefInFlightByIndex = new Set();
        const refStuckWatchdogByIndex = new Map();   // index -> timeoutId
        const refStatusAdviseByIndex = new Map();    // index -> timeoutId
        const refAutoRetryCountByIndex = new Map();  // index -> retry count this switch
        // User-selected narrowed period; not overwritten by background iframe url-updates.
        let userNarrowedDateRange = null;  // { startDate, endDate } or null
        // How the user last set the narrowed period: 'slider' | 'chart-dot' | 'iframe-sync' | null
        let periodSelectionSource = null;
        let lastSliderCaptureAt = 0;
        const SLIDER_REASSERT_GUARD_MS = 2500;
        // Default dates from insarmaps.log (not a user narrow).
        let logTemplateDateRange = null;  // { startDate, endDate } or null
        // Per-switch outcome tracking (ref + dates on target iframe).
        let activeSwitchTracking = null;  // { from, to, switchPath, userNarrowedAtSwitch, hasCustomRef, refOk, datesOk }
        const lastReportedDatesByIndex = new Map();  // index -> { startDate, endDate, datesNarrowed? }
        let switchOpInFlight = false;
        let selectDatasetFn = null;
        let performDatasetSwitchFn = null;
        let pendingSelectIndex = null;
        let switchOpFinishTimer = null;
        let switchOpStartedAt = 0;
        let pendingRevealIndex = null;
        let pendingRevealSince = 0;
        const lastKnownRefByIndex = new Map();  // index -> { refPointLat, refPointLon }

        // #region agent log
        function initOverlayUserDisplayFrom(mapParams) {
            overlayUserDisplay = {
                contour: effectiveContour(mapParams),
                pixelSize: mapParams.pixelSize ?? null,
                background: mapParams.background ?? null,
                opacity: mapParams.opacity ?? null
            };
        }

        function mapParamsWithOverlayUserDisplay(mapParams) {
            const p = { ...mapParams };
            if (overlayUserDisplay.contour != null) p.contour = overlayUserDisplay.contour;
            if (overlayUserDisplay.pixelSize != null && overlayUserDisplay.pixelSize !== '') {
                p.pixelSize = overlayUserDisplay.pixelSize;
            }
            if (overlayUserDisplay.background != null) p.background = overlayUserDisplay.background;
            if (overlayUserDisplay.opacity != null) p.opacity = overlayUserDisplay.opacity;
            return p;
        }

        function recordOverlayUserDisplayFromMerge(prevParams, merged) {
            // Child iframes post MintPy defaults after reload during switch; do not overwrite user intent.
            if (Date.now() < datasetSwitchSuppressUntil || switchOpInFlight) {
                return;
            }
            const contourChanged = effectiveContour(prevParams) !== effectiveContour(merged);
            const pixelSizeChanged = prevParams.pixelSize !== merged.pixelSize;
            const backgroundChanged = prevParams.background !== merged.background;
            const opacityChanged = prevParams.opacity !== merged.opacity;

            }
            if (backgroundChanged && merged.background != null) {
                overlayUserDisplay.background = merged.background;
                updates.background = overlayUserDisplay.background;
            }
            if (opacityChanged && merged.opacity != null) {

                updates.opacity = overlayUserDisplay.opacity;

        const OVERLAY_DEBUG_BUILD = 'b4a2c9-display-v9';
        const SWITCH_DEBUG_MAX_HISTORY = 8;

        let switchDebugHistory = [];

        let displayReapplyCountByIndex = new Map();

        function switchDebugFmtCoord(lat, lon) {
            if (lat == null || lon == null || lat === '' || lon === '') return '—';

            if (isNaN(a) || isNaN(b)) return '—';

        }

        function switchDebugSnapFromIframeQuery(index, state) {

                }

                    snap.contours = switchDebugFmtVal(state.contours);
                }
                if (state.pointLat != null || state.pointLon != null) {
                    snap.point = switchDebugFmtCoord(state.pointLat, state.pointLon);
                }
                if (state.refPointLat != null || state.refPointLon != null) {
                    snap.refPoint = switchDebugFmtCoord(state.refPointLat, state.refPointLon);

        function displayParamsMismatchExpected(rawMerged) {
            const expected = mapParamsWithOverlayUserDisplay(currentMapParams);
            const psMismatch = expected.pixelSize != null && rawMerged.pixelSize != null &&
                formatUrlNumber(rawMerged.pixelSize) !== formatUrlNumber(expected.pixelSize);
            const contourMismatch = effectiveContour(rawMerged) !== effectiveContour(expected);
            return psMismatch || contourMismatch;
        }

        function maybeReapplyDisplayParamsToActiveIframe(senderIndex, rawMerged) {
            if (!(Date.now() < datasetSwitchSuppressUntil || switchOpInFlight)) return;
            if (senderIndex !== activeDatasetIdx) return;
            if (!displayParamsMismatchExpected(rawMerged)) return;
            const count = displayReapplyCountByIndex.get(senderIndex) || 0;
            if (count >= MAX_DISPLAY_REAPPLY) return;

            setTimeout(() => broadcastContourAndPixelSizeToIframe(senderIndex), 700);
            // #region agent log
            dbgDisplayLog('overlay.html:reapplyDisplay', 're-postMessage after child default', {
                senderIndex, label: iframeLabelForLog(senderIndex),
                attempt: count + 1,
                rawPixelSize: rawMerged.pixelSize,
                rawContour: effectiveContour(rawMerged),
                expectedPixelSize: mapParamsWithOverlayUserDisplay(currentMapParams).pixelSize,
                expectedContour: effectiveContour(mapParamsWithOverlayUserDisplay(currentMapParams))
            }, 'H');

        }

        function switchDebugFmtVal(v) {

        function switchDebugParamsFromMapAndUrl(mapParams, urlStr, chartsVisible) {
            const urlP = urlDisplayParamsFromSrc(urlStr || '');

            let refLat = mapParams && mapParams.refPointLat;
            let refLon = mapParams && mapParams.refPointLon;

                    if (parsed.pointLon != null) pointLon = parsed.pointLon;
                    if (parsed.refPointLat != null) refLat = parsed.refPointLat;
                    if (parsed.refPointLon != null) refLon = parsed.refPointLon;

            }
            const dates = (mapParams && mapParams.startDate && mapParams.endDate)
                ? (mapParams.startDate + '–' + mapParams.endDate) : '—';
            return {
                contours: switchDebugFmtVal(mapParams ? effectiveContour(mapParams) : urlP.contours),
                pixelSize: switchDebugFmtVal(mapParams && mapParams.pixelSize != null
                    ? mapParams.pixelSize : urlP.pixelSize),
                background: switchDebugFmtVal(mapParams && mapParams.background != null
                    ? mapParams.background : urlP.background),
                opacity: switchDebugFmtVal(mapParams && mapParams.opacity != null
                    ? mapParams.opacity : urlP.opacity),

        }

        function switchDebugSentLabel(sentPost, urlBuilt) {
            const parts = [];
            if (sentPost) {
                parts.push('PM c=' + switchDebugFmtVal(sentPost.contour) +
                    ' ps=' + switchDebugFmtVal(sentPost.pixelSize));
            }
            if (urlBuilt) {
                parts.push('URL c=' + urlBuilt.contours + ' ps=' + urlBuilt.pixelSize);
            }
            return parts.length ? parts.join(' · ') : '—';
        }

        function switchDebugMatch(expected, actual) {
            if (expected === '—' || expected == null) return 'na';
            if (actual == null || actual === '—' || actual === '?') return 'pending';

            if (mapRefLat == null || mapRefLon == null || lat == null || lon == null) return false;
            const dLat = Math.abs(parseFloat(mapRefLat) - parseFloat(lat));
            const dLon = Math.abs(parseFloat(mapRefLon) - parseFloat(lon));
            return dLat < 0.002 && dLon < 0.002;
        }

        function refCoordsMatchExpected(lat, lon) {
            const expected = effectiveRefCoords();
            if (expected && refCoordsMatch(expected.refPointLat, expected.refPointLon, lat, lon)) {
                return true;
            }
            return refCoordsMatch(currentMapParams.refPointLat, currentMapParams.refPointLon, lat, lon);
        }

        function isLogTemplateDateRange(startDate, endDate) {
            if (!logTemplateDateRange || !startDate || !endDate) return false;
            return logTemplateDateRange.startDate === startDate &&
                logTemplateDateRange.endDate === endDate;
        }

        function dateSpanDaysYyyymmdd(startDate, endDate) {
            const sy = parseInt(startDate.slice(0, 4), 10);
            const sm = parseInt(startDate.slice(4, 6), 10) - 1;
            const sd = parseInt(startDate.slice(6, 8), 10);
            const ey = parseInt(endDate.slice(0, 4), 10);
            const em = parseInt(endDate.slice(4, 6), 10) - 1;
            const ed = parseInt(endDate.slice(6, 8), 10);
            return (Date.UTC(ey, em, ed) - Date.UTC(sy, sm, sd)) / 86400000;
        }

        function isWiderOrEqualDateRange(startDate, endDate, than) {
            if (!than || !startDate || !endDate) return false;
            const widerStart = parseInt(startDate, 10) <= parseInt(than.startDate, 10);
            const widerEnd = parseInt(endDate, 10) >= parseInt(than.endDate, 10);
            return widerStart && widerEnd &&
                (parseInt(startDate, 10) < parseInt(than.startDate, 10) ||
                    parseInt(endDate, 10) > parseInt(than.endDate, 10));
        }

        function isStrictCalendarNarrowing(startDate, endDate, than) {
            if (!than || !startDate || !endDate) return false;
            const startOk = parseInt(startDate, 10) >= parseInt(than.startDate, 10);
            const endOk = parseInt(endDate, 10) <= parseInt(than.endDate, 10);
            return startOk && endOk &&
                (startDate !== than.startDate || endDate !== than.endDate);
        }

        function isNearDatasetOrMissionFullSpan(senderIndex, startDate, endDate) {
            if (!startDate || !endDate || !baselineMissionDateRange) return false;
            const missionStart = formatDate(baselineMissionDateRange.firstDate);
            const missionEnd = formatDate(baselineMissionDateRange.lastDate);
            if (startDate !== missionStart) return false;
            const stored = senderIndex >= 0 ? datasetDateRanges.get(senderIndex) : null;
            if (stored && stored.firstDate && stored.lastDate) {
                const dsStart = formatDate(stored.firstDate);
                const dsEnd = formatDate(stored.lastDate);
                const totalSpan = dateSpanDaysYyyymmdd(dsStart, dsEnd);
                const currentSpan = dateSpanDaysYyyymmdd(startDate, endDate);
                if (totalSpan > 0 && currentSpan / totalSpan >= 0.85) return true;
            }
            const missionSpan = dateSpanDaysYyyymmdd(missionStart, missionEnd);
            const currentSpan = dateSpanDaysYyyymmdd(startDate, endDate);
            return missionSpan > 0 && currentSpan / missionSpan >= 0.85;
        }

        function shouldCaptureAsUserNarrow(senderIndex, startDate, endDate) {
            if (!startDate || !endDate) return false;
            if (isLogTemplateDateRange(startDate, endDate)) return false;
            if (senderIndex >= 0 && isDatasetFullDateRangeForIndex(senderIndex, startDate, endDate)) return false;
            if (senderIndex >= 0 && isNearDatasetOrMissionFullSpan(senderIndex, startDate, endDate)) return false;
            if (userNarrowedDateRange && isWiderOrEqualDateRange(startDate, endDate, userNarrowedDateRange)) return false;
            return isNarrowedDateRange(startDate, endDate);
        }

        function beginSwitchTracking(fromIdx, toIdx, debugExtra) {
            debugExtra = debugExtra || {};
            const periodAtSwitch = effectivePeriodAtSwitch(fromIdx);
            const fromState = debugExtra.fromState;
            const hasRef = hasActiveCustomRef(fromState);
            activeSwitchTracking = {
                from: fromIdx,
                to: toIdx,
                userNarrowedAtSwitch: periodAtSwitch ? { ...periodAtSwitch } : null,
                hasCustomRef: hasRef,
                switchPath: debugExtra.switchPath || null,
                refOk: hasRef ? null : true,
                datesOk: null
            };
        }

        function logSwitchOutcomePart(index, kind, ok, extra) {
            if (!activeSwitchTracking || activeSwitchTracking.to !== index) return;
            if (kind === 'ref') activeSwitchTracking.refOk = ok;
            if (kind === 'dates') activeSwitchTracking.datesOk = ok;
            const t = activeSwitchTracking;
            const refResolved = t.refOk !== null;
            const datesResolved = t.datesOk !== null;
            if (!refResolved || !datesResolved) return;
            activeSwitchTracking = null;
        }

        function iframeLabelForLog(index) {
            return iframeLabels.get(index) || `iframe${index}`;
        }

        function isHorzOrVertIndex(index) {
            const label = iframeLabels.get(index);
            return label === 'Horizontal' || label === 'Vertical';
        }

        function refSwitchLoadKindForIndex(index) {
            return isHorzOrVertIndex(index) ? 'refSwitchNoPoint' : 'refSwitch';
        }

        function revealDatasetPanel(index) {
            const panel = document.getElementById(`panel${index}`);
            if (!panel) return;
            panel.style.visibility = 'visible';
            panel.style.zIndex = '10';
            panel.style.pointerEvents = 'auto';
            panel.classList.add('active');
        }

        function hideDatasetPanelsExcept(keepIndex) {
            document.querySelectorAll('.panel').forEach((panel) => {
                if (panel.id === `panel${keepIndex}`) return;
                panel.style.visibility = 'hidden';
                panel.style.zIndex = '-1';
                panel.style.pointerEvents = 'none';
                panel.classList.remove('active');
            });
        }

        function needsPointInUrl(index) {
            if (!hasPointSelection(currentMapParams)) return false;
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.src) return true;
            try {
                const u = new URL(iframe.src, window.location.href);
                return getPointKey({
                    pointLat: u.searchParams.get('pointLat'),
                    pointLon: u.searchParams.get('pointLon')
                }) !== getPointKey(currentMapParams);
            } catch (e) {
                return true;
            }
        }

        function completePointAfterRefPhase(index) {
            if (!pointAfterRefInFlightByIndex.has(index)) return;
            pointAfterRefInFlightByIndex.delete(index);
            iframePointSynced.set(index, getPointKey(currentMapParams));
            ensureChartsOpenOnIframe(index);
            if (index === activeDatasetIdx && switchOpInFlight) {
                finishSwitchOp();
            }
        }

        function applyPointAfterRefSwitch(index) {
            if (pointAfterRefInFlightByIndex.has(index) || iframeWarmInFlight.has(index)) return;
            pointAfterRefInFlightByIndex.add(index);
            revealDatasetPanel(index);
            reloadDatasetIframe(index, 'point-after-ref', 'pointAfterRef', { skipDatePhase: true });
        }

        function shouldApplyPointAfterRefSwitch(index, switchPath) {
            return switchPath === 'refSwitchNoPoint' &&
                isHorzOrVertIndex(index) &&
                index === activeDatasetIdx &&
                hasPointSelection(currentMapParams) &&
                refAppliedForDateSyncByIndex.has(index) &&
                needsPointInUrl(index);
        }

        // Only the visible/switch-target iframe may trigger narrowed date sync after ref-applied.
        // Background warm reloads also apply ref and postMessage; ignore those during another switch.
        function shouldAcceptRefAppliedForDateSync(refIndex) {
            if (refIndex < 0) return false;
            if (refIndex === activeDatasetIdx) return true;
            if (activeSwitchTracking && refIndex === activeSwitchTracking.to) return true;
            return false;
        }

        function setIframeSrc(iframe, newUrl, meta) {
            const label = meta.label || '?';
            const reason = meta.reason || 'unknown';
            if (iframe.src && insarmapsUrlsEquivalent(iframe.src, newUrl)) {
                console.log(`[overlay] iframe SKIP  ${label}  reason=${reason}  (URL params unchanged)`);
                return false;
            }
            console.log(`[overlay] iframe RELOAD ${label}  reason=${reason}`, {
                from: iframe.src ? canonicalInsarmapsUrl(iframe.src) : '(empty)',
                to: canonicalInsarmapsUrl(newUrl)
            });
            iframe.src = newUrl;
            return true;
        }
        
        // Background period iframe loading tracker
        let loadingPeriodIndices = new Set();
        function updateLoadingIndicator() {
            const el = document.getElementById('loading-indicator');
            if (!el) return;
            const count = loadingPeriodIndices.size + iframeWarmInFlight.size;
            if (count > 0) {
                el.textContent = `Loading... (${count})`;
                el.classList.add('visible');
            } else {
                el.classList.remove('visible');
            }
        }

        function updateRefStatusIndicator(text, visible) {
            const el = document.getElementById('ref-status-indicator');
            if (!el) return;
            if (visible && text) {
                el.textContent = text;
                el.classList.add('visible');
            } else {
                el.textContent = '';
                el.classList.remove('visible');
            }
        }

        function cancelRefRecoveryTimers(index) {
            if (index === undefined || index < 0) return;
            const wd = refStuckWatchdogByIndex.get(index);
            if (wd) {
                clearTimeout(wd);
                refStuckWatchdogByIndex.delete(index);
            }
            const advise = refStatusAdviseByIndex.get(index);
            if (advise) {
                clearTimeout(advise);
                refStatusAdviseByIndex.delete(index);
            }
        }

        function clearRefRecoveryState(index) {
            cancelRefRecoveryTimers(index);
            if (index >= 0) refAutoRetryCountByIndex.delete(index);
            if (index === activeDatasetIdx || index < 0) updateRefStatusIndicator('', false);
        }

        function isRefStillPendingForIndex(index) {
            return hasCustomRefPoint(currentMapParams) &&
                index === activeDatasetIdx &&
                !refAppliedForDateSyncByIndex.has(index);
        }

        function scheduleRefRecoveryWatchdogs(index, reason) {
            if (!hasCustomRefPoint(currentMapParams) || index < 0) return;
            cancelRefRecoveryTimers(index);
            refStatusAdviseByIndex.set(index, setTimeout(() => {
                refStatusAdviseByIndex.delete(index);
                if (!isRefStillPendingForIndex(index)) return;
                const label = iframeLabelForLog(index);
                updateRefStatusIndicator(
                    `Reference point is still loading on ${label}. ` +
                    'Switch to another view and back, or wait — we will retry automatically.',
                    true
                );
            }, REF_STATUS_ADVISE_MS));
            refStuckWatchdogByIndex.set(index, setTimeout(() => {
                refStuckWatchdogByIndex.delete(index);
                tryRefStuckRecovery(index, 'watchdog-timeout', reason);
            }, REF_STUCK_WATCHDOG_MS));
        }

        function tryRefStuckRecovery(index, trigger, detail) {
            if (!isRefStillPendingForIndex(index)) return;
            if (iframeWarmInFlight.has(index)) return;
            const retries = refAutoRetryCountByIndex.get(index) || 0;
            const label = iframeLabelForLog(index);
            if (retries >= MAX_REF_AUTO_RETRIES) {
                updateRefStatusIndicator(
                    `Reference point did not load on ${label}. ` +
                    'Switch to another dataset and back to retry.',
                    true
                );
                return;
            }
            refAutoRetryCountByIndex.set(index, retries + 1);
            updateRefStatusIndicator(`Retrying reference point load on ${label}…`, true);
            clearRefAppliedForDateSync(index);
            cancelRefRecoveryTimers(index);
            revealDatasetPanel(index);
            reloadDatasetIframe(index, `ref-retry-${trigger}`, refSwitchLoadKindForIndex(index));
            scheduleRefRecoveryWatchdogs(index, `after-${trigger}`);
        }

        function handleInsarmapsRefFailed(failIndex, data) {
            if (failIndex < 0 || failIndex !== activeDatasetIdx) return;
            if (!hasCustomRefPoint(currentMapParams)) return;
            if (refAppliedForDateSyncByIndex.has(failIndex)) return;
            const label = iframeLabelForLog(failIndex);
            updateRefStatusIndicator(
                `Reference point could not be applied on ${label}. Retrying…`,
                true
            );
            tryRefStuckRecovery(failIndex, 'insarmaps-failed', data && data.reason);
        }
        
        const INSARMAPS_LOG_ERROR_REDIRECT_MS = 3000;
        const INSARMAPS_LOG_FETCH_TIMEOUT_MS = 10000;
        const INSARMAPS_LOG_USER_ERROR = 'Volcano not found. Please contact the webmaster of this website.';
        let insarmapsLogErrorShown = false;
        let insarmapsLogResolved = false;

        function isValidInsarmapsLogUrl(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.pathname.includes('/start/') || urlObj.searchParams.has('startDataset');
            } catch (e) {
                return false;
            }
        }

        function isFullInsarmapsLogUrl(line) {
            return line.startsWith('http://') || line.startsWith('https://');
        }

        // Lines without startDataset= and not http(s):// are dataset names only (expanded from first URL line).
        function isDatasetNameOnlyLine(line) {
            if (!line) return false;
            if (isFullInsarmapsLogUrl(line)) return false;
            if (line.includes('startDataset=')) return false;
            return true;
        }

        // mintpy-style insarmaps.log: full URL for S1_desc_* plus name-only S1_asc_* line.
        // expandDatasetNameLine must not copy descending-only state onto ascending/other iframes.
        const TEMPLATE_PARAMS_STRIP_ON_EXPAND = [
            'pointLat', 'pointLon', 'refPointLat', 'refPointLon', 'colorscale', 'startDate', 'endDate'
        ];

        function hasCustomRefPoint(mapParams) {
            return !!(mapParams && mapParams.refPointLat && mapParams.refPointLon);
        }

        function hasPartialCustomRef(mapParams) {
            if (!mapParams) return false;
            const hasLat = !!mapParams.refPointLat;
            const hasLon = !!mapParams.refPointLon;
            return (hasLat && !hasLon) || (!hasLat && hasLon);
        }

        function hasTimeSeriesPoint(mapParams) {
            return !!(mapParams && mapParams.pointLat && mapParams.pointLon);
        }

        function isMintpyDataset(datasetName) {
            return !!(datasetName && String(datasetName).toLowerCase().includes('mintpy'));
        }

        // True when current startDate/endDate span one dataset's attribute first_date/last_date.
        function isFullDatasetDateRange(datasetIndex) {
            const startDate = currentMapParams.startDate;
            const endDate = currentMapParams.endDate;
            if (!startDate || !endDate) return false;
            const stored = datasetDateRanges.get(datasetIndex);
            if (stored && stored.firstDate && stored.lastDate) {
                return formatDate(stored.firstDate) === startDate && formatDate(stored.lastDate) === endDate;
            }
            if (typeof dataFirstDate !== 'undefined' && dataFirstDate &&
                typeof dataLastDate !== 'undefined' && dataLastDate &&
                datasetIndex === activeDatasetIdx) {
                return formatDate(dataFirstDate) === startDate && formatDate(dataLastDate) === endDate;
            }
            return false;
        }

        // Seed baseline from insarmaps.log template URLs (available before any iframe postMessage).
        function seedBaselineFromInsarmapsUrls(urlList) {
            if (!urlList || !urlList.length) return;
            for (const url of urlList) {
                const p = parseInsarmapsUrlParams(url);
                if (p && p.startDate && p.endDate) {
                    updateBaselineMissionDateRange(p.startDate, p.endDate);
                    if (!logTemplateDateRange) {
                        logTemplateDateRange = { startDate: p.startDate, endDate: p.endDate };
                    }
                }
            }
        }

        // Expand mission baseline from dataset attribute first_date/last_date (never shrink).
        function updateBaselineMissionDateRange(firstDate, lastDate) {
            const first = firstDate instanceof Date ? firstDate : parseDate(firstDate);
            const last = lastDate instanceof Date ? lastDate : parseDate(lastDate);
            if (!first || !last) return;
            if (!baselineMissionDateRange) {
                baselineMissionDateRange = { firstDate: new Date(first), lastDate: new Date(last) };
                return;
            }
            if (first < baselineMissionDateRange.firstDate) {
                baselineMissionDateRange.firstDate = new Date(first);
            }
            if (last > baselineMissionDateRange.lastDate) {
                baselineMissionDateRange.lastDate = new Date(last);
            }
        }

        // True only when user selected the mission-wide full period (baseline from all datasets).
        function isFullMissionDateRange() {
            const startDate = currentMapParams.startDate;
            const endDate = currentMapParams.endDate;
            if (!startDate || !endDate || !baselineMissionDateRange) return false;
            return formatDate(baselineMissionDateRange.firstDate) === startDate &&
                formatDate(baselineMissionDateRange.lastDate) === endDate;
        }

        function isNarrowedDateRange(startDate, endDate) {
            if (!startDate || !endDate) return false;
            if (!baselineMissionDateRange) return true;
            return !(formatDate(baselineMissionDateRange.firstDate) === startDate &&
                formatDate(baselineMissionDateRange.lastDate) === endDate);
        }

        function isDatasetFullDateRangeForIndex(index, startDate, endDate) {
            if (!startDate || !endDate || index < 0) return false;
            const stored = datasetDateRanges.get(index);
            if (stored && stored.firstDate && stored.lastDate) {
                return formatDate(stored.firstDate) === startDate &&
                    formatDate(stored.lastDate) === endDate;
            }
            return false;
        }

        function captureUserNarrowedDateRange(startDate, endDate, senderIndex, source) {
            const idx = senderIndex ?? activeDatasetIdx;
            if (Date.now() < datasetSwitchSuppressUntil && userNarrowedDateRange) {
                return false;
            }
            if (!shouldCaptureAsUserNarrow(idx, startDate, endDate)) {
                if (userNarrowedDateRange && isWiderOrEqualDateRange(startDate, endDate, userNarrowedDateRange)) {
                }
                return false;
            }
            if (source) periodSelectionSource = source;
            if (source === 'slider') lastSliderCaptureAt = Date.now();
            userNarrowedDateRange = { startDate: startDate, endDate: endDate };
            return true;
        }

        function resolveDatesFromIframeUpdate(senderIndex, rawStartDate, rawEndDate, path) {
            const resolved = {
                startDate: rawStartDate ?? currentMapParams.startDate,
                endDate: rawEndDate ?? currentMapParams.endDate,
                action: 'unchanged'
            };
            if (!rawStartDate || !rawEndDate) return resolved;

            const keptDates = () => ({
                startDate: userNarrowedDateRange?.startDate ?? currentMapParams.startDate,
                endDate: userNarrowedDateRange?.endDate ?? currentMapParams.endDate
            });

            if (senderIndex >= 0 && senderIndex !== activeDatasetIdx) {
                if (shouldCaptureAsUserNarrow(senderIndex, rawStartDate, rawEndDate)) {
                    captureUserNarrowedDateRange(rawStartDate, rawEndDate, senderIndex, 'background-narrow');
                    resolved.startDate = userNarrowedDateRange.startDate;
                    resolved.endDate = userNarrowedDateRange.endDate;
                    resolved.action = 'accepted-background-narrow';
                    return resolved;
                }
                const kept = keptDates();
                resolved.startDate = kept.startDate;
                resolved.endDate = kept.endDate;
                resolved.action = (rawStartDate !== kept.startDate || rawEndDate !== kept.endDate)
                    ? 'ignored-background' : 'background-no-date-change';
                return resolved;
            }

            if (senderIndex === activeDatasetIdx) {
                if (Date.now() < datasetSwitchSuppressUntil && userNarrowedDateRange) {
                    resolved.startDate = userNarrowedDateRange.startDate;
                    resolved.endDate = userNarrowedDateRange.endDate;
                    resolved.action = 'rejected-switch-suppress-kept-user';
                    return resolved;
                }
                if (isDatasetFullDateRangeForIndex(senderIndex, rawStartDate, rawEndDate) ||
                    isLogTemplateDateRange(rawStartDate, rawEndDate)) {
                    const kept = keptDates();
                    resolved.startDate = kept.startDate;
                    resolved.endDate = kept.endDate;
                    resolved.action = isLogTemplateDateRange(rawStartDate, rawEndDate)
                        ? 'rejected-log-template-kept-user' : 'rejected-dataset-full-kept-user';
                    return resolved;
                }
                // Keep calendar intent: ignore per-dataset acquisition snap (allow user narrowing further).
                if (!hasCustomRefPoint(currentMapParams) && userNarrowedDateRange &&
                    (rawStartDate !== userNarrowedDateRange.startDate ||
                        rawEndDate !== userNarrowedDateRange.endDate) &&
                    !isStrictCalendarNarrowing(rawStartDate, rawEndDate, userNarrowedDateRange) &&
                    !isWiderOrEqualDateRange(rawStartDate, rawEndDate, userNarrowedDateRange)) {
                    resolved.startDate = userNarrowedDateRange.startDate;
                    resolved.endDate = userNarrowedDateRange.endDate;
                    resolved.action = 'rejected-acquisition-snap-kept-user';
                    return resolved;
                }
                const periodSource = path === 'url-update-debounced' ? 'slider' : 'iframe-sync';
                if (captureUserNarrowedDateRange(rawStartDate, rawEndDate, senderIndex, periodSource)) {
                    resolved.startDate = rawStartDate;
                    resolved.endDate = rawEndDate;
                    resolved.action = 'captured-user-narrow';
                    return resolved;
                }
                if (userNarrowedDateRange && isWiderOrEqualDateRange(rawStartDate, rawEndDate, userNarrowedDateRange)) {
                    const kept = keptDates();
                    resolved.startDate = kept.startDate;
                    resolved.endDate = kept.endDate;
                    resolved.action = 'rejected-widen-kept-user';
                    return resolved;
                }
                if (isNearDatasetOrMissionFullSpan(senderIndex, rawStartDate, rawEndDate)) {
                    const kept = keptDates();
                    resolved.startDate = kept.startDate;
                    resolved.endDate = kept.endDate;
                    resolved.action = 'rejected-near-full-kept-user';
                    return resolved;
                }
                resolved.startDate = rawStartDate;
                resolved.endDate = rawEndDate;
                resolved.action = 'accepted-active';
                return resolved;
            }
            return resolved;
        }

        const lastDateReassertByIndex = new Map();

        function clearRefAppliedForDateSync(index) {
            if (index !== undefined && index >= 0) {
                refAppliedForDateSyncByIndex.delete(index);
            } else {
                refAppliedForDateSyncByIndex.clear();
            }
        }

        function markRefAppliedForDateSync(index) {
            if (index >= 0) refAppliedForDateSyncByIndex.add(index);
        }

        function shouldDeferDateSyncFailure(index, reason) {
            return reason === 'no-ack' &&
                hasCustomRefPoint(currentMapParams) &&
                index === activeDatasetIdx &&
                !refAppliedForDateSyncByIndex.has(index);
        }

        function reassertNarrowedDatesToIframe(index, reason) {
            const dates = effectiveNarrowedDatesForSync();
            if (!dates || index !== activeDatasetIdx || !hasCustomRefPoint(currentMapParams)) return;
            const now = Date.now();
            if (now - (lastDateReassertByIndex.get(index) || 0) < 400) return;
            lastDateReassertByIndex.set(index, now);
            const awaitRef = !refAppliedForDateSyncByIndex.has(index);
            pendingDateSyncByIndex.set(index, {
                startDate: dates.startDate,
                endDate: dates.endDate,
                awaitRef: awaitRef
            });
            if (awaitRef) return;
            tryApplyNarrowedDatesToIframe(index, REASSERT_DATE_SYNC_RETRIES);
        }

        function shouldReassertAfterDateReject(path, resolved) {
            if (path === 'url-update-debounced') return false;
            if (periodSelectionSource === 'slider' && lastSliderCaptureAt &&
                Date.now() - lastSliderCaptureAt < SLIDER_REASSERT_GUARD_MS) {
                return false;
            }
            // Widen rejects are expected while refSwitch iframes load without dates in URL.
            // ref-applied date sync handles the real apply; reassert here fights slider drags.
            if (resolved.action === 'rejected-widen-kept-user') return false;
            if (resolved.action !== 'rejected-dataset-full-kept-user') return false;
            if (!hasCustomRefPoint(currentMapParams)) return false;
            if (!refAppliedForDateSyncByIndex.has(activeDatasetIdx)) return false;
            if (pendingDateSyncByIndex.has(activeDatasetIdx)) return false;
            return true;
        }

        function logDateResolve(senderIndex, rawStartDate, rawEndDate, resolved, path) {
            if (resolved.action === 'unchanged' || resolved.action === 'background-no-date-change') return;
            const willReassert = senderIndex === activeDatasetIdx && shouldReassertAfterDateReject(path, resolved);
            if (willReassert) {
                reassertNarrowedDatesToIframe(senderIndex, resolved.action);
            }
        }

        function narrowedDatesForUrl(mapParams) {
            const out = { startDate: null, endDate: null };
            if (!mapParams) return out;
            const fullStart = baselineMissionDateRange ? formatDate(baselineMissionDateRange.firstDate) : null;
            const fullEnd = baselineMissionDateRange ? formatDate(baselineMissionDateRange.lastDate) : null;
            if (mapParams.startDate && fullStart && mapParams.startDate !== fullStart) {
                out.startDate = mapParams.startDate;
            }
            if (mapParams.endDate && fullEnd && mapParams.endDate !== fullEnd) {
                out.endDate = mapParams.endDate;
            }
            return out;
        }

        function effectiveNarrowedDatesForSync() {
            if (userNarrowedDateRange) return userNarrowedDateRange;
            if (!currentMapParams.startDate || !currentMapParams.endDate) return null;
            if (isFullMissionDateRange()) return null;
            return {
                startDate: currentMapParams.startDate,
                endDate: currentMapParams.endDate
            };
        }

        // Dates for set-dates after ref ack (includes full mission span — needed to finish deferred recolor).
        function datesForRefRecolorSync() {
            const narrowed = effectiveNarrowedDatesForSync();
            if (narrowed) return narrowed;
            if (currentMapParams.startDate && currentMapParams.endDate) {
                return {
                    startDate: currentMapParams.startDate,
                    endDate: currentMapParams.endDate
                };
            }
            if (baselineMissionDateRange) {
                return {
                    startDate: formatDate(baselineMissionDateRange.firstDate),
                    endDate: formatDate(baselineMissionDateRange.lastDate)
                };
            }
            return null;
        }

        function completeRefRecolorOnIframe(index) {
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.contentWindow) return false;
            try {
                iframe.contentWindow.postMessage({ type: 'insarmaps-complete-ref-recolor' }, '*');
                return true;
            } catch (e) {
                return false;
            }
        }

        // Stable narrowed dates for period warm + dataset switch (prefer userNarrowedDateRange).
        function mapParamsForPeriodSync(mapParams) {
            const narrowed = effectiveNarrowedDatesForSync();
            if (!narrowed || hasCustomRefPoint(mapParams)) return { ...mapParams };
            return { ...mapParams, startDate: narrowed.startDate, endDate: narrowed.endDate };
        }

        function iframeDatesMatchExpected(iframeSrc, startDate, endDate) {
            if (!startDate || !endDate) return true;
            const d = datesFromIframeSrc(iframeSrc);
            if (!d || !d.startDate || !d.endDate) return false;
            return d.startDate === startDate && d.endDate === endDate;
        }

        function backgroundsPeriodWarmNeeded(mapParams, senderIndex) {
            const syncParams = mapParamsForPeriodSync(mapParams);
            const syncKey = getSyncKey(syncParams);
            const pointKey = getPointKey(syncParams);
            for (const [index] of iframeDatasets) {
                if (index === senderIndex) continue;
                if (iframeSynced.get(index) !== syncKey || iframePointSynced.get(index) !== pointKey) {
                    return true;
                }
                if (iframeWarmInFlight.has(index)) return true;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframeDatesMatchExpected(iframe?.src, syncParams.startDate, syncParams.endDate)) {
                    return true;
                }
                if (!iframeScaleParamsMatchExpected(iframe?.src, syncParams)) {
                    return true;
                }
                if (!iframeColorscaleMatchExpected(iframe?.src, syncParams)) {
                    return true;
                }
                if (!iframeContourMatchExpected(iframe?.src, syncParams)) {
                    return true;
                }
                if (!iframePixelSizeMatchExpected(iframe?.src, syncParams)) {
                    return true;
                }
            }
            return false;
        }

        function clearPendingDateSync(index) {
            if (index !== undefined && index >= 0) {
                pendingDateSyncByIndex.delete(index);
            } else {
                pendingDateSyncByIndex.clear();
            }
        }

        function logDateSyncFailure(index, retriesLeft, reason, extra) {
            if (retriesLeft > 0) return;
            const pending = pendingDateSyncByIndex.get(index);
            if (shouldDeferDateSyncFailure(index, reason)) {
                if (pending) pending.awaitRef = true;
                if (index === activeDatasetIdx) {
                    const label = iframeLabelForLog(index);
                    updateRefStatusIndicator(
                        `Applying reference point on ${label}… ` +
                        'Map and time series may be incomplete until it finishes.',
                        true
                    );
                    scheduleRefRecoveryWatchdogs(index, 'date-sync-deferred');
                }
                return;
            }
            logSwitchOutcomePart(index, 'dates', false, { reason, startDate: pending && pending.startDate, endDate: pending && pending.endDate });
            clearPendingDateSync(index);
        }

        function onDateSyncApplied(index, startDate, endDate, retriesLeft) {
            clearPendingDateSync(index);
            if (userNarrowedDateRange) {
                currentMapParams.startDate = userNarrowedDateRange.startDate;
                currentMapParams.endDate = userNarrowedDateRange.endDate;
            }
            if (index === activeDatasetIdx && refAppliedForDateSyncByIndex.has(index)) {
                clearRefRecoveryState(index);
            }
            const track = activeSwitchTracking;
            const switchPath = track && track.to === index ? track.switchPath : null;
            const needPointPhase = shouldApplyPointAfterRefSwitch(index, switchPath);
            logSwitchOutcomePart(index, 'dates', true, { startDate, endDate });
            if (needPointPhase) {
                applyPointAfterRefSwitch(index);
                return;
            }
            ensureChartsOpenOnIframe(index);
            if (index === activeDatasetIdx && switchOpInFlight) {
                finishSwitchOp();
            }
        }

        function maybeStartDateSyncAfterRef(index) {
            if (!shouldAcceptRefAppliedForDateSync(index)) {
                return;
            }
            markRefAppliedForDateSync(index);
            cancelRefRecoveryTimers(index);
            refAutoRetryCountByIndex.delete(index);
            updateRefStatusIndicator('', false);
            completeRefRecolorOnIframe(index);
            const dates = datesForRefRecolorSync();
            if (!dates) return;
            if (!pendingDateSyncByIndex.has(index)) {
                pendingDateSyncByIndex.set(index, {
                    startDate: dates.startDate,
                    endDate: dates.endDate,
                    awaitRef: false,
                    forRefComplete: true
                });
            } else {
                const pending = pendingDateSyncByIndex.get(index);
                pending.startDate = dates.startDate;
                pending.endDate = dates.endDate;
                pending.awaitRef = false;
                pending.forRefComplete = true;
            }
            tryApplyNarrowedDatesToIframe(index);
        }

        // After refSwitch: ask insarmaps iframe to apply dates via postMessage (works cross-origin).
        function tryApplyNarrowedDatesToIframe(index, retriesLeft) {
            if (retriesLeft === undefined) retriesLeft = 30;
            const pending = pendingDateSyncByIndex.get(index);
            if (!pending) return false;
            if (pending.awaitRef) return false;
            const liveDates = effectiveNarrowedDatesForSync();
            if (liveDates) {
                pending.startDate = liveDates.startDate;
                pending.endDate = liveDates.endDate;
            }
            const startDate = pending.startDate;
            const endDate = pending.endDate;
            if (!startDate || !endDate) {
                clearPendingDateSync(index);
                return false;
            }
            if (!pending.forRefComplete && baselineMissionDateRange &&
                formatDate(baselineMissionDateRange.firstDate) === startDate &&
                formatDate(baselineMissionDateRange.lastDate) === endDate) {
                clearPendingDateSync(index);
                return false;
            }
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !iframe.contentWindow) {
                logDateSyncFailure(index, retriesLeft, 'no-iframe', {});
                if (retriesLeft > 0) {
                    setTimeout(() => {
                        if (pendingDateSyncByIndex.has(index)) tryApplyNarrowedDatesToIframe(index, retriesLeft - 1);
                    }, 300);
                }
                return false;
