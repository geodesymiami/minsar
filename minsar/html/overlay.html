            }
            try {
                iframe.contentWindow.postMessage({
                    type: 'insarmaps-set-dates',
                    startDate: startDate,
                    endDate: endDate
                }, '*');
                if (retriesLeft > 0) {
                    setTimeout(() => {
                        if (pendingDateSyncByIndex.has(index)) tryApplyNarrowedDatesToIframe(index, retriesLeft - 1);
                    }, 300);
                } else {
                    logDateSyncFailure(index, 0, 'no-ack', {});
                }
                return true;
            } catch (e) {
                logDateSyncFailure(index, retriesLeft, 'exception', { error: String(e) });
                if (retriesLeft > 0) {
                    setTimeout(() => {
                        if (pendingDateSyncByIndex.has(index)) tryApplyNarrowedDatesToIframe(index, retriesLeft - 1);
                    }, 300);
                }
                return false;
            }
        }

        function scheduleNarrowedDateSync(index, reason) {
            const dates = effectiveNarrowedDatesForSync();
            const awaitRef = hasCustomRefPoint(currentMapParams);
            if (!dates) return;
            pendingDateSyncByIndex.set(index, {
                startDate: dates.startDate,
                endDate: dates.endDate,
                awaitRef: awaitRef
            });
            if (!awaitRef) {
                tryApplyNarrowedDatesToIframe(index);
            } else {
                if (index === activeDatasetIdx) {
                    scheduleRefRecoveryWatchdogs(index, reason);
                }
                setTimeout(() => {
                    const pending = pendingDateSyncByIndex.get(index);
                    if (!pending || !pending.awaitRef || index !== activeDatasetIdx) return;
                    if (hasCustomRefPoint(currentMapParams) && !refAppliedForDateSyncByIndex.has(index)) {
                        scheduleRefRecoveryWatchdogs(index, 'ref-await-watchdog');
                        return;
                    }
                    pending.awaitRef = false;
                    tryApplyNarrowedDatesToIframe(index);
                }, REF_AWAIT_WATCHDOG_MS);
            }
        }

        // Phase 2 after refSwitch: second URL load with dates+ref (sarvey, mission full period only).
        // Per-dataset attribute span or narrowed period + dates+ref in URL breaks custom ref on load.
        // Mintpy always skips phase 2.
        function shouldRunDateAfterRef(datasetIndex) {
            const dataset = iframeDatasets.get(datasetIndex);
            if (!hasCustomRefPoint(currentMapParams)) return false;
            if (!currentMapParams.startDate || !currentMapParams.endDate) return false;
            if (isMintpyDataset(dataset)) return false;
            if (!isFullMissionDateRange()) return false;
            return true;
        }

        // Custom-ref iframe loads: sarvey-style minimal URL for refSwitch (ref+point+scales only).
        // Mintpy insarmaps.log adds colorscale, dates, contours, pixelSize on cross-dataset URLs;
        // those race with ref recolor. dateAfterRef phase adds dates back without template extras.
        function mapParamsForIframeLoad(mapParams, loadKind) {
            const p = { ...mapParams };
            if (!hasCustomRefPoint(mapParams)) {
                return p;
            }
            if (loadKind === 'crossDataset' || loadKind === 'refSwitch' || loadKind === 'refSwitchNoPoint' ||
                loadKind === 'dateAfterRef' || loadKind === 'pointAfterRef') {
                p.colorscale = null;
            }
            if (loadKind === 'refSwitch' || loadKind === 'refSwitchNoPoint') {
                p.startDate = null;
                p.endDate = null;
            }
            // Horz/Vert: point-before-ref on cold tiles blocks ref; omit point on first load.
            if (loadKind === 'refSwitchNoPoint') {
                p.pointLat = null;
                p.pointLon = null;
            }
            // Dates in pointAfterRef URL race ref recolor (same as refSwitch); parent sends set-dates after ref ack.
            if (loadKind === 'pointAfterRef') {
                p.startDate = null;
                p.endDate = null;
            }
            if (loadKind === 'dateAfterRef') {
                p.contour = null;
                p.pixelSize = null;
            }
            return p;
        }

        function paramsForDatasetSwitch(index) {
            return mapParamsForIframeLoad(
                mapParamsForPeriodSync(mapParamsWithOverlayUserDisplay(currentMapParams)),
                'crossDataset'
            );
        }

        // Whether target iframe already matches overlay state (no reload / postMessage needed on switch).
        function getDatasetIframeSyncStatus(index) {
            const iframe = document.getElementById(`iframe${index}`);
            const iframeParams = paramsForDatasetSwitch(index);
            const syncKey = getSyncKey(iframeParams);
            const storedSyncKey = iframeSynced.get(index);
            const srcDatesMatch = iframeDatesMatchExpected(
                iframe?.src, iframeParams.startDate, iframeParams.endDate
            );
            const scaleMatch = iframeScaleParamsMatchExpected(iframe?.src, iframeParams);
            const colorscaleMatch = iframeColorscaleMatchExpected(iframe?.src, iframeParams);
            const contourMatch = iframeContourMatchExpected(iframe?.src, iframeParams);
            const pixelSizeMatch = iframePixelSizeMatchExpected(iframe?.src, iframeParams);
            const inFlight = iframeWarmInFlight.has(index);
            const metadataSynced = storedSyncKey === syncKey && !!iframe?.src;
            const fullySynced = metadataSynced && srcDatesMatch && scaleMatch &&
                colorscaleMatch && contourMatch && pixelSizeMatch && !inFlight;
            return {
                iframeParams, syncKey, storedSyncKey, srcDatesMatch, scaleMatch, colorscaleMatch,
                contourMatch, pixelSizeMatch, metadataSynced, fullySynced, inFlight
            };
        }

        function cachedSwitchStateForIndex(index) {
            const reported = lastReportedDatesByIndex.get(index);
            const fromUrl = snapshotPointRefOnIframe(index);
            if (!reported?.startDate && !fromUrl) return null;
            return {
                startDate: reported?.startDate ?? null,
                endDate: reported?.endDate ?? null,
                datesNarrowed: !!(reported && reported.datesNarrowed),
                pointLat: fromUrl?.pointLat ?? null,
                pointLon: fromUrl?.pointLon ?? null,
                refPointLat: fromUrl?.refPointLat ?? null,
                refPointLon: fromUrl?.refPointLon ?? null,
                hasCustomRef: !!(fromUrl?.refPointLat && fromUrl?.refPointLon) ||
                    (index >= 0 && lastKnownRefByIndex.has(index)),
                chartsVisible: null,
                refAppliedInternal: !!(fromUrl?.refPointLat && fromUrl?.refPointLon),
                source: 'cached'
            };
        }

        // On dataset switch, reload if iframe URL does not match full current state (incl. startDate/endDate).
        function syncDatasetIframeOnSwitch(index) {
            const dataset = iframeDatasets.get(index);
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !dataset) return { reloaded: false, path: 'no-iframe' };
            if (!currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                ensureDatasetIframeLoaded(index, 'switch-load');
                return { reloaded: false, path: 'switch-load' };
            }
            const status = getDatasetIframeSyncStatus(index);
            const iframeParams = status.iframeParams;
            const syncKey = status.syncKey;
            const willSkip = status.fullySynced;
            const narrowed = effectiveNarrowedDatesForSync();
            let expectedDates = null;
            let storedDates = null;
            try { expectedDates = JSON.parse(syncKey); } catch (e) {}
            try { storedDates = status.storedSyncKey ? JSON.parse(status.storedSyncKey) : null; } catch (e) {}
            const expectedViewKey = getViewSyncKey(iframeParams);
            const storedViewKey = storedDates ? getViewSyncKey(storedDates) : null;
            const viewMatch = !storedViewKey || storedViewKey === expectedViewKey;
            const useSetDatesPath = !hasCustomRefPoint(currentMapParams) && narrowed && !!iframe.src &&
                viewMatch && status.scaleMatch && status.colorscaleMatch && status.contourMatch &&
                status.pixelSizeMatch;
            // Default ref + narrowed period: always postMessage set-dates (per-dataset snap), even when
            // sync key matches — background iframe may be "synced" at calendar dates but still show full span.
            if (useSetDatesPath) {
                applyDatesToIframeOnSwitch(index, narrowed.startDate, narrowed.endDate);
                iframeSynced.set(index, syncKey);
                iframePointSynced.set(index, getPointKey(iframeParams));
                console.log(`[overlay] dataset switch SET-DATES ${iframeLabelForLog(index)}  (${willSkip ? 'skip-reload' : 'no-reload'})`);
                return { reloaded: false, path: 'set-dates' };
            }
            if (willSkip) {
                console.log(`[overlay] dataset switch SKIP reload ${iframeLabelForLog(index)}  (iframe already synced)`);
                // #region agent log
                dbgDisplayLog('overlay.html:syncDatasetIframeOnSwitch', 'skip-synced path', {
                    index, label: iframeLabelForLog(index),
                    parentContour: effectiveContour(currentMapParams),
                    parentPixelSize: currentMapParams.pixelSize,
                    iframeUrlParams: urlDisplayParamsFromSrc(iframe?.src),
                    status: {
                        contourMatch: status.contourMatch,
                        pixelSizeMatch: status.pixelSizeMatch,
                        fullySynced: status.fullySynced,
                        metadataSynced: status.metadataSynced
                    }
                }, 'A');
                // #endregion
                if (!pendingDateSyncByIndex.has(index)) {
                    const iframeDates = snapshotPeriodOnIframe(index);
                    const ok = !narrowed || !!(iframeDates && periodRangesMatch(narrowed, iframeDates));
                    logSwitchOutcomePart(index, 'dates', ok, iframeDates || {});
                }
                return { reloaded: false, path: 'skip-synced' };
            }
            const reloaded = reloadDatasetIframe(index, 'switch-dataset', 'crossDataset');
            // #region agent log
            dbgDisplayLog('overlay.html:syncDatasetIframeOnSwitch', 'reload path', {
                index, label: iframeLabelForLog(index), reloaded,
                parentContour: effectiveContour(currentMapParams),
                parentPixelSize: currentMapParams.pixelSize,
                iframeUrlParams: urlDisplayParamsFromSrc(iframe?.src),
                status: {
                    contourMatch: status.contourMatch,
                    pixelSizeMatch: status.pixelSizeMatch,
                    fullySynced: status.fullySynced
                }
            }, 'A');
            // #endregion
            return { reloaded: reloaded, path: 'crossDataset-reload' };
        }

        function expandDatasetNameLine(datasetName, templateUrl) {
            const u = new URL(templateUrl);
            u.searchParams.set('startDataset', datasetName.trim());
            TEMPLATE_PARAMS_STRIP_ON_EXPAND.forEach((key) => u.searchParams.delete(key));
            return u.toString();
        }

        function parseInsarmapsLogUrls(data) {
            const lines = data.split('\n').map((line) => line.trim()).filter(Boolean);
            let templateUrl = null;
            const urls = [];
            for (const line of lines) {
                if (isFullInsarmapsLogUrl(line)) {
                    if (!isValidInsarmapsLogUrl(line)) continue;
                    if (!templateUrl) templateUrl = line;
                    urls.push(line);
                    continue;
                }
                if (isDatasetNameOnlyLine(line)) {
                    if (!templateUrl) {
                        console.warn('[overlay] insarmaps.log: dataset name before template URL, skipped:', line);
                        continue;
                    }
                    const expanded = expandDatasetNameLine(line, templateUrl);
                    if (expanded && isValidInsarmapsLogUrl(expanded)) {
                        urls.push(expanded);
                    } else {
                        console.warn('[overlay] insarmaps.log: could not expand dataset name:', line);
                    }
                    continue;
                }
                if (line.includes('startDataset=') && templateUrl) {
                    try {
                        const origin = new URL(templateUrl).origin;
                        const path = line.startsWith('/start/') ? line : `/start/${line.replace(/^\//, '')}`;
                        const expanded = new URL(path, origin).toString();
                        if (isValidInsarmapsLogUrl(expanded)) urls.push(expanded);
                    } catch (e) {
                        console.warn('[overlay] insarmaps.log: could not parse partial URL line:', line);
                    }
                }
            }
            return urls;
        }

        function navigateToPreviousPage() {
            const ref = document.referrer || '';
            const cameFromOverlay = ref.includes('overlay.html') || ref.includes('index.html');
            if (ref && !cameFromOverlay) {
                window.location.replace(ref);
                return;
            }
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        }

        function showInsarmapsLogError(detail) {
            if (insarmapsLogErrorShown) return;
            insarmapsLogErrorShown = true;
            insarmapsLogResolved = true;
            const loading = document.getElementById('loading');
            if (loading) {
                loading.textContent = INSARMAPS_LOG_USER_ERROR + ' Returning to previous page...';
                loading.style.color = '#c62828';
                loading.style.display = '';
            }
            console.error('insarmaps.log error:', detail);
            setTimeout(navigateToPreviousPage, INSARMAPS_LOG_ERROR_REDIRECT_MS);
        }
        
        // Generate a sync key from current params
        function getSyncKey(params) {
            const scaleState = scaleStateFromMapParams(params);
            const autoColorScale = scaleState.autoColorScale;
            const autoActive = isAutoColorScaleMode(autoColorScale);
            return JSON.stringify({
                lat: params.lat,
                lon: params.lon,
                zoom: params.zoom,
                autoColorScale: autoColorScale,
                minScale: autoActive ? null : scaleState.minScale,
                maxScale: autoActive ? null : scaleState.maxScale,
                startDate: params.startDate,
                endDate: params.endDate,
                pixelSize: params.pixelSize,
                background: params.background,
                opacity: params.opacity,
                contour: effectiveContour(params),
                colorscale: effectiveColorscale(params),
                refPointLat: params.refPointLat,
                refPointLon: params.refPointLon,
                pointLat: params.pointLat,
                pointLon: params.pointLon
            });
        }

        function getViewSyncKey(params) {
            return JSON.stringify({
                lat: params.lat,
                lon: params.lon,
                zoom: params.zoom,
                minScale: params.minScale,
                maxScale: params.maxScale,
                pixelSize: params.pixelSize,
                background: params.background,
                opacity: params.opacity,
                contour: effectiveContour(params),
                colorscale: effectiveColorscale(params),
                refPointLat: params.refPointLat,
                refPointLon: params.refPointLon,
                pointLat: params.pointLat,
                pointLon: params.pointLon
            });
        }

        function applyDatesToIframeOnSwitch(index, startDate, endDate) {
            if (!startDate || !endDate) return false;
            pendingDateSyncByIndex.set(index, { startDate: startDate, endDate: endDate, awaitRef: false });
            return tryApplyNarrowedDatesToIframe(index);
        }

        function getPointKey(params) {
            return JSON.stringify({
                pointLat: params.pointLat ?? null,
                pointLon: params.pointLon ?? null,
                refPointLat: params.refPointLat ?? null,
                refPointLon: params.refPointLon ?? null
            });
        }

        function paramsNeedBackgroundWarm(prev, next) {
            return (
                prev.lat !== next.lat ||
                prev.lon !== next.lon ||
                prev.zoom !== next.zoom ||
                prev.autoColorScale !== next.autoColorScale ||
                prev.minScale !== next.minScale ||
                prev.maxScale !== next.maxScale ||
                prev.startDate !== next.startDate ||
                prev.endDate !== next.endDate ||
                prev.pixelSize !== next.pixelSize ||
                prev.background !== next.background ||
                prev.opacity !== next.opacity ||
                normalizeContourValue(prev.contour) !== normalizeContourValue(next.contour) ||
                prev.colorscale !== next.colorscale ||
                getPointKey(prev) !== getPointKey(next)
            );
        }

        function allBackgroundsSynced(mapParams, senderIndex) {
            const syncKey = getSyncKey(mapParams);
            const pointKey = getPointKey(mapParams);
            for (const [index] of iframeDatasets) {
                if (index === senderIndex) continue;
                if (iframeSynced.get(index) !== syncKey || iframePointSynced.get(index) !== pointKey) {
                    return false;
                }
            }
            return true;
        }

        function hasPointSelection(params) {
            return getPointKey(params) !== getPointKey({});
        }

        function backgroundsPreloadInProgress() {
            return iframeWarmInFlight.size > 0;
        }

        function scheduleWarmAll(senderIndex, lat, lon, zoom, mapParams, warmReason) {
            pendingWarm = { senderIndex, lat, lon, zoom, mapParams, warmReason };
            if (warmTimeout) clearTimeout(warmTimeout);
            warmTimeout = setTimeout(() => {
                warmTimeout = null;
                const p = pendingWarm;
                pendingWarm = null;
                if (p) {
                    warmAllBackgroundIframes(
                        p.senderIndex, p.lat, p.lon, p.zoom, p.mapParams, p.warmReason
                    );
                }
            }, WARM_DEBOUNCE_MS);
        }

        function cancelPendingWarm() {
            if (warmTimeout) {
                clearTimeout(warmTimeout);
                warmTimeout = null;
                pendingWarm = null;
            }
        }

        function isPeriodWarmReason(reason) {
            return String(reason || '').includes('period');
        }

        function datesFromIframeSrc(src) {
            if (!src) return null;
            try {
                const u = new URL(src, window.location.href);
                return {
                    startDate: u.searchParams.get('startDate'),
                    endDate: u.searchParams.get('endDate')
                };
            } catch (e) {
                return null;
            }
        }

        // Default ref only: pre-warm other datasets after active iframe period change.
        function schedulePeriodBackgroundWarm(senderIndex, lat, lon, zoom, mapParams, warmReason) {
            const periodParams = mapParamsForPeriodSync(mapParams);
            if (!lat || !lon || !zoom || hasCustomRefPoint(mapParams)) return;
            const reason = `${warmReason}:period`;
            pendingWarm = { senderIndex, lat, lon, zoom, mapParams: periodParams, warmReason: reason };
            if (warmTimeout) clearTimeout(warmTimeout);
            warmTimeout = setTimeout(() => {
                warmTimeout = null;
                const p = pendingWarm;
                pendingWarm = null;
                if (p) {
                    warmAllBackgroundIframes(
                        p.senderIndex, p.lat, p.lon, p.zoom, p.mapParams, p.warmReason
                    );
                }
            }, PERIOD_WARM_DEBOUNCE_MS);
        }

        function flushPeriodBackgroundWarm(senderIndex, lat, lon, zoom, mapParams, warmReason) {
            const periodParams = mapParamsForPeriodSync(mapParams);
            if (!lat || !lon || !zoom || hasCustomRefPoint(mapParams)) return;
            cancelPendingWarm();
            warmAllBackgroundIframes(senderIndex, lat, lon, zoom, periodParams, `${warmReason}:period`);
        }

        function flushWarmAll(senderIndex, lat, lon, zoom, mapParams, warmReason) {
            cancelPendingWarm();
            warmAllBackgroundIframes(senderIndex, lat, lon, zoom, mapParams, warmReason);
        }

        function maybeCatchupWarmAfterLoad() {
            if (Date.now() < datasetSwitchSuppressUntil) return;
            if (backgroundsPreloadInProgress()) return;
            if (!currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) return;
            if (!hasCustomRefPoint(currentMapParams) && effectiveNarrowedDatesForSync()) {
                if (!backgroundsPeriodWarmNeeded(currentMapParams, activeDatasetIdx)) return;
                schedulePeriodBackgroundWarm(
                    activeDatasetIdx,
                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                    currentMapParams, 'catchup-after-load'
                );
                return;
            }
            if (allBackgroundsSynced(currentMapParams, activeDatasetIdx)) return;
            scheduleWarmAll(
                activeDatasetIdx,
                currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                currentMapParams, 'catchup-after-load'
            );
        }

        // Load a dataset iframe on demand (deferred backgrounds or early dataset switch).
        function ensureDatasetIframeLoaded(index, reason) {
            const iframe = document.getElementById(`iframe${index}`);
            const dataset = iframeDatasets.get(index);
            if (!iframe || !dataset) return;
            if (iframe.src) return;
            const hasCoords = currentMapParams.lat && currentMapParams.lon && currentMapParams.zoom;
            let newUrl;
            if (hasCoords) {
                newUrl = buildInsarmapsUrl(
                    baseUrl, dataset,
                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                    mapParamsForIframeLoad(currentMapParams, index !== activeDatasetIdx ? 'crossDataset' : 'default'),
                    `ds${index}`, false, false
                );
            } else {
                const url = urlsList[index];
                if (!url) return;
                newUrl = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
            }
            const syncKey = getSyncKey(currentMapParams);
            if (setIframeSrc(iframe, newUrl, { label: iframeLabelForLog(index), reason })) {
                iframeWarmInFlight.set(index, syncKey);
                updateLoadingIndicator();
                iframe.onload = () => {
                    iframeWarmInFlight.delete(index);
                    updateLoadingIndicator();
                    console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                    maybeCatchupWarmAfterLoad();
                };
            }
            iframeSynced.set(index, syncKey);
            iframePointSynced.set(index, getPointKey(currentMapParams));
        }

        // Force iframe reload with ref-focused params (mintpy asc needs minimal URL like sarvey).
        function reloadDatasetIframe(index, reason, loadKind, reloadOptions) {
            reloadOptions = reloadOptions || {};
            const dataset = iframeDatasets.get(index);
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !dataset || !currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                return false;
            }
            iframeWarmInFlight.delete(index);
            const syncParams = mapParamsForPeriodSync(mapParamsWithOverlayUserDisplay(currentMapParams));
            const effRef = effectiveRefCoords();
            if (effRef) {
                syncParams.refPointLat = effRef.refPointLat;
                syncParams.refPointLon = effRef.refPointLon;
            }
            const iframeParams = mapParamsForIframeLoad(syncParams, loadKind);
            const fullSwitchParams = mapParamsForIframeLoad(syncParams, 'crossDataset');
            const syncKey = getSyncKey(fullSwitchParams);
            const pointKey = getPointKey(fullSwitchParams);
            const newUrl = buildInsarmapsUrl(
                baseUrl, dataset,
                currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                iframeParams, `ds${index}`, false, false
            );
            console.log(`[overlay] iframe RELOAD ${iframeLabelForLog(index)}  reason=${reason}`, {
                to: canonicalInsarmapsUrl(newUrl)
            });
            iframe.src = newUrl;
            recordSwitchDebugReloadUrl(newUrl);
            iframeWarmInFlight.set(index, syncKey);
            updateLoadingIndicator();
            iframe.onload = () => {
                iframeWarmInFlight.delete(index);
                updateLoadingIndicator();
                console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                const needsDatePhase = !reloadOptions.skipDatePhase &&
                    loadKind === 'refSwitch' &&
                    shouldRunDateAfterRef(index);
                if (needsDatePhase) {
                    const iframeHasDates = (() => {
                        try {
                            const u = new URL(iframe.src);
                            return u.searchParams.get('startDate') === currentMapParams.startDate &&
                                u.searchParams.get('endDate') === currentMapParams.endDate;
                        } catch (e) {
                            return false;
                        }
                    })();
                    if (!iframeHasDates) {
                        reloadDatasetIframe(index, 'apply-dates-after-ref', 'dateAfterRef', { skipDatePhase: true });
                        return;
                    }
                } else if (loadKind === 'pointAfterRef') {
                    setTimeout(() => {
                        if (pointAfterRefInFlightByIndex.has(index)) {
                            completePointAfterRefPhase(index);
                        }
                    }, 12000);
                    return;
                } else if ((loadKind === 'refSwitch' || loadKind === 'refSwitchNoPoint') &&
                    hasCustomRefPoint(currentMapParams)) {
                    // Dates sync only after insarmaps-ref-applied (maybeStartDateSyncAfterRef).
                }
                maybeResolveSwitchDatesOnIframeLoad(index);
                broadcastAutoColorScaleToIframes(index);
                broadcastColorscaleToIframes(index);
                maybeCatchupWarmAfterLoad();
            };
            lastWarmSyncKey = syncKey;
            iframeSynced.set(index, syncKey);
            iframePointSynced.set(index, pointKey);
            return true;
        }

        // Apply current point to one iframe if tracking says it is stale (used on dataset switch).
        function syncPointToIframeIfStale(index, reason) {
            if (!hasPointSelection(currentMapParams)) return;
            if (iframeWarmInFlight.has(index)) {
                console.log(`[overlay] switch-point-sync SKIP ${iframeLabelForLog(index)}  reason=preload-in-flight`);
                return;
            }
            const pointKey = getPointKey(currentMapParams);
            const forceReloadOnSwitch = reason === 'switch-point-sync' &&
                currentMapParams.refPointLat != null && currentMapParams.refPointLon != null;
            if (!forceReloadOnSwitch && iframePointSynced.get(index) === pointKey) {
                return;
            }
            const dataset = iframeDatasets.get(index);
            const iframe = document.getElementById(`iframe${index}`);
            if (!iframe || !dataset || !currentMapParams.lat || !currentMapParams.lon || !currentMapParams.zoom) {
                return;
            }
            const syncKey = getSyncKey(currentMapParams);
            const iframeParams = (forceReloadOnSwitch && hasCustomRefPoint(currentMapParams))
                ? mapParamsForIframeLoad(currentMapParams, 'refSwitch')
                : currentMapParams;
            const newUrl = buildInsarmapsUrl(
                baseUrl, dataset,
                currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                iframeParams, `ds${index}`, false, false
            );
            let reloaded = false;
            if (forceReloadOnSwitch && iframe.src && insarmapsUrlsEquivalent(iframe.src, newUrl)) {
                console.log(`[overlay] iframe RELOAD ${iframeLabelForLog(index)}  reason=${reason}:force-ref-resync`);
                iframe.src = newUrl;
                reloaded = true;
                iframeWarmInFlight.set(index, syncKey);
                updateLoadingIndicator();
                iframe.onload = () => {
                    iframeWarmInFlight.delete(index);
                    updateLoadingIndicator();
                    console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                    maybeCatchupWarmAfterLoad();
                };
                lastWarmSyncKey = syncKey;
            } else if (setIframeSrc(iframe, newUrl, { label: iframeLabelForLog(index), reason })) {
                reloaded = true;
                iframeWarmInFlight.set(index, syncKey);
                updateLoadingIndicator();
                iframe.onload = () => {
                    iframeWarmInFlight.delete(index);
                    updateLoadingIndicator();
                    console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=${reason}`);
                    maybeCatchupWarmAfterLoad();
                };
                lastWarmSyncKey = syncKey;
            }
            iframeSynced.set(index, syncKey);
            iframePointSynced.set(index, pointKey);
        }

        function broadcastAutoColorScaleToIframes(onlyIndex) {
            const scaleState = scaleStateFromMapParams(currentMapParams);
            const mode = scaleState.autoColorScale;
            iframeDatasets.forEach((_, index) => {
                if (onlyIndex !== undefined && onlyIndex >= 0 && index !== onlyIndex) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !iframe.contentWindow) return;
                const msg = { type: 'insarmaps-set-auto-color-scale', mode: mode };
                if (mode === 'false') {
                    msg.minScale = scaleState.minScale;
                    msg.maxScale = scaleState.maxScale;
                }
                try {
                    iframe.contentWindow.postMessage(msg, '*');
                } catch (e) {}
            });
        }

        function broadcastColorscaleToIframes(onlyIndex) {
            const colorscale = effectiveColorscale(currentMapParams);
            iframeDatasets.forEach((_, index) => {
                if (onlyIndex !== undefined && onlyIndex >= 0 && index !== onlyIndex) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !iframe.contentWindow) return;
                try {
                    iframe.contentWindow.postMessage({
                        type: 'insarmaps-set-colorscale',
                        colorscale: colorscale
                    }, '*');
                } catch (e) {}
            });
        }

        function broadcastContourAndPixelSizeToIframe(onlyIndex) {
            const params = mapParamsWithOverlayUserDisplay(currentMapParams);
            const contourOn = effectiveContour(params) === 'true';
            const pixelSizeRaw = params.pixelSize;
            const pixelSize = pixelSizeRaw != null && pixelSizeRaw !== ''
                ? parseFloat(pixelSizeRaw) : null;
            iframeDatasets.forEach((_, index) => {
                if (onlyIndex !== undefined && onlyIndex >= 0 && index !== onlyIndex) return;
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !iframe.contentWindow) return;
                try {
                    iframe.contentWindow.postMessage({
                        type: 'insarmaps-set-contour', value: contourOn
                    }, '*');
                    if (pixelSize != null && !isNaN(pixelSize)) {
                        iframe.contentWindow.postMessage({
                            type: 'insarmaps-set-pixelSize', value: pixelSize
                        }, '*');
                    }
                } catch (e) {}
            });
            // #region agent log
            dbgDisplayLog('overlay.html:broadcastDisplay', 'postMessage contour/pixelSize to iframe', {
                onlyIndex, contourOn, pixelSize, overlayUserDisplay: { ...overlayUserDisplay }
            }, 'G');
            // #endregion
            recordSwitchDebugSentPost(contourOn, pixelSize, onlyIndex);
        }

        function broadcastMapDisplayStateAfterSwitch(activeIndex, switchReloaded, options) {
            options = options || {};
            if (options.skipBroadcast) return;
            const pushDisplayToActive = () => broadcastContourAndPixelSizeToIframe(activeIndex);
            if (switchReloaded) {
                iframeDatasets.forEach((_, index) => {
                    if (index !== activeIndex) {
                        broadcastAutoColorScaleToIframes(index);
                        broadcastColorscaleToIframes(index);
                    }
                });
                const iframe = document.getElementById(`iframe${activeIndex}`);
                if (iframe) {
                    iframe.addEventListener('load', () => {
                        broadcastAutoColorScaleToIframes(activeIndex);
                        broadcastColorscaleToIframes(activeIndex);
                        pushDisplayToActive();
                    }, { once: true });
                }
            } else {
                broadcastAutoColorScaleToIframes();
                broadcastColorscaleToIframes();
                pushDisplayToActive();
            }
        }

        function mergeParamsFromInsarmapsMessage(urlPath, eventData, baseParams) {
            const pathMatch = urlPath.match(/^\/start\/([^\/]+)\/([^\/]+)\/([^?]+)/);
            if (!pathMatch) return null;
            const [, lat, lon, zoom] = pathMatch;
            const queryStart = urlPath.indexOf('?');
            const params = queryStart >= 0 ? new URLSearchParams(urlPath.substring(queryStart)) : new URLSearchParams();
            const getContourValue = () => contourFromInsarmapsMessage(params, eventData, baseParams);
            const contourValue = getContourValue();
            const rawMinScale = params.get('minScale') ?? baseParams.minScale;
            const rawMaxScale = params.get('maxScale') ?? baseParams.maxScale;
            const scaleState = resolveAutoColorScaleState(
                rawMinScale, rawMaxScale, autoColorScaleParamFromInsarmapsUrl(params)
            );
            return {
                lat, lon, zoom,
                autoColorScale: scaleState.autoColorScale,
                minScale: scaleState.minScale,
                maxScale: scaleState.maxScale,
                startDate: (eventData && eventData.startDate) ?? params.get('startDate') ?? baseParams.startDate,
                endDate: (eventData && eventData.endDate) ?? params.get('endDate') ?? baseParams.endDate,
                pixelSize: params.get('pixelSize') ?? baseParams.pixelSize,
                background: params.get('background') ?? baseParams.background,
                opacity: params.get('opacity') ?? baseParams.opacity,
                contour: contourValue,
                colorscale: params.get('colorscale') || baseParams.colorscale || INSARMAP_URL_DEFAULTS.colorscale,
                refPointLat: params.get('refPointLat') ?? baseParams.refPointLat ?? null,
                refPointLon: params.get('refPointLon') ?? baseParams.refPointLon ?? null,
                pointLat: params.get('pointLat') ?? baseParams.pointLat ?? null,
                pointLon: params.get('pointLon') ?? baseParams.pointLon ?? null
            };
        }

        // Eagerly preload all background dataset iframes in parallel (instant, no reload on dataset switch).
        function warmAllBackgroundIframes(senderIndex, lat, lon, zoom, mapParams, warmReason) {
            if (!lat || !lon || !zoom) return;
            const isPointWarm = String(warmReason || '').includes('point');
            const isScaleWarm = String(warmReason || '').includes('scale');
            const isColorscaleWarm = String(warmReason || '').includes('colorscale');
            const isContourWarm = String(warmReason || '').includes('contour');
            const isPixelSizeWarm = String(warmReason || '').includes('pixelSize');
            const isUrgentWarm = isPointWarm || isScaleWarm || isColorscaleWarm || isContourWarm ||
                isPixelSizeWarm || isPeriodWarmReason(warmReason);
            if (!isUrgentWarm && Date.now() < datasetSwitchSuppressUntil) {
                console.log(`[overlay] warmAll SKIP  reason=${warmReason || 'warm-background'}:switch-suppress`);
                return;
            }
            if (hasPartialCustomRef(mapParams)) {
                console.log(`[overlay] warmAll SKIP  reason=${warmReason || 'warm-background'}:incomplete-ref`);
                return;
            }
            if (isPeriodWarmReason(warmReason)) {
                mapParams = mapParamsForPeriodSync(mapParams);
            }
            mapParams = mapParamsWithOverlayUserDisplay(mapParams);
            const syncKey = getSyncKey(mapParams);
            const pointKey = getPointKey(mapParams);
            const reason = warmReason || 'warm-background';
            const commitSyncOnLoad = isPeriodWarmReason(reason);
            if (!isUrgentWarm && backgroundsPreloadInProgress()) {
                console.log(`[overlay] warmAll SKIP  reason=${reason}:preload-in-progress`);
                return;
            }
            if (!isUrgentWarm && syncKey === lastWarmSyncKey && allBackgroundsSynced(mapParams, senderIndex)) {
                console.log(`[overlay] warmAll SKIP  reason=${reason}:already-warm`);
                return;
            }
            let reloaded = 0;
            let skipped = 0;
            console.log(`[overlay] warmAll START  reason=${reason}  sender=${senderIndex >= 0 ? iframeLabelForLog(senderIndex) : 'none'}`);
            iframeDatasets.forEach((originalDataset, index) => {
                if (index === senderIndex) return;
                const label = iframeLabelForLog(index);
                const warmLoadKind = hasCustomRefPoint(mapParams) ? 'refSwitch' : 'crossDataset';
                const iframeParams = mapParamsForIframeLoad(mapParams, warmLoadKind);
                if (iframeSynced.get(index) === syncKey && iframePointSynced.get(index) === pointKey) {
                    const iframe = document.getElementById(`iframe${index}`);
                    if (iframe && iframeScaleParamsMatchExpected(iframe.src, iframeParams) &&
                        iframeColorscaleMatchExpected(iframe.src, iframeParams) &&
                        iframeContourMatchExpected(iframe.src, iframeParams) &&
                        iframePixelSizeMatchExpected(iframe.src, iframeParams)) {
                        console.log(`[overlay] iframe SKIP  ${label}  reason=${reason}:already-synced`);
                        skipped++;
                        return;
                    }
                }
                if (iframeWarmInFlight.has(index)) {
                    if (iframeWarmInFlight.get(index) === syncKey) {
                        console.log(`[overlay] iframe SKIP  ${label}  reason=${reason}:in-flight-same`);
                        skipped++;
                        return;
                    }
                    if (!isUrgentWarm) {
                        console.log(`[overlay] iframe SKIP  ${label}  reason=${reason}:in-flight-dont-abort`);
                        skipped++;
                        return;
                    }
                }
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !originalDataset) return;
                const newUrl = buildInsarmapsUrl(
                    baseUrl, originalDataset, lat, lon, zoom, iframeParams, `ds${index}`, false, false
                );
                // #region agent log
                if (isContourWarm || isPixelSizeWarm || reason.includes('contour') || reason.includes('pixelSize')) {
                    dbgDisplayLog('overlay.html:warmAll', 'warm reload URL display params', {
                        index, label, reason,
                        builtUrlParams: urlDisplayParamsFromSrc(newUrl),
                        mapParamsContour: effectiveContour(iframeParams),
                        mapParamsPixelSize: iframeParams.pixelSize
                    }, 'C');
                }
                // #endregion
                const loadedSyncKey = getSyncKey(iframeParams);
                const loadedPointKey = getPointKey(iframeParams);
                if (setIframeSrc(iframe, newUrl, { label, reason })) {
                    iframeWarmInFlight.set(index, syncKey);
                    updateLoadingIndicator();
                    iframe.onload = () => {
                        iframeWarmInFlight.delete(index);
                        updateLoadingIndicator();
                        console.log(`[overlay] iframe LOADED ${label}  reason=${reason}`);
                        iframeSynced.set(index, loadedSyncKey);
                        iframePointSynced.set(index, loadedPointKey);
                        broadcastAutoColorScaleToIframes(index);
                        broadcastColorscaleToIframes(index);
                        if (warmLoadKind === 'refSwitch' && shouldRunDateAfterRef(index)) {
                            reloadDatasetIframe(index, `${reason}-dates-after-ref`, 'dateAfterRef', { skipDatePhase: true });
                            return;
                        }
                        maybeCatchupWarmAfterLoad();
                    };
                    reloaded++;
                    if (!commitSyncOnLoad) {
                        iframeSynced.set(index, loadedSyncKey);
                        iframePointSynced.set(index, loadedPointKey);
                    }
                } else {
                    skipped++;
                    if (iframeDatesMatchExpected(iframe.src, iframeParams.startDate, iframeParams.endDate) &&
                        iframeScaleParamsMatchExpected(iframe.src, iframeParams) &&
                        iframeColorscaleMatchExpected(iframe.src, iframeParams) &&
                        iframeContourMatchExpected(iframe.src, iframeParams) &&
                        iframePixelSizeMatchExpected(iframe.src, iframeParams)) {
                        iframeSynced.set(index, loadedSyncKey);
                        iframePointSynced.set(index, loadedPointKey);
                    }
                }
            });
            if (senderIndex >= 0) {
                const senderLoadKind = hasCustomRefPoint(mapParams) ? 'refSwitch' : 'crossDataset';
                const senderParams = mapParamsForIframeLoad(mapParams, senderLoadKind);
                iframePointSynced.set(senderIndex, getPointKey(senderParams));
                iframeSynced.set(senderIndex, getSyncKey(senderParams));
            }
            if (reloaded > 0) lastWarmSyncKey = syncKey;
            console.log(`[overlay] warmAll DONE   reason=${reason}  reloaded=${reloaded}  skipped=${skipped}`);
        }

        // Append "Individual URLs:" footer — one link per insarmaps.log line; label from URL path/name (desc, asc, vert, horz)
        // Display order: Descending, Ascending, East-West, Vertical (match iframe sort: desc, asc, horz, vert)
        function appendIndividualUrlsFooter(urls) {
            const labelForUrl = (url) => {
                const u = url.toLowerCase();
                // Order matters: check desc before asc (same convention as iframe sort elsewhere in this file)
                if (u.includes('desc')) return 'Descending';
                if (u.includes('asc')) return 'Ascending';
                if (u.includes('horz')) return 'East-West';
                if (u.includes('vert')) return 'Vertical';
                return null;
            };
            const sortKeyForFooter = (url) => {
                const u = url.toLowerCase();
                if (u.includes('desc')) return 0;
                if (u.includes('asc')) return 1;
                if (u.includes('horz')) return 2;
                if (u.includes('vert')) return 3;
                return 4;
            };
            const ordered = urls.slice().sort((a, b) => sortKeyForFooter(a) - sortKeyForFooter(b));

            const wrap = document.createElement('div');
            wrap.id = 'individual-urls-footer';
            wrap.className = 'page-footer';

            const makeLink = (url, label) => {
                const a = document.createElement('a');
                a.dataset.logUrl = url;
                a.href = buildIndividualDatasetLinkUrl(url);
                a.textContent = label;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                return a;
            };

            const labels = ordered.map((url, i) => labelForUrl(url) || `Dataset ${i + 1}`);

            // Single centered line: "Individual URLs:" then all links separated by |
            const line = document.createElement('p');
            line.style.cssText = 'margin: 0; line-height: 1.6;';
            const title = document.createElement('strong');
            title.textContent = 'Individual URLs: ';
            line.appendChild(title);
            ordered.forEach((url, i) => {
                if (i > 0) {
                    line.appendChild(document.createTextNode(' | '));
                }
                line.appendChild(makeLink(url, labels[i]));
            });
            wrap.appendChild(line);

            document.body.appendChild(wrap);
        }

        // Parse insarmaps.log and create iframes dynamically
        const insarmapsLogFetchTimer = setTimeout(() => {
            if (!insarmapsLogResolved) {
                showInsarmapsLogError('Timed out loading insarmaps.log');
            }
        }, INSARMAPS_LOG_FETCH_TIMEOUT_MS);

        function finishInsarmapsLogFetch() {
            insarmapsLogResolved = true;
            clearTimeout(insarmapsLogFetchTimer);
        }

        fetch('insarmaps.log')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`insarmaps.log not found (HTTP ${response.status})`);
                }
                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                if (contentType.includes('text/html')) {
                    throw new Error('insarmaps.log not found (server returned an HTML page)');
                }
                return response.text();
            })
            .then(data => {
                finishInsarmapsLogFetch();
                const urls = parseInsarmapsLogUrls(data);

                if (urls.length === 0) {
                    showInsarmapsLogError('No valid URLs found in insarmaps.log');
                    return;
                }

                // Keep file line order for the "Individual URLs" footer (iframe list still uses sorted order below)
                const urlsFileOrder = urls.slice();
                
                // Sort URLs by dataset type: desc (0), asc (1), horz (2), vert (3), others (4)
                urls.sort((a, b) => {
                    const getSortKey = (url) => {
                        try {
                            const urlObj = new URL(url);
                            const startDataset = urlObj.searchParams.get('startDataset') || '';
                            const lower = startDataset.toLowerCase();
                            if (lower.includes('desc')) return 0;
                            if (lower.includes('asc')) return 1;
                            if (lower.includes('horz')) return 2;
                            if (lower.includes('vert')) return 3;
                            return 4;
                        } catch (e) {
                            return 5;
                        }
                    };
                    return getSortKey(a) - getSortKey(b);
                });
                
                urlsList = urls;
                
                // Extract labels from URLs
                const getLabel = (url) => {
                    try {
                        const urlObj = new URL(url);
                        const startDataset = urlObj.searchParams.get('startDataset') || '';
                        const lower = startDataset.toLowerCase();
                        if (lower.includes('desc')) return 'Descending';
                        if (lower.includes('asc')) return 'Ascending';
                        if (lower.includes('vert')) return 'Vertical';
                        if (lower.includes('horz')) return 'Horizontal';
                        return startDataset || 'Dataset';
                    } catch (e) {
                        return 'Dataset';
                    }
                };
                
                // Get initial params from overlay.html URL
                const initialParams = getOverlayUrlParams();
                
                // When URL has timeControls=true and periods, startDate/endDate come from first period
                const firstLogDefaults = parseInsarmapsUrlParams(urlsFileOrder[0]);
                let initialStartDate = initialParams.startDate ?? firstLogDefaults?.startDate ?? null;
                let initialEndDate = initialParams.endDate ?? firstLogDefaults?.endDate ?? null;
                if (initialParams.timeControls === 'true') {
                    const urlPeriods = parsePeriodsFromUrl(initialParams.periods);
                    if (urlPeriods && urlPeriods.length > 0) {
                        initialStartDate = urlPeriods[0].startDate;
                        initialEndDate = urlPeriods[0].endDate;
                    }
                }
                
                // Initialize current map params from overlay URL or first insarmaps.log line (file order)
                const initialScaleState = resolveAutoColorScaleState(
                    initialParams.minScale ?? firstLogDefaults?.minScale ?? null,
                    initialParams.maxScale ?? firstLogDefaults?.maxScale ?? null,
                    initialParams.autoColorScale ?? firstLogDefaults?.autoColorScale ?? 'true'
                );
                currentMapParams = {
                    lat: initialParams.lat || firstLogDefaults?.lat || null,
                    lon: initialParams.lon || firstLogDefaults?.lon || null,
                    zoom: initialParams.zoom || firstLogDefaults?.zoom || null,
                    autoColorScale: initialScaleState.autoColorScale,
                    minScale: initialScaleState.minScale,
                    maxScale: initialScaleState.maxScale,
                    startDate: initialStartDate,
                    endDate: initialEndDate,
                    pixelSize: initialParams.pixelSize ?? firstLogDefaults?.pixelSize ?? null,
                    background: initialParams.background ?? firstLogDefaults?.background ?? null,
                    opacity: initialParams.opacity ?? firstLogDefaults?.opacity ?? null,
                    contour: initialParams.contour ?? firstLogDefaults?.contour ?? null,
                    colorscale: initialParams.colorscale ?? firstLogDefaults?.colorscale ?? INSARMAP_URL_DEFAULTS.colorscale,
                    refPointLat: initialParams.refPointLat ?? firstLogDefaults?.refPointLat ?? null,
                    refPointLon: initialParams.refPointLon ?? firstLogDefaults?.refPointLon ?? null,
                    pointLat: initialParams.pointLat ?? firstLogDefaults?.pointLat ?? null,
                    pointLon: initialParams.pointLon ?? firstLogDefaults?.pointLon ?? null
                };
                // #region agent log
                dbgDisplayLog('overlay.html:init', 'overlay loaded', {
                    build: OVERLAY_DEBUG_BUILD,
                    contour: effectiveContour(currentMapParams),
                    pixelSize: currentMapParams.pixelSize,
                    background: currentMapParams.background,
                    opacity: currentMapParams.opacity
                }, 'D');
                // #endregion
                renderSwitchDebugPanel();
                initOverlayUserDisplayFrom(currentMapParams);
                seedBaselineFromInsarmapsUrls(urlsFileOrder);
                if (currentMapParams.startDate && currentMapParams.endDate) {
                    captureUserNarrowedDateRange(
                        currentMapParams.startDate, currentMapParams.endDate, activeDatasetIdx
                    );
                }
                
                // Create panels for each URL
                const container = document.getElementById('container');
                
                // Determine initial active panel based on URL view param
                let initialActiveIndex = 0;
                
                urls.forEach((url, index) => {
                    let dataset = null;  // Declare outside try block so it's accessible below
                    try {
                        const urlObj = new URL(url);
                        dataset = urlObj.searchParams.get('startDataset');
                        iframeDatasets.set(index, dataset);
                        
                        // Extract base URL from first URL
                        if (!baseUrl) {
                            baseUrl = urlObj.origin;
                        }
                    } catch (e) {
                        console.warn('Could not parse URL:', url);
                    }
