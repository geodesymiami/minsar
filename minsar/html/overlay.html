                        console.log(`[overlay] iframe SKIP  ${label}  reason=${reason}:in-flight-same`);
                        skipped++;
                        return;
                    }
                    if (!isPointWarm) {
                        console.log(`[overlay] iframe SKIP  ${label}  reason=${reason}:in-flight-dont-abort`);
                        skipped++;
                        return;
                    }
                }
                const iframe = document.getElementById(`iframe${index}`);
                if (!iframe || !originalDataset) return;
                const warmLoadKind = hasCustomRefPoint(mapParams) ? 'refSwitch' : 'crossDataset';
                const iframeParams = mapParamsForIframeLoad(mapParams, warmLoadKind);
                const newUrl = buildInsarmapsUrl(
                    baseUrl, originalDataset, lat, lon, zoom, iframeParams, `ds${index}`, false, false
                );
                if (setIframeSrc(iframe, newUrl, { label, reason })) {
                    iframeWarmInFlight.set(index, syncKey);
                    updateLoadingIndicator();
                    iframe.onload = () => {
                        iframeWarmInFlight.delete(index);
                        updateLoadingIndicator();
                        console.log(`[overlay] iframe LOADED ${label}  reason=${reason}`);
                        if (warmLoadKind === 'refSwitch' && shouldRunDateAfterRef(index)) {
                            reloadDatasetIframe(index, `${reason}-dates-after-ref`, 'dateAfterRef', { skipDatePhase: true });
                            return;
                        }
                        maybeCatchupWarmAfterLoad();
                    };
                    reloaded++;
                    const loadedSyncKey = getSyncKey(iframeParams);
                    const loadedPointKey = getPointKey(iframeParams);
                    iframeSynced.set(index, loadedSyncKey);
                    iframePointSynced.set(index, loadedPointKey);
                } else {
                    skipped++;
                    const loadedSyncKey = getSyncKey(iframeParams);
                    const loadedPointKey = getPointKey(iframeParams);
                    iframeSynced.set(index, loadedSyncKey);
                    iframePointSynced.set(index, loadedPointKey);
                }
            });
            if (senderIndex >= 0) {
                const senderLoadKind = hasCustomRefPoint(mapParams) ? 'refSwitch' : 'crossDataset';
                const senderParams = mapParamsForIframeLoad(mapParams, senderLoadKind);
                iframePointSynced.set(senderIndex, getPointKey(senderParams));
                iframeSynced.set(senderIndex, getSyncKey(senderParams));
            }
            if (reloaded > 0) lastWarmSyncKey = syncKey;
            console.log(`[overlay] warmAll DONE   reason=${reason}  reloaded=${reloaded}  skipped=${skipped}`);
        }

        // Append "Individual URLs:" footer — one link per insarmaps.log line; label from URL path/name (desc, asc, vert, horz)
        // Display order: Descending, Ascending, East-West, Vertical (match iframe sort: desc, asc, horz, vert)
        function appendIndividualUrlsFooter(urls) {
            const labelForUrl = (url) => {
                const u = url.toLowerCase();
                // Order matters: check desc before asc (same convention as iframe sort elsewhere in this file)
                if (u.includes('desc')) return 'Descending';
                if (u.includes('asc')) return 'Ascending';
                if (u.includes('horz')) return 'East-West';
                if (u.includes('vert')) return 'Vertical';
                return null;
            };
            const sortKeyForFooter = (url) => {
                const u = url.toLowerCase();
                if (u.includes('desc')) return 0;
                if (u.includes('asc')) return 1;
                if (u.includes('horz')) return 2;
                if (u.includes('vert')) return 3;
                return 4;
            };
            const ordered = urls.slice().sort((a, b) => sortKeyForFooter(a) - sortKeyForFooter(b));

            const wrap = document.createElement('div');
            wrap.id = 'individual-urls-footer';
            wrap.className = 'page-footer';

            const makeLink = (url, label) => {
                const a = document.createElement('a');
                a.dataset.logUrl = url;
                a.href = buildIndividualDatasetLinkUrl(url);
                a.textContent = label;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                return a;
            };

            const labels = ordered.map((url, i) => labelForUrl(url) || `Dataset ${i + 1}`);

            // Single centered line: "Individual URLs:" then all links separated by |
            const line = document.createElement('p');
            line.style.cssText = 'margin: 0; line-height: 1.6;';
            const title = document.createElement('strong');
            title.textContent = 'Individual URLs: ';
            line.appendChild(title);
            ordered.forEach((url, i) => {
                if (i > 0) {
                    line.appendChild(document.createTextNode(' | '));
                }
                line.appendChild(makeLink(url, labels[i]));
            });
            wrap.appendChild(line);

            document.body.appendChild(wrap);
        }

        // Parse insarmaps.log and create iframes dynamically
        const insarmapsLogFetchTimer = setTimeout(() => {
            if (!insarmapsLogResolved) {
                showInsarmapsLogError('Timed out loading insarmaps.log');
            }
        }, INSARMAPS_LOG_FETCH_TIMEOUT_MS);

        function finishInsarmapsLogFetch() {
            insarmapsLogResolved = true;
            clearTimeout(insarmapsLogFetchTimer);
        }

        fetch('insarmaps.log')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`insarmaps.log not found (HTTP ${response.status})`);
                }
                const contentType = (response.headers.get('content-type') || '').toLowerCase();
                if (contentType.includes('text/html')) {
                    throw new Error('insarmaps.log not found (server returned an HTML page)');
                }
                return response.text();
            })
            .then(data => {
                finishInsarmapsLogFetch();
                const urls = parseInsarmapsLogUrls(data);

                if (urls.length === 0) {
                    showInsarmapsLogError('No valid URLs found in insarmaps.log');
                    return;
                }

                // Keep file line order for the "Individual URLs" footer (iframe list still uses sorted order below)
                const urlsFileOrder = urls.slice();
                
                // Sort URLs by dataset type: desc (0), asc (1), horz (2), vert (3), others (4)
                urls.sort((a, b) => {
                    const getSortKey = (url) => {
                        try {
                            const urlObj = new URL(url);
                            const startDataset = urlObj.searchParams.get('startDataset') || '';
                            const lower = startDataset.toLowerCase();
                            if (lower.includes('desc')) return 0;
                            if (lower.includes('asc')) return 1;
                            if (lower.includes('horz')) return 2;
                            if (lower.includes('vert')) return 3;
                            return 4;
                        } catch (e) {
                            return 5;
                        }
                    };
                    return getSortKey(a) - getSortKey(b);
                });
                
                urlsList = urls;
                
                // Extract labels from URLs
                const getLabel = (url) => {
                    try {
                        const urlObj = new URL(url);
                        const startDataset = urlObj.searchParams.get('startDataset') || '';
                        const lower = startDataset.toLowerCase();
                        if (lower.includes('desc')) return 'Descending';
                        if (lower.includes('asc')) return 'Ascending';
                        if (lower.includes('vert')) return 'Vertical';
                        if (lower.includes('horz')) return 'Horizontal';
                        return startDataset || 'Dataset';
                    } catch (e) {
                        return 'Dataset';
                    }
                };
                
                // Get initial params from overlay.html URL
                const initialParams = getOverlayUrlParams();
                
                // When URL has timeControls=true and periods, startDate/endDate come from first period
                const firstLogDefaults = parseInsarmapsUrlParams(urlsFileOrder[0]);
                let initialStartDate = initialParams.startDate ?? firstLogDefaults?.startDate ?? null;
                let initialEndDate = initialParams.endDate ?? firstLogDefaults?.endDate ?? null;
                if (initialParams.timeControls === 'true') {
                    const urlPeriods = parsePeriodsFromUrl(initialParams.periods);
                    if (urlPeriods && urlPeriods.length > 0) {
                        initialStartDate = urlPeriods[0].startDate;
                        initialEndDate = urlPeriods[0].endDate;
                    }
                }
                
                // Initialize current map params from overlay URL or first insarmaps.log line (file order)
                currentMapParams = {
                    lat: initialParams.lat || firstLogDefaults?.lat || null,
                    lon: initialParams.lon || firstLogDefaults?.lon || null,
                    zoom: initialParams.zoom || firstLogDefaults?.zoom || null,
                    minScale: initialParams.minScale ?? firstLogDefaults?.minScale ?? null,
                    maxScale: initialParams.maxScale ?? firstLogDefaults?.maxScale ?? null,
                    startDate: initialStartDate,
                    endDate: initialEndDate,
                    pixelSize: initialParams.pixelSize ?? firstLogDefaults?.pixelSize ?? null,
                    background: initialParams.background ?? firstLogDefaults?.background ?? null,
                    opacity: initialParams.opacity ?? firstLogDefaults?.opacity ?? null,
                    contour: initialParams.contour ?? firstLogDefaults?.contour ?? null,
                    colorscale: initialParams.colorscale ?? firstLogDefaults?.colorscale ?? null,
                    refPointLat: initialParams.refPointLat ?? firstLogDefaults?.refPointLat ?? null,
                    refPointLon: initialParams.refPointLon ?? firstLogDefaults?.refPointLon ?? null,
                    pointLat: initialParams.pointLat ?? firstLogDefaults?.pointLat ?? null,
                    pointLon: initialParams.pointLon ?? firstLogDefaults?.pointLon ?? null
                };
                seedBaselineFromInsarmapsUrls(urlsFileOrder);
                if (currentMapParams.startDate && currentMapParams.endDate) {
                    captureUserNarrowedDateRange(
                        currentMapParams.startDate, currentMapParams.endDate, activeDatasetIdx
                    );
                }
                
                // Create panels for each URL
                const container = document.getElementById('container');
                
                // Determine initial active panel based on URL view param
                let initialActiveIndex = 0;
                
                urls.forEach((url, index) => {
                    let dataset = null;  // Declare outside try block so it's accessible below
                    try {
                        const urlObj = new URL(url);
                        dataset = urlObj.searchParams.get('startDataset');
                        iframeDatasets.set(index, dataset);
                        
                        // Extract base URL from first URL
                        if (!baseUrl) {
                            baseUrl = urlObj.origin;
                        }
                    } catch (e) {
                        console.warn('Could not parse URL:', url);
                    }
                    
                    const label = getLabel(url);
                    iframeLabels.set(index, label);
                    const labelCode = viewCodes[label] || label.toLowerCase();
                    
                    // Check if this should be the active panel based on URL param
                    // Support both view=desc and startDataset=<full_name>
                    if (initialParams.startDataset && dataset === initialParams.startDataset) {
                        initialActiveIndex = index;
                        currentViewCode = labelCode;
                        currentDataset = dataset;
                    } else if (initialParams.view && labelCode === initialParams.view) {
                        initialActiveIndex = index;
                        currentViewCode = labelCode;
                        currentDataset = dataset;
                    }
                    
                    // Dataset list items will be created after all URLs are processed
                });
                
                // Set default view code and dataset if not specified in URL
                if (!initialParams.view && !initialParams.startDataset) {
                    const firstLabel = iframeLabels.get(0);
                    currentViewCode = viewCodes[firstLabel] || 'desc';
                    currentDataset = iframeDatasets.get(0);
                } else if (!currentDataset) {
                    currentDataset = iframeDatasets.get(initialActiveIndex);
                }
                
                // Create panels with potentially modified URLs
                urls.forEach((url, index) => {
                    // Create panel
                    const panel = document.createElement('div');
                    panel.className = 'panel';
                    panel.id = `panel${index}`;
                    
                    // Set initial visibility - only show the active panel
                    if (index === initialActiveIndex) {
                        panel.classList.add('active');
                        panel.style.visibility = 'visible';
                        panel.style.zIndex = '10';
                        panel.style.pointerEvents = 'auto';
                    } else {
                        panel.style.visibility = 'hidden';
                        panel.style.zIndex = '-1';
                        panel.style.pointerEvents = 'none';
                    }
                    
                    // Build iframe URL - only the active dataset loads immediately; backgrounds defer
                    const dataset = iframeDatasets.get(index);
                    const hasCoords = currentMapParams.lat && currentMapParams.lon && currentMapParams.zoom && dataset;
                    const isActive = index === initialActiveIndex;
                    let iframeSrc = null;
                    if (isActive) {
                        if (hasCoords) {
                            iframeSrc = buildInsarmapsUrl(
                                baseUrl,
                                dataset,
                                currentMapParams.lat,
                                currentMapParams.lon,
                                currentMapParams.zoom,
                                currentMapParams,
                                'active',
                                false
                            );
                        } else {
                            iframeSrc = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
                        }
                    }
                    
                    // Create iframe
                    const iframe = document.createElement('iframe');
                    iframe.id = `iframe${index}`;
                    iframe.title = iframeLabels.get(index);
                    if (iframeSrc) {
                        setIframeSrc(iframe, iframeSrc, {
                            label: iframeLabels.get(index),
                            reason: 'initial-active'
                        });
                        iframeSynced.set(index, getSyncKey(currentMapParams));
                        iframePointSynced.set(index, getPointKey(currentMapParams));
                        iframe.onload = () => {
                            console.log(`[overlay] iframe LOADED ${iframeLabelForLog(index)}  reason=initial-active`);
                            if (urls.length > 1 && hasCoords) {
                                scheduleWarmAll(
                                    index,
                                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                                    currentMapParams, 'after-initial-active'
                                );
                            }
                        };
                    }
                    iframe.setAttribute('allowfullscreen', '');
                    
                    panel.appendChild(iframe);
                    container.appendChild(panel);
                });

                // Show controls bar
                document.getElementById('controls-bar').style.display = 'flex';
                
                // Single-file mode: hide frame selector if only one dataset
                const isSingleFileMode = urls.length === 1;
                if (isSingleFileMode) {
                    document.getElementById('frame-selector').style.display = 'none';
                }
                
                // Create dropdown options
                const frameSelect = document.getElementById('frame-select');
                iframeLabels.forEach((label, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = label;
                    frameSelect.appendChild(option);
                });
                
                // Set select size to show all options (max 6)
                const numOptions = frameSelect.options.length;
                frameSelect.size = Math.min(numOptions, 6);
                frameSelect.value = initialActiveIndex.toString();
                
                // Active dataset index (global activeDatasetIdx, set at init)
                activeDatasetIdx = initialActiveIndex;
                
                // Frame selector change handler
                frameSelect.addEventListener('change', (e) => {
                    const selectedIndex = parseInt(e.target.value);
                    selectDataset(selectedIndex);
                });
                
                // Function to select a dataset
                function selectDataset(index) {
                    // Cancel pending debounced sync/scheduled warm only — never abort in-flight iframe loads
                    if (syncTimeout) {
                        clearTimeout(syncTimeout);
                        syncTimeout = null;
                    }
                    cancelPendingWarm();
                    const previousIdx = activeDatasetIdx;
                    datasetSwitchSuppressUntil = Date.now() + SYNC_COOLDOWN_MS;
                    console.log(`[overlay] dataset SWITCH  ${iframeLabelForLog(previousIdx)} → ${iframeLabelForLog(index)}  (show/hide; point sync if stale)`);
                    beginSwitchTracking(previousIdx, index);
                    clearRefAppliedForDateSync(index);
                    cancelRefRecoveryTimers(previousIdx);
                    cancelRefRecoveryTimers(index);
                    refAutoRetryCountByIndex.delete(index);
                    updateRefStatusIndicator('', false);

                    activeDatasetIdx = index;
                    const label = iframeLabels.get(index);
                    currentViewCode = viewCodes[label] || label.toLowerCase();
                    currentDataset = iframeDatasets.get(index);
                    
                    // Check if time controls are active (defined later, use typeof check)
                    const isTimeControlsActive = (typeof timeControlsActive !== 'undefined' && timeControlsActive);
                    
                    if (isTimeControlsActive && previousIdx !== index) {
                        // Time controls active and dataset changed → restore to BASELINE STATE for the new dataset
                        restoreToBaselineState();
                        return;
                    }
                    
                    // Hide all panels (push to back)
                    document.querySelectorAll('.panel').forEach(panel => {
                        panel.style.visibility = 'hidden';
                        panel.style.zIndex = '-1';
                        panel.style.pointerEvents = 'none';
                        panel.classList.remove('active');
                    });
                    
                    // Show the selected panel (instant; no reload on switch)
                    const selectedPanel = document.getElementById(`panel${index}`);
                    if (selectedPanel) {
                        selectedPanel.style.visibility = 'visible';
                        selectedPanel.style.zIndex = '10';
                        selectedPanel.style.pointerEvents = 'auto';
                        selectedPanel.classList.add('active');
                    }
                    
                    const visibleIframe = document.getElementById(`iframe${index}`);
                    
                    // Custom ref: always force reload (mintpy asc needs minimal URL, no colorscale).
                    // Otherwise: reload only when dates/point/view state is stale.
                    if (hasCustomRefPoint(currentMapParams)) {
                        reloadDatasetIframe(index, 'switch-dataset-ref', 'refSwitch');
                        scheduleRefRecoveryWatchdogs(index, 'switch-dataset-ref');
                    } else {
                        syncDatasetIframeOnSwitch(index);
                    }
                    
                    // Send contour state to the newly visible iframe so it matches currentMapParams
                    const contourOn = (currentMapParams.contour === 'true' || currentMapParams.contour === 'on');
                    if (visibleIframe && visibleIframe.contentWindow) {
                        try {
                            visibleIframe.contentWindow.postMessage({ type: 'insarmaps-set-contour', value: contourOn }, '*');
                        } catch (e) {}
                    }
                    
                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, false);
                    updatePeriodHeader();
                }
                
                // Update overlay URL with initial state. Preserve timeControls and periods from URL when present
                // (avoids wiping shared links; auto-open will use them)
                const currentUrl = getOverlayUrlParams();
                const urlHasTC = currentUrl.timeControls === 'true';
                const urlPeriods = parsePeriodsFromUrl(currentUrl.periods);
                const preserveTC = urlHasTC && urlPeriods && urlPeriods.length > 0;
                updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, preserveTC, preserveTC ? urlPeriods : undefined);
                
                // ===== IFRAME SYNCHRONIZATION =====
                const SYNC_DEBOUNCE_MS = 1500;
                
                // Listen for URL updates and time-series date clicks from any iframe
                window.addEventListener('message', (event) => {
                    if (!event.data) return;
                    if (event.data.type === 'insarmaps-ref-failed') {
                        const failIndex = iframeIndexForMessageSource(event.source);
                        handleInsarmapsRefFailed(failIndex, event.data);
                        return;
                    }
                    // Time series dot click: insarmaps sends { type: 'insarmaps-timeseries-date', date: 'YYYYMMDD' } or date: 'YYYY-MM-DD'
                    if (event.data.type === 'insarmaps-ref-applied' &&
                        event.data.refPointLat != null && event.data.refPointLon != null) {
                        const refIndex = iframeIndexForMessageSource(event.source);
                        const coordsMatch = refIndex >= 0 &&
                            refCoordsMatch(currentMapParams.refPointLat, currentMapParams.refPointLon,
                                event.data.refPointLat, event.data.refPointLon);
                        const acceptForDateSync = coordsMatch && shouldAcceptRefAppliedForDateSync(refIndex);
                        if (coordsMatch && !acceptForDateSync) {
                        }
                        if (acceptForDateSync) {
                            logSwitchOutcomePart(refIndex, 'ref', true, {
                                refPointLat: event.data.refPointLat,
                                refPointLon: event.data.refPointLon
                            });
                            maybeStartDateSyncAfterRef(refIndex);
                        } else if (refIndex >= 0 && activeSwitchTracking && activeSwitchTracking.to === refIndex) {
                            logSwitchOutcomePart(refIndex, 'ref', false, {
                                reason: 'coords-mismatch',
                                refPointLat: event.data.refPointLat,
                                refPointLon: event.data.refPointLon
                            });
                        }
                        return;
                    }
                    if (event.data.type === 'insarmaps-set-dates-applied' &&
                        event.data.startDate && event.data.endDate) {
                        const ackIndex = iframeIndexForMessageSource(event.source);
                        const pending = ackIndex >= 0 ? pendingDateSyncByIndex.get(ackIndex) : null;
                        if (pending &&
                            pending.startDate === event.data.startDate &&
                            pending.endDate === event.data.endDate) {
                            onDateSyncApplied(ackIndex, event.data.startDate, event.data.endDate, 0);
                        }
                        return;
                    }
                    if (event.data.type === 'insarmaps-timeseries-date' && event.data.date) {
                        let dateStr = String(event.data.date).trim().replace(/-/g, '');
                        if (dateStr.length === 8) {
                            console.log('[overlay] insarmaps-timeseries-date received', dateStr, 'addPeriodState:', addPeriodState);
                            // Accept as start date when waiting for start (need_start, or idle/need_point so we're forgiving)
                            if (addPeriodState === 'need_start' || addPeriodState === 'need_point' || addPeriodState === 'idle') {
                                if (addStartDateInput) { addStartDateInput.value = dateStr; addStartDateInput.disabled = false; addStartDateInput.classList.remove('greyed'); }
                                addPeriodState = 'need_end';
                                updateAddPeriodButton();
                            } else if (addPeriodState === 'need_end') {
                                if (addEndDateInput) addEndDateInput.value = dateStr;
                                commitPeriodFromDotSelection();
                            }
                        }
                        return;
                    }
                    if (event.data.type !== 'insarmaps-url-update') return;

                    const msgFirstDate = event.data.firstDate || event.data.first_date;
                    const msgLastDate = event.data.lastDate || event.data.last_date;
                    if (msgFirstDate && msgLastDate) {
                        updateBaselineMissionDateRange(msgFirstDate, msgLastDate);
                    }
                    
                    // Check if message is from the active iframe
                    // In Time Controls mode, the visible period iframe is the active one
                    let isFromActiveIframe = false;
                    const activeIframe = document.getElementById(`iframe${activeDatasetIdx}`);
                    if (activeIframe && event.source === activeIframe.contentWindow) {
                        isFromActiveIframe = true;
                    }
                    // Also treat the visible period iframe as active (in Time Controls mode)
                    // so user interactions (pan/zoom/param changes) bypass the cooldown
                    if (!isFromActiveIframe &&
                        typeof timeControlsActive !== 'undefined' && timeControlsActive &&
                        typeof periodPanels !== 'undefined' && periodPanels && periodPanels.size > 0 &&
                        typeof currentPeriodIndex !== 'undefined') {
                        const visiblePeriodPanel = periodPanels.get(currentPeriodIndex);
                        if (visiblePeriodPanel) {
                            const visiblePeriodIframe = visiblePeriodPanel.querySelector('iframe');
                            if (visiblePeriodIframe && event.source === visiblePeriodIframe.contentWindow) {
                                isFromActiveIframe = true;
                            }
                        }
                    }
                    
                    // Only apply cooldown to messages from non-active iframes (prevents sync loops)
                    // Active iframe messages are always processed (user actions)
                    const now = Date.now();
                    if (!isFromActiveIframe && now - lastSyncTime < SYNC_COOLDOWN_MS) {
                        console.log('Ignoring message from non-active iframe during cooldown');
                        return;
                    }
                    
                    // Eagerly warm all background iframes in parallel (initial load, point click, pan/zoom, etc.)
                    if (isFromActiveIframe) {
                        let quickSenderIndex = -1;
                        for (let i = 0; i < urlsList.length; i++) {
                            const iframe = document.getElementById(`iframe${i}`);
                            if (iframe && event.source === iframe.contentWindow) {
                                quickSenderIndex = i;
                                break;
                            }
                        }
                        if (quickSenderIndex >= 0) {
                            const merged = mergeParamsFromInsarmapsMessage(
                                event.data.url, event.data, currentMapParams
                            );
                            if (merged) {
                                const dateResolved = resolveDatesFromIframeUpdate(
                                    quickSenderIndex, merged.startDate, merged.endDate, 'active-postMessage'
                                );
                                logDateResolve(quickSenderIndex, merged.startDate, merged.endDate, dateResolved, 'active-postMessage');
                                merged.startDate = dateResolved.startDate;
                                merged.endDate = dateResolved.endDate;
                                const prevParams = { ...currentMapParams };
                                const prevKey = getSyncKey(prevParams);
                                const newKey = getSyncKey(merged);
                                const keyChanged = newKey !== prevKey;
                                const needWarm = paramsNeedBackgroundWarm(prevParams, merged);
                                const pointChanged = getPointKey(prevParams) !== getPointKey(merged);
                                const inSwitchSuppress = Date.now() < datasetSwitchSuppressUntil;
                                if (!backgroundsWarmed || keyChanged) {
                                    currentMapParams = { ...merged };
                                    if (typeof updateAddPeriodButton === 'function') updateAddPeriodButton();
                                    const inTC = (typeof timeControlsActive !== 'undefined' && timeControlsActive);
                                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, inTC,
                                        inTC && typeof periods !== 'undefined' ? periods : undefined);
                                    let shouldWarm = needWarm && (!inSwitchSuppress || pointChanged)
                                        && (!allBackgroundsSynced(currentMapParams, quickSenderIndex) || pointChanged);
                                    if (shouldWarm && !pointChanged && backgroundsPreloadInProgress()) {
                                        console.log('[overlay] warmAll SKIP  reason=active-postMessage:preload-in-progress');
                                        shouldWarm = false;
                                    }
                                    if (shouldWarm) {
                                        const warmReason = pointChanged ? 'active-postMessage:point' : 'active-postMessage';
                                        if (pointChanged) {
                                            flushWarmAll(
                                                quickSenderIndex, merged.lat, merged.lon, merged.zoom,
                                                currentMapParams, warmReason
                                            );
                                        } else {
                                            scheduleWarmAll(
                                                quickSenderIndex, merged.lat, merged.lon, merged.zoom,
                                                currentMapParams, warmReason
                                            );
                                        }
                                    } else if (needWarm) {
                                        console.log('[overlay] warmAll SKIP  reason=active-postMessage', {
                                            needWarm, pointChanged, inSwitchSuppress,
                                            preloadInProgress: backgroundsPreloadInProgress(),
                                            allSynced: allBackgroundsSynced(currentMapParams, quickSenderIndex)
                                        });
                                    }
                                    backgroundsWarmed = true;
                                    lastSyncedKey = newKey;
                                }
                            }
                        }
                    }
                    
                    if (syncTimeout) clearTimeout(syncTimeout);
                    
                    syncTimeout = setTimeout(() => {
                        // Identify sender first. Ignore postMessages from period iframes entirely -
                        // they drive reload/update loops that cause full-page reloads. Period state is
                        // controlled by the overlay; we don't sync from period iframes.
                        // Exception: accept point selection (pointLat/pointLon or refPointLat/refPointLon) from period iframes
                        // so the + button title updates correctly when user selects a point in Time Controls mode.
                        let senderPeriodIdx = -1;
                        if (typeof periodPanels !== 'undefined' && periodPanels && periodPanels.size > 0) {
                            periodPanels.forEach((panel, idx) => {
                                const ifr = panel && panel.querySelector('iframe');
                                if (ifr && event.source === ifr.contentWindow) senderPeriodIdx = idx;
                            });
                        }
                        
                        const newUrlPath = event.data.url;
                        
                        // Parse query parameters to check for point selection
                        const queryStart = newUrlPath.indexOf('?');
                        const params = queryStart >= 0 ? new URLSearchParams(newUrlPath.substring(queryStart)) : new URLSearchParams();
                        const hasPointSelection = params.has('pointLat') || params.has('pointLon') || params.has('refPointLat') || params.has('refPointLon');
                        
                        // If from period iframe, only process if it has point selection; otherwise ignore
                        if (senderPeriodIdx >= 0) {
                            if (hasPointSelection) {
                                // Extract and update point selection from period iframe
                                const pointLat = params.get('pointLat') ?? currentMapParams.pointLat ?? null;
                                const pointLon = params.get('pointLon') ?? currentMapParams.pointLon ?? null;
                                const refPointLat = params.get('refPointLat') ?? currentMapParams.refPointLat ?? null;
                                const refPointLon = params.get('refPointLon') ?? currentMapParams.refPointLon ?? null;
                                if (pointLat != null || pointLon != null || refPointLat != null || refPointLon != null) {
                                    currentMapParams.pointLat = pointLat;
                                    currentMapParams.pointLon = pointLon;
                                    currentMapParams.refPointLat = refPointLat;
                                    currentMapParams.refPointLon = refPointLon;
                                    if (typeof updateAddPeriodButton === 'function') updateAddPeriodButton();
                                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, 
                                        (typeof timeControlsActive !== 'undefined' && timeControlsActive),
                                        (typeof timeControlsActive !== 'undefined' && timeControlsActive && typeof periods !== 'undefined' && periods.length > 0) ? periods : undefined);
                                }
                            }
                            return;
                        }
                        
                        // Parse path: /start/{lat}/{lon}/{zoom}?params...
                        const pathMatch = newUrlPath.match(/^\/start\/([^\/]+)\/([^\/]+)\/([^?]+)/);
                        if (!pathMatch) return;
                        
                        const [, lat, lon, zoom] = pathMatch;
                        
                        // Get contour value - insarmaps sends contour=on or contour=off; we normalize to true/false
                        // (params already parsed above)
                        const getContourValue = () => {
                            // First check URL params (primary source)

                        return false;
                    }
                    
                    periods.forEach((period, periodIdx) => {
                        const panel = document.createElement('div');
                        panel.className = 'panel';
                        panel.id = `period-panel-${datasetIdx}-${periodIdx}`;
                        // Store period info as data attributes for display
                        panel.dataset.startDate = period.startDate;
                        panel.dataset.endDate = period.endDate;
                        // Use visibility:visible but z-index:-1 so iframes load properly
                        panel.style.visibility = 'visible';
                        panel.style.zIndex = '-1';
                        panel.style.pointerEvents = 'none';
                        
                        // Build URL with this period's dates
                        const periodParams = {
                            lat: currentMapParams.lat,
                            lon: currentMapParams.lon,
                            zoom: currentMapParams.zoom,
                            minScale: currentMapParams.minScale,
                            maxScale: currentMapParams.maxScale,
                            startDate: period.startDate,
                            endDate: period.endDate,
                            pixelSize: currentMapParams.pixelSize,
                            background: currentMapParams.background,
                            opacity: currentMapParams.opacity,
                            contour: currentMapParams.contour,
                            colorscale: currentMapParams.colorscale,
                            refPointLat: currentMapParams.refPointLat,
                            refPointLon: currentMapParams.refPointLon
                        };
                        
                        const iframeSrc = buildInsarmapsUrl(
                            baseUrl,
                            dataset,
                            currentMapParams.lat,
                            currentMapParams.lon,
                            currentMapParams.zoom,
                            periodParams,
                            `period_${periodIdx}`  // Unique ID for cache-busting
                        );
                        
                        console.log(`Period ${periodIdx}: startDate=${period.startDate}, endDate=${period.endDate}`);
                        console.log(`  URL: ${iframeSrc}`);
                        
                        const iframe = document.createElement('iframe');
                        iframe.id = `period-iframe-${datasetIdx}-${periodIdx}`;
                        iframe.title = `${iframeLabels.get(datasetIdx)} - Period ${periodIdx + 1}`;
                        iframe.src = iframeSrc;
                        iframe.setAttribute('allowfullscreen', '');
                        
                        // Track loading for background period iframes (not the first one which is shown immediately)
                        if (periodIdx > 0) {
                            loadingPeriodIndices.add(periodIdx);
                            iframe.onload = () => { loadingPeriodIndices.delete(periodIdx); updateLoadingIndicator(); };
                        }
                        
                        panel.appendChild(iframe);
                        container.appendChild(panel);
                        
                        periodPanels.set(periodIdx, panel);
                        totalLoadedIframes++;
                    });
                    
                    loadedDatasetIdx = datasetIdx;
                    periodPanelsCreatedAt = Date.now();
                    updateLoadingIndicator();
                    updateMemoryDisplay();
                    console.log(`Loaded ${periodPanels.size} period panels`);
                    return true;
                }
                
                // Show specific period
                function showPeriod(periodIdx) {
                    if (periodIdx < 0 || periodIdx >= periods.length) {
                        console.warn(`Invalid period index: ${periodIdx}`);
                        return;
                    }
                    
                    console.log(`Showing period ${periodIdx} of ${periods.length}`);
                    
                    // Push all panels to back
                    document.querySelectorAll('.panel').forEach(panel => {
                        panel.style.zIndex = '-1';
                        panel.style.pointerEvents = 'none';
                        panel.classList.remove('active');
                    });
                    
                    // Bring the selected period panel to front
                    const panel = periodPanels.get(periodIdx);
                    if (panel) {
                        panel.style.visibility = 'visible';
                        panel.style.zIndex = '10';
                        panel.style.pointerEvents = 'auto';
                        panel.classList.add('active');
                        // Send contour state to the newly visible period iframe so it matches currentMapParams
                        const contourOn = (currentMapParams.contour === 'true' || currentMapParams.contour === 'on');
                        const periodIframe = panel.querySelector('iframe');
                        if (periodIframe && periodIframe.contentWindow) {
                            try {
                                periodIframe.contentWindow.postMessage({ type: 'insarmaps-set-contour', value: contourOn }, '*');
                            } catch (e) {}
                        }
                    }
                    
                    currentPeriodIndex = periodIdx;
                    
                    // Update currentMapParams
                    const period = periods[periodIdx];
                    currentMapParams.startDate = period.startDate;
                    currentMapParams.endDate = period.endDate;
                    
                    // So contour toggle in this period is detected as "only contour changed" (message only, no reload)
                    lastSyncedKey = getSyncKey(currentMapParams);
                    
                    updateControls();
                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, true, periods);
                }
                
                // When closing Time Controls: keep startDate/endDate from the last viewed period
                // and apply that date range (and all other params) to all dataset iframes and overlay URL.
                function restoreToBaselineState() {
                    if (dateRangeWaitTimer) { clearTimeout(dateRangeWaitTimer); dateRangeWaitTimer = null; }
                    waitingForDateRangeForTC = false;
                    if (movieInterval) {
                        clearInterval(movieInterval);
                        movieInterval = null;
                        btnPlay.textContent = '▶ Play';
                        btnPlay.classList.remove('playing');
                    }
                    timeControlsActive = false;
                    timeControlsCheckbox.checked = false;
                    timeControlsPanel.classList.remove('visible');
                    memoryDisplay.classList.remove('visible');
                    clearPeriods();
                    document.querySelectorAll('.panel').forEach(panel => {
                        panel.style.visibility = 'hidden';
                        panel.style.zIndex = '-1';
                        panel.style.pointerEvents = 'none';
                        panel.classList.remove('active');
                    });
                    const selectedPanel = document.getElementById(`panel${activeDatasetIdx}`);
                    if (selectedPanel) {
                        selectedPanel.style.visibility = 'visible';
                        selectedPanel.style.zIndex = '10';
                        selectedPanel.style.pointerEvents = 'auto';
                        selectedPanel.classList.add('active');
                    }
                    // Do NOT reset startDate/endDate to full range: keep the period from the last view in TC.
                    lastSyncedKey = getSyncKey(currentMapParams);
                    // Reload every dataset iframe with current params (including startDate/endDate from last view)
                    // so all frames and the overlay URL reflect the same date range.
                    if (currentMapParams.lat && currentMapParams.lon && currentMapParams.zoom) {
                        iframeDatasets.forEach((dataset, idx) => {
                            const iframe = document.getElementById(`iframe${idx}`);
                            if (iframe && dataset) {
                                iframe.src = buildInsarmapsUrl(
                                    baseUrl, dataset,
                                    currentMapParams.lat, currentMapParams.lon, currentMapParams.zoom,
                                    currentMapParams,
                                    idx === activeDatasetIdx ? 'baseline' : `frame${idx}`
                                );
                                iframeSynced.set(idx, lastSyncedKey);
                            }
                        });
                    }
                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, false);
                    updatePeriodHeader();
                }
                
                // Open time controls
                function openTimeControls() {
                    timeControlsActive = true;
                    periodInput.value = 2;
                    timeControlsPanel.classList.add('visible');
                    memoryDisplay.classList.add('visible');
                    
                    // Unset point selection when entering time controls so + shows "Select a point..." until user selects again
                    currentMapParams.pointLat = null;
                    currentMapParams.pointLon = null;
                    currentMapParams.refPointLat = null;
                    currentMapParams.refPointLon = null;
                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, true, periods.length > 0 ? periods : undefined);
                    
                    // Load periods for current dataset if not already loaded
                    if (loadedDatasetIdx !== activeDatasetIdx || periodPanels.size === 0) {
                        if (!loadPeriodsForDataset(activeDatasetIdx)) {
                            // Date range not yet available; wait for postMessage from insarmaps instead of alerting immediately
                            waitingForDateRangeForTC = true;
                            periodIndicator.textContent = 'Waiting for map data…';
                            if (dateRangeWaitTimer) clearTimeout(dateRangeWaitTimer);
                            dateRangeWaitTimer = setTimeout(() => {
                                dateRangeWaitTimer = null;
                                if (waitingForDateRangeForTC && (!dataFirstDate || !dataLastDate)) {
                                    waitingForDateRangeForTC = false;
                                    alert('Could not determine date range. Please interact with the map first to load date information.');
                                    closeTimeControls();
                                }
                            }, DATE_RANGE_WAIT_MS);
                            return;
                        }
                    }
                    
                    // Always open at first period (original state)
                    currentPeriodIndex = 0;
                    showPeriod(currentPeriodIndex);
                    updateControls();
                    syncAddPeriodInputs();
                    addPeriodState = 'idle';
                    updateAddPeriodButton();
                }
                
                // Close time controls → restore to BASELINE STATE
                function closeTimeControls() {
                    addPeriodState = 'idle';
                    updateAddPeriodButton();
                    restoreToBaselineState();
                }
                
                // Handle dataset change while time controls are open
                function handleDatasetChangeInTimeControls(newDatasetIdx) {
                    if (!timeControlsActive) return;
                    
                    // Reload periods for new dataset
                    if (loadPeriodsForDataset(newDatasetIdx)) {
                        showPeriod(0);  // Start at first period
                        updateControls();
                    }
                }
                
                // Play/Stop movie
                function togglePlay() {
                    if (movieInterval) {
                        // Stop
                        clearInterval(movieInterval);
                        movieInterval = null;
                        btnPlay.textContent = '▶ Play';
                        btnPlay.classList.remove('playing');
                    } else {
                        // Start from current period
                        btnPlay.textContent = '■ Stop';
                        btnPlay.classList.add('playing');
                        
                        const delayMs = (parseFloat(frameDelayInput.value) || 2) * 1000;
                        
                        movieInterval = setInterval(() => {
                            if (currentPeriodIndex < periods.length - 1) {
                                showPeriod(currentPeriodIndex + 1);
                            } else {
                                // Reached end - go back to first period
                                showPeriod(0);
                                // Stop playing
                                clearInterval(movieInterval);
                                movieInterval = null;
                                btnPlay.textContent = '▶ Play';
                                btnPlay.classList.remove('playing');
                            }
                        }, delayMs);
                    }
                }
                
                // Event listeners
                timeControlsCheckbox.addEventListener('change', () => {
                    if (timeControlsCheckbox.checked) {
                        openTimeControls();
                    } else {
                        closeTimeControls();
                    }
                });
                
                btnPlay.addEventListener('click', togglePlay);
                
                btnForward.addEventListener('click', () => {
                    if (currentPeriodIndex < periods.length - 1) {
                        showPeriod(currentPeriodIndex + 1);
                    }
                });
                
                btnBackward.addEventListener('click', () => {
                    if (currentPeriodIndex > 0) {
                        showPeriod(currentPeriodIndex - 1);
                    }
                });
                
                // On hover over +, re-check status (point selected, start/end date) so title is always correct
                addPeriodBtn.addEventListener('mouseenter', () => {
                    updateAddPeriodButton();
                });
                
                // Add period (+/−) button: toggle period selection mode, or enter add-period flow when opening.
                addPeriodBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!timeControlsActive) return;
                    if (periodSelectionModeActive) {
                        periodSelectionModeActive = false;
                        updateAddPeriodButton();
                        return;
                    }
                    periodSelectionModeActive = true;
                    // Reset periods when entering period selection: clear list and URL so next selection replaces
                    clearPeriods();
                    replaceNextPeriodWithNew = true;
                    updateOverlayUrl(currentViewCode, currentMapParams, currentDataset, true, undefined);
                    updateControls();
                    // Show main dataset panel (no reload) so time series stays open for picking start/end dates
                    showMainDatasetPanel();
                    // Tell insarmaps to keep time series window open (parent click must not minimize it)
                    const mainIframe = document.getElementById(`iframe${activeDatasetIdx}`);
                    if (mainIframe && mainIframe.contentWindow) {
                        try {
                            mainIframe.contentWindow.postMessage({ type: 'insarmaps-keep-charts-open' }, '*');
                        } catch (err) {}
                    }
                    if (!pointSelected()) {
                        addPeriodState = 'need_point';
                        if (addStartDateInput) { addStartDateInput.value = ''; addStartDateInput.disabled = true; addStartDateInput.classList.add('greyed'); }
                        if (addEndDateInput) { addEndDateInput.value = ''; addEndDateInput.disabled = true; addEndDateInput.classList.add('greyed'); }
                        updateAddPeriodButton();
                        return;
                    }
                    addPeriodState = 'need_start';
                    if (addStartDateInput) { addStartDateInput.value = ''; addStartDateInput.disabled = true; addStartDateInput.classList.add('greyed'); }
                    if (addEndDateInput) { addEndDateInput.value = ''; addEndDateInput.disabled = true; addEndDateInput.classList.add('greyed'); }
                    updateAddPeriodButton();
                });
                
                periodInput.addEventListener('change', () => {
                    if (timeControlsActive) {
                        loadPeriodsForDataset(activeDatasetIdx, true);  // Force use period input, ignore URL
                        showPeriod(0);
                        updateControls();
                    }
                });
                
                // Initialize
                updateMemoryDisplay();
                updateAddPeriodButton();
                // Auto-open Time Controls if URL has timeControls=true and periods.
                // All period iframes are created with src set and load in background; first period is shown.
                // Delay allows initial map load; forward/backward arrows work without reloading.
                if (initialParams.timeControls === 'true' && parsePeriodsFromUrl(initialParams.periods)) {
                    setTimeout(() => {
                        if (!timeControlsActive) {
                            timeControlsCheckbox.checked = true;
                            openTimeControls();
                        }
                    }, 1200);
                }
                // ===== END TIME NAVIGATION CONTROLS =====

                // Download link, then individual insarmaps URLs at bottom of page
                fetch('download_commands.txt')
                    .then(response => response.text())
                    .then(() => {
                        const p = document.createElement('p');
                        p.className = 'page-footer';
                        p.innerHTML = 'Data download: <a href="download_commands.txt" target="_blank">link</a>';
                        document.body.appendChild(p);
                    })
                    .catch(() => {
                        console.log('download_commands.txt not found');
                    })
                    .finally(() => {
                        appendIndividualUrlsFooter(urlsFileOrder);
                    });
            })
            .catch(error => {
                finishInsarmapsLogFetch();
                showInsarmapsLogError('Error loading insarmaps.log: ' + error.message);
            });
    </script>
</body>
</html>
